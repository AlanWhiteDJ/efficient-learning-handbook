<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#0f172a"/>
  <!-- 标题 -->
  <text x="400" y="34" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f59e0b">一句话降维法</text>
  <line x1="300" y1="42" x2="500" y2="42" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>

  <!-- 学生（实体） -->
  <circle cx="180" cy="180" r="22" fill="#a78bfa"/>
  <text x="180" y="185" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#fff">🧑</text>
  <rect x="155" y="202" width="50" height="60" rx="6" fill="#a78bfa"/>
  <text x="180" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff">我</text>

  <!-- 箭头 -->
  <line x1="220" y1="230" x2="350" y2="230" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="350,225 360,230 350,235" fill="#f59e0b"/>

  <!-- 虚线人物（想象中的初中生） -->
  <circle cx="430" cy="180" r="22" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="430" y="185" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#64748b">🧒</text>
  <rect x="405" y="202" width="50" height="60" rx="6" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="430" y="238" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">初中生</text>

  <!-- 对话气泡（光合作用讲解） -->
  <rect x="490" y="100" width="280" height="105" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="630" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#34d399">植物用什么材料，</text>
  <text x="630" y="142" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#34d399">在什么条件下，</text>
  <text x="630" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#34d399">制造了什么，</text>
  <text x="630" y="182" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#34d399">同时释放了什么？</text>
  <!-- 气泡尾巴 -->
  <polygon points="490,195 475,210 500,210" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <polygon points="490,195 475,210 500,210" fill="#1e293b"/>

  <!-- 光合作用图表 -->
  <rect x="100" y="300" width="600" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="325" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">🌱 光合作用：6CO₂ + 6H₂O ──光能→ C₆H₁₂O₆ + 6O₂</text>

  <!-- 术语→被划掉 -->
  <text x="220" y="370" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#ef4444" text-decoration="line-through">光反应</text>
  <text x="220" y="390" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#ef4444" text-decoration="line-through">暗反应</text>

  <!-- 红色X -->
  <line x1="240" y1="355" x2="270" y2="393" stroke="#ef4444" stroke-width="2"/>
  <line x1="270" y1="355" x2="240" y2="393" stroke="#ef4444" stroke-width="2"/>

  <!-- 箭头 -->
  <text x="320" y="380" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#f59e0b">→</text>

  <!-- 大白话 -->
  <rect x="370" y="355" width="300" height="40" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="520" y="372" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#34d399">"阳光＋二氧化碳＋水 → </text>
  <text x="520" y="389" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#34d399"> 葡萄糖（食物）＋氧气"</text>

  <!-- 底部标注 -->
  <rect x="160" y="430" width="480" height="45" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="450" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fcd34d">💡 解释给对方听 → 删术语 → 只用大白话 → 找到真正的理解缺口</text>
  <text x="400" y="468" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">能讲清楚才真懂了 （费曼学习法核心）</text>

  <!-- 编号 -->
  <circle cx="60" cy="28" r="16" fill="#f59e0b" opacity="0.3"/>
  <text x="60" y="34" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">18</text>
</svg>