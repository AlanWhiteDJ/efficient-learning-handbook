<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#0f172a"/>
  <defs>
    <linearGradient id="bread1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="bread2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#16a34a"/></linearGradient>
    <linearGradient id="bread3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="lettuce" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#22c55e"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowRed"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#ef4444"/></marker>
  </defs>

  <!-- ===== 上半：三明治 ===== -->
  <text x="400" y="22" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif" letter-spacing="2">自 我 提 问 三 明 治</text>

  <!-- 三明治图 -->
  <g transform="translate(100, 45)" filter="url(#shadow)">
    <!-- 上层面包（学习前） -->
    <rect x="0" y="0" width="260" height="42" rx="12" fill="url(#bread1)"/>
    <rect x="0" y="21" width="260" height="21" rx="0" fill="url(#bread1)"/>
    <text x="130" y="28" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="bold" font-family="sans-serif">🍞 学习前 · 定向</text>

    <!-- 生菜层 -->
    <path d="M-5,42 Q30,55 60,45 Q95,35 130,48 Q165,55 200,44 Q235,35 265,48 L265,62 Q235,52 200,60 Q165,68 130,58 Q95,49 60,60 Q30,70 -5,58 Z" fill="url(#lettuce)"/>

    <!-- 学习前 - 问题卡片 -->
    <g transform="translate(15, 75)">
      <rect x="0" y="0" width="230" height="38" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
      <text x="12" y="16" fill="#fcd34d" font-size="10" font-family="sans-serif">❓ 目标是什么？</text>
      <text x="12" y="32" fill="#fcd34d" font-size="10" font-family="sans-serif">❓ 可能的卡点在哪？</text>
    </g>

    <!-- 中层肉饼（学习中） -->
    <rect x="0" y="130" width="260" height="42" rx="12" fill="url(#bread2)"/>
    <rect x="0" y="151" width="260" height="21" rx="0" fill="url(#bread2)"/>
    <text x="130" y="157" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="bold" font-family="sans-serif">🥩 学习中 · 监控</text>

    <!-- 学习中 - 问题卡片 -->
    <g transform="translate(15, 185)">
      <rect x="0" y="0" width="230" height="38" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
      <text x="12" y="16" fill="#4ade80" font-size="10" font-family="sans-serif">❓ 核心意思是什么？</text>
      <text x="12" y="32" fill="#4ade80" font-size="10" font-family="sans-serif">❓ 我的注意力还在吗？</text>
    </g>

    <!-- 生菜层 -->
    <path d="M-5,238 Q30,251 60,241 Q95,231 130,244 Q165,251 200,240 Q235,231 265,244 L265,258 Q235,248 200,256 Q165,264 130,254 Q95,245 60,256 Q30,266 -5,254 Z" fill="url(#lettuce)"/>

    <!-- 下层面包（学习后） -->
    <rect x="0" y="255" width="260" height="42" rx="12" fill="url(#bread3)"/>
    <rect x="0" y="276" width="260" height="21" rx="0" fill="url(#bread3)"/>
    <text x="130" y="283" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">🍞 学习后 · 反思</text>

    <!-- 学习后 - 问题卡片 -->
    <g transform="translate(15, 310)">
      <rect x="0" y="0" width="230" height="38" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
      <text x="12" y="16" fill="#93c5fd" font-size="10" font-family="sans-serif">❓ 目标达成了吗？</text>
      <text x="12" y="32" fill="#93c5fd" font-size="10" font-family="sans-serif">❓ 哪里还模糊？</text>
    </g>
  </g>

  <!-- 右侧说明 -->
  <g transform="translate(390, 50)">
    <rect x="0" y="0" width="380" height="210" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="190" y="25" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold" font-family="sans-serif">🧠 元认知三明治</text>
    <line x1="20" y1="35" x2="360" y2="35" stroke="#475569" stroke-width="0.5"/>
    <text x="30" y="58" fill="#fcd34d" font-size="11" font-family="sans-serif">🔸 <tspan font-weight="bold">学习前</tspan>：定向 → 设定目标，预判难点</text>
    <text x="30" y="82" fill="#4ade80" font-size="11" font-family="sans-serif">🔸 <tspan font-weight="bold">学习中</tspan>：监控 → 理解本质，觉察注意力</text>
    <text x="30" y="106" fill="#93c5fd" font-size="11" font-family="sans-serif">🔸 <tspan font-weight="bold">学习后</tspan>：反思 → 检查收获，定位模糊</text>
    <line x1="20" y1="122" x2="360" y2="122" stroke="#475569" stroke-width="0.5"/>
    <text x="30" y="145" fill="#94a3b8" font-size="10" font-family="sans-serif">每个环节3个问题，像三明治一样夹住</text>
    <text x="30" y="165" fill="#94a3b8" font-size="10" font-family="sans-serif">学习过程，让大脑始终处于"监控"</text>
    <text x="30" y="185" fill="#94a3b8" font-size="10" font-family="sans-serif">状态，避免"看了但没进去"。</text>

    <rect x="30" y="195" width="320" height="2" fill="#f59e0b" opacity="0.3"/>
  </g>

  <!-- ===== 下半：错误溯源 ===== -->
  <line x1="0" y1="370" x2="800" y2="370" stroke="#475569" stroke-width="0.5" stroke-dasharray="6,3"/>
  <text x="400" y="390" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif" letter-spacing="2">错 误 溯 源 · 挖 到 根</text>

  <!-- 错题 -->
  <g transform="translate(80, 410)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="105" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="20" y="22" fill="#fca5a5" font-size="10" font-family="monospace">[ 错题 ] 物体静止在斜面上，求摩擦力</text>
    <line x1="10" y1="32" x2="250" y2="32" stroke="#475569" stroke-width="0.5"/>
    <text x="20" y="52" fill="#94a3b8" font-size="10" font-family="sans-serif">我的答案：f = mg  ✗</text>
    <text x="20" y="72" fill="#6ee7b7" font-size="10" font-family="sans-serif">正确答案：f = mg·sinθ  ✓</text>
    <!-- 表面错误标注 -->
    <g transform="translate(200, 40)">
      <rect x="0" y="0" width="55" height="18" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="0.8"/>
      <text x="27" y="13" text-anchor="middle" fill="#dc2626" font-size="8" font-family="sans-serif">少负号</text>
    </g>
  </g>

  <!-- 追溯箭头 -->
  <g transform="translate(350, 450)" filter="url(#glowRed)">
    <path d="M0,10 L0,-10 Q0,-25 0,-30 Q10,-35 15,-30 L25,-20" fill="none" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
    <path d="M-5,15 L0,30" fill="none" stroke="#ef4444" stroke-width="2"/>
    <!-- 放大镜 -->
    <circle cx="0" cy="42" r="8" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="6" y1="48" x2="12" y2="54" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="355" y="438" fill="#fbbf24" font-size="9" font-weight="bold" font-family="sans-serif">追溯</text>

  <!-- 根源认知错误 -->
  <g transform="translate(420, 410)" filter="url(#shadow)">
    <rect x="0" y="0" width="310" height="105" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="20" y="22" fill="#fcd34d" font-size="11" font-weight="bold" font-family="sans-serif">🔍 根源认知错误</text>
    <line x1="10" y1="32" x2="300" y2="32" stroke="#475569" stroke-width="0.5"/>

    <!-- 表面错误→根源 -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="270" height="22" rx="4" fill="#7f1d1d" stroke="#ef4444" stroke-width="0.8" opacity="0.7"/>
      <text x="10" y="15" fill="#fca5a5" font-size="9" font-family="sans-serif">表面：漏掉了 sinθ</text>
    </g>
    <g transform="translate(20, 72)">
      <rect x="0" y="0" width="270" height="22" rx="4" fill="#78350f" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
      <text x="10" y="15" fill="#fcd34d" font-size="9" font-family="sans-serif">根源：误以为静止时摩擦力 = 重力</text>
    </g>

    <text x="160" y="98" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="sans-serif">没有理解"摩擦力平衡的是重力的分量"</text>
  </g>

  <!-- 底部结论 -->
  <text x="400" y="538" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">不追溯根源的错误 = 以后还会再犯的错误</text>
</svg>