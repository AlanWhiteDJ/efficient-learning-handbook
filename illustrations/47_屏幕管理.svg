<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f87171"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
  </defs>
  <rect width="800" height="550" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold" font-family="sans-serif">屏幕：看不见的注意力黑洞</text>
  <text x="400" y="60" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="sans-serif">手机不会抢走你的时间——它会让你心甘情愿地交出去</text>

  <!-- 视觉中心：手机=黑洞 -->
  <circle cx="400" cy="240" r="85" fill="#0f172a" stroke="url(#red)" stroke-width="3" opacity="0.95"/>
  <circle cx="400" cy="240" r="65" fill="none" stroke="#7f1d1d" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="400" cy="240" r="45" fill="#1a0000" stroke="#991b1b" stroke-width="1"/>
  <!-- 手机轮廓 -->
  <rect x="360" y="195" width="80" height="90" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <rect x="365" y="203" width="70" height="60" rx="2" fill="#0f172a"/>
  <text x="400" y="230" text-anchor="middle" fill="#f87171" font-size="11" font-family="sans-serif">📱</text>
  <text x="400" y="248" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="sans-serif">15:32</text>
  <circle cx="400" cy="273" r="3" fill="#334155"/>

  <!-- 被吸进去的东西 -->
  <text x="400" y="345" text-anchor="middle" fill="#f87171" font-size="9" font-family="sans-serif">注意力</text>
  <text x="400" y="360" text-anchor="middle" fill="#f87171" font-size="9" font-family="sans-serif">时间</text>
  <text x="400" y="375" text-anchor="middle" fill="#f87171" font-size="9" font-family="sans-serif">意志力</text>
  <line x1="400" y1="292" x2="400" y2="340" stroke="#991b1b" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 左侧：来之前 -->
  <rect x="30" y="130" width="140" height="180" rx="10" fill="#0f2744" stroke="#1e3a5f" stroke-width="1"/>
  <text x="100" y="156" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold" font-family="sans-serif">📋 来之前</text>
  <text x="100" y="178" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">"只查一道题"</text>
  <text x="100" y="198" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">"就看一眼通知"</text>
  <text x="100" y="218" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">"5分钟就放下"</text>
  <text x="100" y="248" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">心里想得很好</text>
  <text x="100" y="268" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">✅ 计划只借5分钟</text>
  <line x1="175" y1="220" x2="275" y2="220" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker></defs>

  <!-- 右侧：结果 -->
  <rect x="630" y="130" width="140" height="180" rx="10" fill="#2b0a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="700" y="156" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold" font-family="sans-serif">⚠️ 结果</text>
  <text x="700" y="178" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">刷到一堆视频</text>
  <text x="700" y="198" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">忘了原来要干嘛</text>
  <text x="700" y="218" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">45分钟过去了</text>
  <text x="700" y="248" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">然后开始自责</text>
  <text x="700" y="268" text-anchor="middle" fill="#f87171" font-size="10" font-family="sans-serif">❌ 实际丢了45分钟</text>
  <line x1="525" y1="220" x2="625" y2="220" stroke="#7f1d1d" stroke-width="1.5"/>

  <!-- 底部：三个方法 -->
  <line x1="40" y1="390" x2="760" y2="390" stroke="#334155" stroke-width="0.5"/>

  <!-- 方法1 -->
  <rect x="30" y="405" width="230" height="125" rx="8" fill="#0f2744" stroke="#3b82f6" stroke-width="1"/>
  <text x="145" y="430" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold" font-family="sans-serif">🔒 物理隔离</text>
  <text x="145" y="452" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">手机放到另一个房间</text>
  <text x="145" y="472" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">伸手够不到的距离</text>
  <text x="145" y="492" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">看不到 = 想不到</text>
  <text x="145" y="515" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">意志力靠不住，靠环境</text>

  <!-- 方法2 -->
  <rect x="285" y="405" width="230" height="125" rx="8" fill="#1a1530" stroke="#8b5cf6" stroke-width="1"/>
  <text x="400" y="430" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold" font-family="sans-serif">⏱️ 灰度模式</text>
  <text x="400" y="452" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">手机开灰度显示</text>
  <text x="400" y="472" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">彩色=多巴胺钩子</text>
  <text x="400" y="492" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">灰度=大脑不爱看</text>
  <text x="400" y="515" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">不是禁欲，是降欲</text>

  <!-- 方法3 -->
  <rect x="540" y="405" width="230" height="125" rx="8" fill="#022c22" stroke="#10b981" stroke-width="1"/>
  <text x="655" y="430" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold" font-family="sans-serif">📝 意图记录</text>
  <text x="655" y="452" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="sans-serif">拿起手机前先写一行：</text>
  <text x="655" y="472" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="sans-serif">"我要用手机做____"</text>
  <text x="655" y="492" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">用完立刻放下</text>
  <text x="655" y="515" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">不给算法抢方向盘的机会</text>
</svg>