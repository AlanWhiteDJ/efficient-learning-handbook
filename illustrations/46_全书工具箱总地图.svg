<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
  </defs>
  <rect width="800" height="460" fill="url(#bg)"/>
  
  <text x="400" y="28" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">《高效学习手册》全书工具箱总地图</text>
  <text x="400" y="48" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">18章 · 5大篇章 · 核心方法一览</text>
  
  <!-- 中心 -->
  <circle cx="400" cy="240" r="40" fill="#166534" stroke="#4ade80" stroke-width="2.5"/>
  <text x="400" y="235" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🧠</text>
  <text x="400" y="252" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">学习者</text>
  
  <!-- 六条连线向外 -->
  <line x1="400" y1="200" x2="400" y2="140" stroke="#475569" stroke-width="1"/>
  <line x1="440" y1="230" x2="540" y2="160" stroke="#475569" stroke-width="1"/>
  <line x1="440" y1="250" x2="580" y2="300" stroke="#475569" stroke-width="1"/>
  <line x1="400" y1="280" x2="400" y2="340" stroke="#475569" stroke-width="1"/>
  <line x1="360" y1="250" x2="220" y2="300" stroke="#475569" stroke-width="1"/>
  <line x1="360" y1="230" x2="260" y2="160" stroke="#475569" stroke-width="1"/>
  
  <!-- 六个扇区 -->
  <!-- 上：记忆篇 -->
  <rect x="310" y="65" width="180" height="60" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="88" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">📦 记忆篇 第1-3章</text>
  <text x="400" y="105" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">12121复习 · 感情锚点 · 狮子记忆法</text>
  <text x="400" y="118" text-anchor="middle" fill="#64748b" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">合书拷问 · 白纸倾泻 · 微循环训练</text>
  
  <!-- 右上：理解篇 -->
  <rect x="550" y="110" width="160" height="80" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="630" y="135" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🔗 理解篇</text>
  <text x="630" y="150" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">第4-6章</text>
  <text x="630" y="166" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">三问·类比·织网</text>
  <text x="630" y="180" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">降维·讲课·组块</text>
  
  <!-- 右下：应用篇 -->
  <rect x="550" y="250" width="160" height="80" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="630" y="275" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🎯 应用篇</text>
  <text x="630" y="290" text-anchor="middle" fill="#c084fc" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">第7-9章</text>
  <text x="630" y="306" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">翻译·找茬·类比</text>
  <text x="630" y="320" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">面具·改造·情境</text>
  
  <!-- 下：专注篇 -->
  <rect x="310" y="335" width="180" height="80" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="358" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">⚡ 专注篇 第10-12章</text>
  <text x="400" y="375" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">2分钟启动 · 环境隔离 · 习惯叠加</text>
  <text x="400" y="392" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">心流通道 · 番茄钟 · 精力地图</text>
  <text x="400" y="408" text-anchor="middle" fill="#64748b" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">执行意图 · 身份认同 · 启动仪式</text>
  
  <!-- 左下：动力篇 -->
  <rect x="90" y="250" width="160" height="80" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="170" y="275" text-anchor="middle" fill="#f472b6" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🔥 动力篇</text>
  <text x="170" y="290" text-anchor="middle" fill="#f472b6" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">第13-15章</text>
  <text x="170" y="306" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">标记·日志·反馈</text>
  <text x="170" y="320" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">选择·挑战·项目</text>
  
  <!-- 左上：调节篇 -->
  <rect x="90" y="110" width="160" height="80" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="170" y="135" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🎛️ 调节篇</text>
  <text x="170" y="150" text-anchor="middle" fill="#22d3ee" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">第16-18章</text>
  <text x="170" y="166" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">三明治·溯源·旁观</text>
  <text x="170" y="180" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">区块·实验·配置表</text>
</svg>