<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#0f172a"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="bgTop" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="bgBot" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/></filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- 上半部分背景 -->
  <rect x="0" y="0" width="800" height="260" fill="url(#bgTop)" rx="0"/>
  <line x1="0" y1="260" x2="800" y2="260" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- 下半部分背景 -->
  <rect x="0" y="261" width="800" height="289" fill="url(#bgBot)" rx="0"/>

  <!-- ===== 上半：2分钟启动 ===== -->
  <text x="400" y="30" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="sans-serif" letter-spacing="3">⏱ 2 分 钟 启 动 法</text>

  <!-- 翻开的书 -->
  <g transform="translate(180, 70)" filter="url(#shadow)">
    <!-- 书左半 -->
    <path d="M0,160 L0,5 Q60,-10 120,5 L120,160 Z" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M0,160 L0,5 Q60,-10 120,5 L120,160 Z" fill="none" stroke="#60a5fa" stroke-width="0.5"/>
    <!-- 书右半 -->
    <path d="M120,5 Q180,-10 240,5 L240,160 L120,160 Z" fill="#2563eb" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M120,5 Q180,-10 240,5 L240,160 L120,160 Z" fill="none" stroke="#60a5fa" stroke-width="0.5"/>
    <!-- 书脊 -->
    <line x1="120" y1="2" x2="120" y2="160" stroke="#60a5fa" stroke-width="1"/>
    <!-- 书页线 -->
    <line x1="25" y1="40" x2="95" y2="40" stroke="#60a5fa" stroke-width="0.8" opacity="0.5"/>
    <line x1="25" y1="70" x2="95" y2="70" stroke="#60a5fa" stroke-width="0.8" opacity="0.5"/>
    <line x1="25" y1="100" x2="95" y2="100" stroke="#60a5fa" stroke-width="0.8" opacity="0.5"/>
    <line x1="145" y1="40" x2="215" y2="40" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="145" y1="70" x2="215" y2="70" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- 手 -->
  <g transform="translate(200, 225)">
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#fbbf24" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="22" ry="12" fill="#f59e0b" opacity="0.5"/>
    <path d="M-15,-3 Q-20,-20 -12,-25 Q-5,-22 -10,-5" fill="#fbbf24" opacity="0.6"/>
    <path d="M-5,-5 Q-3,-22 2,-26 Q8,-22 5,-5" fill="#fbbf24" opacity="0.6"/>
    <path d="M5,-3 Q10,-20 14,-24 Q19,-20 15,-4" fill="#fbbf24" opacity="0.6"/>
  </g>

  <!-- 计时器 -->
  <g transform="translate(420, 100)" filter="url(#shadow)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="60" cy="60" r="48" fill="#0f172a" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <text x="60" y="55" text-anchor="middle" fill="#f59e0b" font-size="28" font-weight="bold" font-family="sans-serif">02:00</text>
    <text x="60" y="78" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">分钟</text>
    <!-- 计时器旋钮 -->
    <circle cx="60" cy="18" r="5" fill="#f59e0b"/>
    <circle cx="60" cy="98" r="5" fill="#f59e0b"/>
  </g>

  <!-- 气泡 -->
  <g transform="translate(530, 60)">
    <path d="M0,15 Q-10,-20 30,-40 L110,-40 Q145,-40 145,-15 Q145,10 110,10 L60,10 L50,30 Z" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
    <text x="15" y="-10" fill="#fcd34d" font-size="14" font-family="sans-serif">只做2分钟</text>
    <text x="15" y="12" fill="#fcd34d" font-size="14" font-family="sans-serif">可以随时停</text>
  </g>

  <!-- 连接线：从书→计时器→气泡 -->
  <path d="M300,105 Q370,80 420,100" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M480,105 Q510,80 530,60" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ===== 下半：环境隔离 ===== -->
  <text x="400" y="285" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="sans-serif" letter-spacing="3">🚫 神 圣 区 域 · 环 境 隔 离</text>

  <!-- 桌子 -->
  <rect x="340" y="420" width="280" height="12" rx="3" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
  <rect x="350" y="431" width="8" height="60" fill="#78350f"/>
  <rect x="590" y="431" width="8" height="60" fill="#78350f"/>

  <!-- 书桌上的学习用品 -->
  <!-- 书本 -->
  <rect x="380" y="390" width="55" height="30" rx="2" fill="#1e40af" stroke="#3b82f6" stroke-width="1"/>
  <text x="407" y="410" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="sans-serif">📖数学</text>

  <!-- 笔记本 -->
  <rect x="450" y="395" width="40" height="25" rx="2" fill="#065f46" stroke="#34d399" stroke-width="1"/>
  <line x1="460" y1="405" x2="480" y2="405" stroke="#34d399" stroke-width="0.5"/>
  <line x1="460" y1="410" x2="475" y2="410" stroke="#34d399" stroke-width="0.5"/>

  <!-- 笔 -->
  <line x1="510" y1="418" x2="535" y2="385" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="510" y1="418" x2="535" y2="385" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 台灯 -->
  <g transform="translate(570, 380)">
    <rect x="-3" y="-15" width="6" height="15" fill="#94a3b8"/>
    <path d="M-12,0 L-15,-12 L15,-12 L12,0 Z" fill="#f59e0b" opacity="0.8"/>
    <circle cx="0" cy="-5" r="8" fill="#fef3c7" opacity="0.3"/>
    <circle cx="0" cy="-5" r="4" fill="#f59e0b" opacity="0.6"/>
  </g>

  <!-- 禁区标识 -->
  <g transform="translate(150, 340)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="150" rx="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4"/>
    <!-- 手机被锁 -->
    <rect x="35" y="20" width="60" height="95" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="45" y="28" width="40" height="65" rx="2" fill="#0f172a" stroke="#475569" stroke-width="0.5"/>
    <line x1="55" y1="42" x2="75" y2="42" stroke="#475569" stroke-width="1"/>
    <line x1="55" y1="52" x2="75" y2="52" stroke="#475569" stroke-width="1"/>
    <line x1="55" y1="62" x2="65" y2="62" stroke="#475569" stroke-width="1"/>
    <circle cx="65" cy="87" r="3" fill="#475569"/>
    <!-- 锁图标 -->
    <rect x="52" y="10" width="26" height="18" rx="3" fill="#ef4444"/>
    <path d="M58,10 L58,5 Q58,-3 65,-3 Q72,-3 72,5 L72,10" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <circle cx="65" cy="20" r="2" fill="#0f172a"/>
    <!-- 禁止符号 -->
    <circle cx="65" cy="70" r="25" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.7"/>
    <line x1="47" y1="52" x2="83" y2="88" stroke="#ef4444" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- "神圣区域"标签 -->
  <g transform="translate(400, 315)">
    <rect x="0" y="0" width="150" height="32" rx="16" fill="url(#g1)" opacity="0.9"/>
    <text x="75" y="22" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="bold" font-family="sans-serif">🏰 神圣区域</text>
  </g>

  <!-- 标签连接线 -->
  <line x1="475" y1="347" x2="530" y2="390" stroke="#f59e0b" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>

  <!-- 装饰性箭头：从禁区的手机指向书桌 -->
  <path d="M280,420 Q310,410 340,418" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="295" y="408" fill="#34d399" font-size="9" font-family="sans-serif">手机在此</text>
  <text x="295" y="435" fill="#34d399" font-size="9" font-family="sans-serif">安心学习</text>
  <!-- 底部标注 -->
  <text x="400" y="530" text-anchor="middle" fill="#64748b" font-size="11" font-family="sans-serif">2分钟启动降低门槛 · 环境隔离消除诱惑 · 二者合力 = 轻松开始</text>
</svg>