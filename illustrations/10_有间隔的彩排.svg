<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 500">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="#1e293b" opacity="0.85"/>
  <text x="400" y="18" text-anchor="middle" fill="#3b82f6" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="12" letter-spacing="4">第10讲  ·  有间隔的彩排</text>

  <!-- === Scene 1: Comfortable desk (low pressure) === -->
  <g filter="url(#cardShadow)">
    <rect x="20" y="65" width="240" height="280" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>

    <!-- Scene label -->
    <rect x="20" y="65" width="240" height="32" rx="12" fill="#1e3a5f"/>
    <rect x="20" y="80" width="240" height="17" fill="#1e3a5f"/>
    <text x="140" y="86" text-anchor="middle" fill="#93c5fd" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="12" font-weight="bold">💺 场景一：舒适书桌</text>

    <!-- Icon: cozy desk -->
    <text x="140" y="135" text-anchor="middle" font-size="48">🪑</text>

    <!-- Desk drawing -->
    <rect x="70" y="155" width="140" height="6" rx="3" fill="#475569"/>
    <rect x="80" y="161" width="6" height="25" fill="#475569"/>
    <rect x="194" y="161" width="6" height="25" fill="#475569"/>

    <!-- Laptop/book on desk -->
    <rect x="100" y="140" width="35" height="18" rx="3" fill="#334155" stroke="#64748b" stroke-width="1"/>
    <text x="117" y="153" text-anchor="middle" fill="#94a3b8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8">📖</text>

    <!-- Coffee cup -->
    <rect x="155" y="140" width="18" height="16" rx="3" fill="#3b82f6" opacity="0.4"/>
    <text x="164" y="153" text-anchor="middle" font-size="10">☕</text>

    <!-- Environment features -->
    <g transform="translate(35,200)">
      <text x="0" y="0" fill="#94a3b8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="11">
        <tspan x="0" dy="0">✅ 温度适宜</tspan>
        <tspan x="0" dy="22">✅ 无时间压力</tspan>
        <tspan x="0" dy="22">✅ 熟悉的声音/气味</tspan>
      </text>
    </g>

    <!-- Result -->
    <rect x="35" y="288" width="170" height="28" rx="8" fill="#f59e0b" opacity="0.15"/>
    <text x="120" y="307" text-anchor="middle" fill="#fbbf24" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10">提取流畅 ⭐⭐⭐</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <text x="270" y="210" text-anchor="middle" fill="#475569" font-size="24">→</text>

  <!-- === Scene 2: Exam room (high pressure) === -->
  <g filter="url(#cardShadow)">
    <rect x="280" y="65" width="240" height="280" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>

    <!-- Scene label -->
    <rect x="280" y="65" width="240" height="32" rx="12" fill="#3b1212"/>
    <rect x="280" y="80" width="240" height="17" fill="#3b1212"/>
    <text x="400" y="86" text-anchor="middle" fill="#fca5a5" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="12" font-weight="bold">⚠ 场景二：考场环境</text>

    <!-- Icon: exam desk -->
    <text x="400" y="135" text-anchor="middle" font-size="48">🏫</text>

    <!-- Exam desk -->
    <rect x="330" y="155" width="140" height="6" rx="3" fill="#475569"/>
    <rect x="340" y="161" width="6" height="25" fill="#475569"/>
    <rect x="454" y="161" width="6" height="25" fill="#475569"/>

    <!-- Clock on desk -->
    <circle cx="380" cy="145" r="12" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="380" y1="145" x2="380" y2="138" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="380" y1="145" x2="386" y2="145" stroke="#ef4444" stroke-width="1"/>

    <!-- Timer / pressure elements -->
    <rect x="430" y="138" width="30" height="14" rx="4" fill="#ef4444" opacity="0.3"/>
    <text x="445" y="149" text-anchor="middle" fill="#fca5a5" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8">限时</text>

    <g transform="translate(295,200)">
      <text x="0" y="0" fill="#94a3b8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="11">
        <tspan x="0" dy="0">⚠ 限时作答</tspan>
        <tspan x="0" dy="22">⚠ 陌生桌椅</tspan>
        <tspan x="0" dy="22">⚠ 紧张+压力</tspan>
      </text>
    </g>

    <!-- Result -->
    <rect x="295" y="288" width="170" height="28" rx="8" fill="#ef4444" opacity="0.15"/>
    <text x="380" y="307" text-anchor="middle" fill="#fca5a5" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10">提取受阻 ⭐</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <text x="530" y="210" text-anchor="middle" fill="#475569" font-size="24">→</text>

  <!-- === Scene 3: Random environments === -->
  <g filter="url(#cardShadow)">
    <rect x="540" y="65" width="240" height="280" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>

    <!-- Scene label -->
    <rect x="540" y="65" width="240" height="32" rx="12" fill="#064e3b"/>
    <rect x="540" y="80" width="240" height="17" fill="#064e3b"/>
    <text x="660" y="86" text-anchor="middle" fill="#6ee7b7" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="12" font-weight="bold">🎲 场景三：随机切换</text>

    <!-- Multiple mini-scene icons -->
    <text x="600" y="130" text-anchor="middle" font-size="24">🛋️</text>
    <text x="660" y="128" text-anchor="middle" font-size="22">📚</text>
    <text x="720" y="135" text-anchor="middle" font-size="20">🌳</text>

    <text x="600" y="150" text-anchor="middle" fill="#64748b" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="7">客厅</text>
    <text x="660" y="148" text-anchor="middle" fill="#64748b" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="7">自习室</text>
    <text x="720" y="155" text-anchor="middle" fill="#64748b" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="7">户外</text>

    <!-- Dice icon -->
    <rect x="590" y="160" width="24" height="24" rx="4" fill="#34d399" opacity="0.2" stroke="#34d399" stroke-width="1"/>
    <text x="602" y="178" text-anchor="middle" fill="#6ee7b7" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="14">🎲</text>

    <!-- Shuffle arrows -->
    <text x="660" y="178" text-anchor="middle" fill="#34d399" font-size="16">⟷</text>

    <!-- Cross arrow -->
    <path d="M710,172 L725,172 M718,165 L718,179" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>

    <g transform="translate(555,200)">
      <text x="0" y="0" fill="#94a3b8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="11">
        <tspan x="0" dy="0">🎯 不同地点随机提取</tspan>
        <tspan x="0" dy="22">🎯 不同时段交错练习</tspan>
        <tspan x="0" dy="22">🎯 打破环境依赖</tspan>
      </text>
    </g>

    <!-- Result -->
    <rect x="555" y="288" width="170" height="28" rx="8" fill="#34d399" opacity="0.15"/>
    <text x="640" y="307" text-anchor="middle" fill="#6ee7b7" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10">考场不慌 ⭐⭐⭐</text>
  </g>

  <!-- === Center message below scenes === -->
  <rect x="120" y="370" width="560" height="55" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" fill="#fef08a" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="17" font-weight="bold">在不同环境中提取，考试时才不慌</text>
  <text x="400" y="415" text-anchor="middle" fill="#94a3b8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10">编码特异性原理：记忆与提取环境关联，多样化练习打破单一依赖</text>

  <!-- === Bottom decoration: dots connecting environments === -->
  <g transform="translate(0,445)" opacity="0.1">
    <circle cx="140" cy="15" r="3" fill="#3b82f6"/>
    <circle cx="400" cy="15" r="3" fill="#ef4444"/>
    <circle cx="660" cy="15" r="3" fill="#34d399"/>
    <line x1="140" y1="15" x2="400" y2="15" stroke="#475569" stroke-width="1" stroke-dasharray="4,6"/>
    <line x1="400" y1="15" x2="660" y2="15" stroke="#475569" stroke-width="1" stroke-dasharray="4,6"/>
  </g>
</svg>
