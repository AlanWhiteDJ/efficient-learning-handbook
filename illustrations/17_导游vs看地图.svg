<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f8fafc"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  
  <text x="400" y="28" text-anchor="middle" fill="#1e3a5f" font-size="18" font-weight="bold" font-family="sans-serif">导游 vs 看地图——"我懂了"的幻觉</text>
  <text x="400" y="48" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">听懂是跟着走，会讲才是自己认得路</text>
  
  <!-- 左：跟着导游 -->
  <rect x="20" y="70" width="370" height="320" rx="12" fill="#f8fafc" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="205" y="100" text-anchor="middle" fill="#b45309" font-size="13" font-weight="bold" font-family="sans-serif">👨‍🏫 "听懂了" = 跟着导游走</text>
  
  <!-- 路线图 -->
  <path d="M60,200 Q120,160 180,180 Q240,200 300,170" fill="none" stroke="#b45309" stroke-width="2"/>
  <!-- 小人跟着导游 -->
  <circle cx="60" cy="195" r="8" fill="#b45309"/>
  <text x="60" y="213" text-anchor="middle" fill="#b45309" font-size="8" font-family="sans-serif">导游</text>
  <circle cx="130" cy="175" r="6" fill="#94a3b8"/>
  <circle cx="200" cy="190" r="6" fill="#94a3b8"/>
  <circle cx="260" cy="180" r="6" fill="#94a3b8"/>
  
  <text x="205" y="250" text-anchor="middle" fill="#1e3a5f" font-size="11" font-family="sans-serif">每一步都有人告诉你往哪拐</text>
  <text x="205" y="272" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">→ 觉得很顺，以为认得路了</text>
  <text x="205" y="292" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">→ 其实只是跟着走了一趟</text>
  
  <rect x="80" y="315" width="250" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="205" y="337" text-anchor="middle" fill="#b45309" font-size="10" font-family="sans-serif">"我懂的，就是讲不出来"</text>
  <text x="205" y="355" text-anchor="middle" fill="#92400e" font-size="9" font-family="sans-serif">← 最危险的自我谎言</text>
  
  <!-- 中间 VS -->
  <circle cx="400" cy="230" r="18" fill="#cbd5e1"/>
  <text x="400" y="235" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="sans-serif">VS</text>
  
  <!-- 右：自己看地图 -->
  <rect x="410" y="70" width="370" height="320" rx="12" fill="#f8fafc" stroke="#16a34a" stroke-width="1.5"/>
  <text x="595" y="100" text-anchor="middle" fill="#059669" font-size="13" font-weight="bold" font-family="sans-serif">🗺️ "会讲了" = 自己看地图</text>
  
  <!-- 自己找路 -->
  <rect x="480" y="125" width="230" height="90" rx="8" fill="#d1fae5" stroke="#16a34a" stroke-width="1"/>
  <!-- 简化的地图 -->
  <line x1="500" y1="150" x2="580" y2="150" stroke="#059669" stroke-width="1.5"/>
  <line x1="580" y1="145" x2="660" y2="145" stroke="#059669" stroke-width="1.5"/>
  <line x1="500" y1="175" x2="560" y2="175" stroke="#059669" stroke-width="1.5"/>
  <line x1="620" y1="175" x2="690" y2="175" stroke="#059669" stroke-width="1.5"/>
  <line x1="560" y1="150" x2="560" y2="175" stroke="#059669" stroke-width="1.5"/>
  <line x1="620" y1="145" x2="620" y2="175" stroke="#059669" stroke-width="1.5"/>
  <!-- 问号 -->
  <text x="620" y="170" text-anchor="middle" fill="#b45309" font-size="14" font-family="sans-serif">?</text>
  <text x="560" y="168" text-anchor="middle" fill="#b45309" font-size="10" font-family="sans-serif">卡壳了!</text>
  
  <text x="595" y="240" text-anchor="middle" fill="#1e3a5f" font-size="11" font-family="sans-serif">在第一个路口就卡住了</text>
  <text x="595" y="262" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">→ 这才发现原来根本没记住</text>
  <text x="595" y="282" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">→ 卡壳处 = 真正的学习收获</text>
  
  <rect x="470" y="305" width="250" height="55" rx="8" fill="#d1fae5" stroke="#16a34a" stroke-width="1"/>
  <text x="595" y="327" text-anchor="middle" fill="#059669" font-size="10" font-family="sans-serif">判断是否真懂的唯一标准：</text>
  <text x="595" y="347" text-anchor="middle" fill="#b45309" font-size="10" font-weight="bold" font-family="sans-serif">能不能讲给别人听</text>
</svg>