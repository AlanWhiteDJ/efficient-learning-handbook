<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f8fafc"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  
  <text x="400" y="28" text-anchor="middle" fill="#1e3a5f" font-size="17" font-weight="bold" font-family="sans-serif">合书拷问四步法</text>
  <text x="400" y="46" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">每一次费力提取，对记忆的强化超过十次轻松重读</text>
  
  <!-- 四个卡片 -->
  <!-- 卡片1 -->
  <rect x="25" y="70" width="175" height="160" rx="10" fill="#f8fafc" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="112" cy="100" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="112" y="106" text-anchor="middle" fill="#b45309" font-size="16" font-weight="bold" font-family="sans-serif">1</text>
  <text x="112" y="140" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="sans-serif">学完立刻合书</text>
  <text x="112" y="160" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">看完一节内容</text>
  <text x="112" y="175" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">马上合上，不犹豫</text>
  <text x="112" y="195" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">不"再看一眼确认"</text>

  <!-- 箭头1 -->
  <path d="M205,150 L220,150" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>
  <defs><marker id="a1" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#94a3b8"/></marker></defs>
  
  <!-- 卡片2 -->
  <rect x="228" y="70" width="175" height="160" rx="10" fill="#f8fafc" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="315" cy="100" r="18" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="315" y="106" text-anchor="middle" fill="#dc2626" font-size="16" font-weight="bold" font-family="sans-serif">2</text>
  <text x="315" y="140" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold" font-family="sans-serif">脑中硬想</text>
  <text x="315" y="160" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">问自己：这节讲了什么？</text>
  <text x="315" y="175" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">关键词/核心逻辑</text>
  <text x="315" y="195" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">哪怕只想起来30%！</text>
  
  <path d="M408,150 L423,150" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>
  
  <!-- 卡片3 -->
  <rect x="430" y="70" width="175" height="160" rx="10" fill="#f8fafc" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="517" cy="100" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="517" y="106" text-anchor="middle" fill="#2563eb" font-size="16" font-weight="bold" font-family="sans-serif">3</text>
  <text x="517" y="140" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="bold" font-family="sans-serif">翻开核对</text>
  <text x="517" y="160" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">看看漏了什么</text>
  <text x="517" y="175" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">记错了什么</text>
  <text x="517" y="195" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">标记"漏洞点"</text>
  
  <path d="M610,150 L625,150" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>
  
  <!-- 卡片4 -->
  <rect x="633" y="70" width="145" height="160" rx="10" fill="#f8fafc" stroke="#16a34a" stroke-width="1.5"/>
  <circle cx="705" cy="100" r="18" fill="#d1fae5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="705" y="106" text-anchor="middle" fill="#059669" font-size="16" font-weight="bold" font-family="sans-serif">4</text>
  <text x="705" y="140" text-anchor="middle" fill="#059669" font-size="12" font-weight="bold" font-family="sans-serif">合上再来</text>
  <text x="705" y="160" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">重点回忆标记漏洞</text>
  <text x="705" y="175" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">这次应能想起更多</text>
  
  <!-- 底部：关键原则 -->
  <text x="400" y="275" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="sans-serif">⚠ 关键原则</text>
  
  <rect x="80" y="295" width="640" height="100" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  
  <text x="120" y="322" fill="#1e3a5f" font-size="11" font-family="sans-serif">🔒 必须在合上书的条件下回忆</text>
  <text x="120" y="345" fill="#94a3b8" font-size="10" font-family="sans-serif">翻着书"回忆"是作弊，骗的是自己</text>
  
  <text x="400" y="322" fill="#1e3a5f" font-size="11" font-family="sans-serif">✅ 允许自己想不起来</text>
  <text x="400" y="345" fill="#94a3b8" font-size="10" font-family="sans-serif">想不起来=发现漏洞，不是失败</text>
  
  <text x="620" y="322" fill="#1e3a5f" font-size="11" font-family="sans-serif">🧠 在脑子里过就行</text>
  <text x="620" y="345" fill="#94a3b8" font-size="10" font-family="sans-serif">不用写下来，节省时间</text>
  
  <text x="400" y="410" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">10分钟合书回想的效果 > 30分钟反复阅读</text>
</svg>