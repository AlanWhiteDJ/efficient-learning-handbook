<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  
  <text x="400" y="28" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">内驱力三支柱——为什么被逼着学就不想学</text>
  <text x="400" y="48" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">内驱力 = 胜任感 + 归属感 + 自主感</text>
  
  <!-- 三根柱子撑起 -->
  <rect x="150" y="80" width="500" height="50" rx="10" fill="#166534" stroke="#4ade80" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" fill="#4ade80" font-size="20" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🔥 内 驱 力</text>
  
  <!-- 横梁 -->
  <rect x="180" y="130" width="440" height="12" rx="4" fill="#334155"/>
  
  <!-- 柱子1 -->
  <rect x="200" y="142" width="100" height="240" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="250" y="200" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" transform="rotate(-90,250,200)">胜任感</text>
  <text x="250" y="340" text-anchor="middle" fill="#93c5fd" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">我能行</text>
  
  <!-- 柱子2 -->
  <rect x="350" y="142" width="100" height="240" rx="6" fill="#78350f" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" transform="rotate(-90,400,200)">归属感</text>
  <text x="400" y="340" text-anchor="middle" fill="#fcd34d" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">不是一个人</text>
  
  <!-- 柱子3：被抽掉 -->
  <rect x="500" y="142" width="100" height="240" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="550" y="200" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" transform="rotate(-90,550,200)">自主感</text>
  <text x="550" y="340" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">被剥夺 ✕</text>
  
  <!-- 柱子3位置偏移 -->
  <line x1="550" y1="200" x2="550" y2="260" stroke="#ef4444" stroke-width="2"/>
  <text x="570" y="250" text-anchor="middle" fill="#ef4444" font-size="14" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">↘</text>
  
  <!-- 整体倒塌效果：内驱力倾斜 -->
  <path d="M220,115 L530,130" stroke="#f87171" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="650" y="120" text-anchor="middle" fill="#f87171" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">⚠ 结构不稳!</text>
  
  <!-- 底部 -->
  <rect x="120" y="395" width="560" height="3" rx="1" fill="#1e293b"/>
  <text x="400" y="415" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 学习内容、方式、时间全被规定好 → 自主感缺席 → 内驱力坍塌</text>
</svg>