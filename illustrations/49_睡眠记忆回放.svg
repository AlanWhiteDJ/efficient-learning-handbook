<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f59e0b">睡眠记忆回放</text>
  
  <!-- Brain outline (cloud shape for cortex) -->
  <ellipse cx="480" cy="200" rx="140" ry="90" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
  <ellipse cx="420" cy="180" rx="70" ry="50" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="540" cy="170" rx="65" ry="45" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="480" cy="200" rx="100" ry="65" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <text x="480" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#60a5fa" opacity="0.7">大脑皮质(云状)</text>
  
  <!-- Hippocampus (crescent moon shape) -->
  <path d="M240 200 Q220 140 270 110 Q340 70 340 140 Q340 200 270 230 Q220 260 240 200Z" fill="none" stroke="#c084fc" stroke-width="2.5"/>
  <path d="M245 200 Q230 148 270 120 Q325 88 325 148 Q325 195 270 220 Q230 245 245 200Z" fill="rgba(168,85,247,0.15)" stroke="none"/>
  <text x="280" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c084fc" opacity="0.7">海马体(弯月形)</text>
  
  <!-- Signal waves from hippocampus to cortex -->
  <path d="M310 170 Q340 150 370 170" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M310 180 Q345 155 380 178" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <path d="M310 190 Q340 165 375 188" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.3s" repeatCount="indefinite"/>
  </path>
  <path d="M310 200 Q345 180 380 200" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.6s" repeatCount="indefinite"/>
  </path>
  
  <!-- Small wave dots -->
  <circle cx="330" cy="160" r="3" fill="#fbbf24" opacity="0.8">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="195" r="3" fill="#fbbf24" opacity="0.7">
    <animate attributeName="opacity" values="0.1;0.8;0.1" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="345" cy="175" r="2.5" fill="#fbbf24" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Replay button icon -->
  <g transform="translate(400,140)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M-6,-8 L-6,8 L8,0 Z" fill="#22c55e"/>
  </g>
  <text x="400" y="168" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#22c55e" opacity="0.8">replay</text>
  
  <!-- Flow arrows and labels at bottom -->
  <rect x="30" y="310" rx="6" ry="6" width="120" height="34" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="90" y="332" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f59e0b">睡前复习</text>
  
  <text x="165" y="332" font-family="sans-serif" font-size="16" fill="#475569">→</text>
  
  <rect x="185" y="310" rx="6" ry="6" width="125" height="34" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="247" y="332" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#60a5fa">进入夜班队列</text>
  
  <text x="325" y="332" font-family="sans-serif" font-size="16" fill="#475569">→</text>
  
  <rect x="345" y="306" rx="6" ry="6" width="120" height="42" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="405" y="324" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#22c55e" font-weight="bold">慢波睡眠</text>
  <text x="405" y="339" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#22c55e">replay</text>
  
  <text x="480" y="332" font-family="sans-serif" font-size="16" fill="#475569">→</text>
  
  <rect x="500" y="310" rx="6" ry="6" width="110" height="34" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
  <text x="555" y="332" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c084fc">皮质转存</text>
  
  <text x="625" y="332" font-family="sans-serif" font-size="16" fill="#475569">→</text>
  
  <rect x="645" y="310" rx="6" ry="6" width="100" height="34" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="695" y="332" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f59e0b">醒来复习</text>
  
  <!-- Moon icon top left -->
  <g transform="translate(60,50)">
    <circle cx="0" cy="0" r="22" fill="#fbbf24" opacity="0.3"/>
    <path d="M-8,-14 A16 16 0 1 0 12,10 A18 18 0 0 1 -8,-14Z" fill="#fbbf24" opacity="0.8"/>
  </g>
  
  <!-- Zzz sleep markers -->
  <text x="85" y="42" font-family="sans-serif" font-size="12" fill="#fbbf24" opacity="0.5">Z</text>
  <text x="97" y="32" font-family="sans-serif" font-size="10" fill="#fbbf24" opacity="0.35">z</text>
  <text x="107" y="24" font-family="sans-serif" font-size="8" fill="#fbbf24" opacity="0.2">z</text>
  
  <!-- Bottom quote -->
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8" font-style="italic">"睡眠不是记忆的敌人，是最后一道固化工序"</text>
  
  <!-- Decorative line -->
  <line x1="60" y1="406" x2="740" y2="406" stroke="#334155" stroke-width="0.5"/>
  
  <!-- Footer -->
  <text x="400" y="470" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">记忆巩固机制 · Memory Consolidation · 慢波睡眠 · SWR</text>
</svg>