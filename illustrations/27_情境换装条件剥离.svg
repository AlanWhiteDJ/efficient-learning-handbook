<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#0f172a"/>
  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="20" font-weight="bold" fill="#f59e0b">情境换装 · 条件剥离</text>
  <line x1="310" y1="40" x2="490" y2="40" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>

  <!-- ===== 上半：情境换装 ===== -->
  <text x="400" y="60" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="13" font-weight="bold" fill="#34d399">情境换装：同一知识，多处提取</text>

  <!-- 厨房场景 -->
  <rect x="40" y="75" width="190" height="130" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="135" y="98" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="28">🍳</text>
  <text x="135" y="122" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#6ee7b7">厨房</text>
  <text x="135" y="140" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#94a3b8">烧水时锅盖滴水</text>
  <text x="135" y="155" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#94a3b8">→ 蒸发与凝结</text>
  <text x="135" y="175" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8" fill="#64748b">物态变化</text>
  <text x="135" y="190" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8" fill="#64748b">热传递</text>

  <!-- 阳台场景 -->
  <rect x="255" y="75" width="190" height="130" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="98" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="28">🪴</text>
  <text x="350" y="122" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#93c5fd">阳台</text>
  <text x="350" y="140" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#94a3b8">花盆掉落到地面</text>
  <text x="350" y="155" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#94a3b8">→ 自由落体</text>
  <text x="350" y="175" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8" fill="#64748b">重力加速度</text>
  <text x="350" y="190" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8" fill="#64748b">运动学公式</text>

  <!-- 公交站场景 -->
  <rect x="470" y="75" width="190" height="130" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="565" y="98" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="28">🚌</text>
  <text x="565" y="122" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#c4b5fd">公交站</text>
  <text x="565" y="140" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#94a3b8">急刹车人前倾</text>
  <text x="565" y="155" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#94a3b8">→ 惯性定律</text>
  <text x="565" y="175" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8" fill="#64748b">牛顿第一定律</text>
  <text x="565" y="190" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8" fill="#64748b">力与运动</text>

  <!-- 汇聚箭头 -->
  <line x1="135" y1="210" x2="290" y2="250" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <line x1="350" y1="210" x2="350" y2="250" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="565" y1="210" x2="410" y2="250" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>

  <!-- 中间：知识点 -->
  <ellipse cx="350" cy="270" rx="120" ry="30" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="350" y="275" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="11" font-weight="bold" fill="#fcd34d">同一知识内核</text>

  <!-- 分隔线 -->
  <line x1="60" y1="310" x2="740" y2="310" stroke="#334155" stroke-width="1"/>

  <!-- ===== 下半：条件剥离 ===== -->
  <text x="400" y="335" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="13" font-weight="bold" fill="#3b82f6">条件剥离：纯推导，去具体</text>

  <!-- 纯符号推导纸 -->
  <rect x="140" y="350" width="520" height="160" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <!-- 纸的折痕 -->
  <line x1="140" y1="430" x2="660" y2="430" stroke="#e2e8f0" stroke-width="1"/>

  <text x="180" y="378" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="13" font-weight="bold" fill="#1e293b">从 F = ma 出发：</text>
  <text x="180" y="400" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="12" fill="#334155">推导①：若 F 恒定 → a 恒定 → 匀加速运动</text>
  <text x="180" y="420" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="12" fill="#334155">推导②：F = ma → v = v₀ + at → x = v₀t + ½at²</text>
  <text x="180" y="445" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="12" fill="#334155">推导③：若 F = 0 → a = 0 → 匀速直线（惯性）</text>
  <text x="180" y="465" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="12" fill="#334155">推导④：W = F·s = ma·s → 功与动能关系</text>
  <text x="180" y="488" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="12" fill="#334155">推导⑤：……</text>

  <!-- 无具体物体的提示 -->
  <rect x="580" y="360" width="65" height="22" rx="4" fill="#dbeafe"/>
  <text x="612" y="375" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8" fill="#1d4ed8">无具体物体</text>

  <!-- 装饰光点 -->
  <circle cx="370" cy="375" r="3" fill="#f59e0b" opacity="0.5"/>
  <circle cx="450" cy="395" r="3" fill="#34d399" opacity="0.5"/>
  <circle cx="300" cy="440" r="3" fill="#a78bfa" opacity="0.5"/>

  <!-- 底部总结 -->
  <rect x="180" y="516" width="440" height="22" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="400" y="532" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#64748b">情境换装：从多个生活场景提取共同规律 → 条件剥离：去掉具体后纯逻辑推导</text>

  <!-- 编号 -->
  <circle cx="60" cy="26" r="16" fill="#f59e0b" opacity="0.3"/>
  <text x="60" y="32" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">27</text>
</svg>