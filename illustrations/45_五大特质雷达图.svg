<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <text x="400" y="30" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">五大学习特质雷达图——找到你的专属配置</text>
  <text x="400" y="50" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">没有最好的方法，只有最适合你的方法</text>
  
  <!-- 雷达图区域 -->
  <!-- 五边形背景 -->
  <polygon points="400,80 620,160 580,320 220,320 180,160" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  
  <!-- 网格线 -->
  <polygon points="400,120 565,190 535,300 265,300 235,190" fill="none" stroke="#334155" stroke-width="0.5"/>
  <polygon points="400,160 510,220 490,280 310,280 290,220" fill="none" stroke="#334155" stroke-width="0.5"/>
  <polygon points="400,200 455,250 445,260 355,260 345,250" fill="none" stroke="#334155" stroke-width="0.5"/>
  
  <!-- 轴线 -->
  <line x1="400" y1="80" x2="400" y2="200" stroke="#475569" stroke-width="0.5"/>
  <line x1="400" y1="80" x2="620" y2="160" stroke="#475569" stroke-width="0.5"/>
  <line x1="400" y1="80" x2="580" y2="320" stroke="#475569" stroke-width="0.5"/>
  <line x1="400" y1="80" x2="220" y2="320" stroke="#475569" stroke-width="0.5"/>
  <line x1="400" y1="80" x2="180" y2="160" stroke="#475569" stroke-width="0.5"/>
  
  <!-- 示例雷达1：外向型学习者（蓝色） -->
  <polygon points="400,100 600,155 570,240 230,240 200,155" fill="#3b82f6" opacity="0.15" stroke="#60a5fa" stroke-width="2"/>
  <!-- 示例雷达2：内向型学习者（橙色） -->
  <polygon points="400,150 480,185 480,295 320,295 320,185" fill="#f59e0b" opacity="0.15" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- 标签 -->
  <text x="400" y="72" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">能量节奏</text>
  <text x="640" y="165" text-anchor="start" fill="#60a5fa" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">刺激偏好</text>
  <text x="595" y="340" text-anchor="start" fill="#60a5fa" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">社交偏好</text>
  <text x="200" y="340" text-anchor="end" fill="#60a5fa" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">启动难易</text>
  <text x="155" y="165" text-anchor="end" fill="#60a5fa" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">注意稳定性</text>
  
  <!-- 图例 -->
  <rect x="390" y="358" width="220" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <line x1="405" y1="378" x2="455" y2="378" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="465" y="383" fill="#60a5fa" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">外向型：需要讨论·有声环境·社交驱动</text>
  
  <line x1="405" y1="403" x2="455" y2="403" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="465" y="408" fill="#fbbf24" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">内向型：需要独处·安静环境·写作内化</text>
  
  <!-- 说明 -->
  <text x="400" y="455" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">了解自己的五大特质 → 从本书18章中匹配合适的方法组合</text>
  
  <!-- 底部CTA -->
  <rect x="200" y="470" width="400" height="24" rx="6" fill="#166534" stroke="#22c55e" stroke-width="0.5"/>
  <text x="400" y="487" text-anchor="middle" fill="#4ade80" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">特征没有好坏，只有特点 → 制作你自己的"个人学习配置表"</text>
</svg>