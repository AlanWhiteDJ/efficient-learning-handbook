<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0f172a"/>
  <defs>
    <linearGradient id="noteG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowGold"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" letter-spacing="2">执 行 意 图  ×  两 分 钟 法 则</text>

  <!-- ===== 左侧：便利贴 ===== -->
  <text x="250" y="55" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">📝 执行意图模板</text>

  <g transform="translate(60, 75)" filter="url(#shadow)">
    <!-- 便利贴 -->
    <rect x="0" y="0" width="380" height="200" rx="4" fill="url(#noteG)" stroke="#f59e0b" stroke-width="1"/>
    <!-- 顶部胶带 -->
    <rect x="140" y="-8" width="100" height="20" rx="2" fill="#d1d5db" opacity="0.6"/>

    <!-- 标题 -->
    <text x="190" y="35" text-anchor="middle" fill="#78350f" font-size="14" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">执行意图 · Implementation Intention</text>
    <line x1="25" y1="48" x2="355" y2="48" stroke="#d97706" stroke-width="0.8"/>

    <!-- 模板 -->
    <g transform="translate(30, 65)">
      <text x="0" y="0" fill="#78350f" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
        当 <tspan font-style="italic" fill="#dc2626">______</tspan> 的时候，
      </text>
      <text x="0" y="30" fill="#78350f" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
        我就在 <tspan font-style="italic" fill="#3b82f6">______</tspan>
      </text>
      <text x="0" y="60" fill="#78350f" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
        做 <tspan font-style="italic" fill="#059669">______</tspan>
      </text>
    </g>

    <line x1="25" y1="145" x2="355" y2="145" stroke="#d97706" stroke-width="0.5" stroke-dasharray="4,3"/>

    <!-- 填写示例 -->
    <g transform="translate(30, 158)">
      <text x="0" y="0" fill="#78350f" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
        <tspan font-weight="bold">示例：</tspan>当
      </text>
      <text x="45" y="0" fill="#dc2626" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">放下碗筷</text>
      <text x="120" y="0" fill="#78350f" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">的时候，我就在</text>
      <text x="210" y="0" fill="#3b82f6" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">书桌前</text>
      <text x="270" y="0" fill="#78350f" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">做</text>
      <text x="288" y="0" fill="#059669" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">翻开数学书</text>
    </g>

    <text x="190" y="190" text-anchor="middle" fill="#d97706" font-size="8" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🔑 关键：触发条件要具体、可感知</text>
  </g>

  <!-- ===== 右侧：2分钟计时器 ===== -->
  <text x="550" y="55" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">⏱ 两分钟法则</text>

  <g transform="translate(475, 80)" filter="url(#glowGold)">
    <!-- 计时器外圈 -->
    <circle cx="100" cy="110" r="90" fill="none" stroke="#475569" stroke-width="2"/>
    <circle cx="100" cy="110" r="80" fill="#0f172a" stroke="#34d399" stroke-width="3"/>
    <!-- 进度环（部分） -->
    <path d="M100,30 A80,80 0 0,1 180,110" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round"/>
    <path d="M100,30 A80,80 0 0,0 65,60" fill="none" stroke="#34d399" stroke-width="2" opacity="0.5"/>

    <!-- 计时器内容 -->
    <circle cx="100" cy="110" r="65" fill="#064e3b"/>
    <text x="100" y="105" text-anchor="middle" fill="#34d399" font-size="40" font-weight="bold" font-family="monospace">02:00</text>
    <text x="100" y="130" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">分钟倒计时</text>
    <!-- 秒点 -->
    <circle cx="100" cy="140" r="2" fill="#34d399" opacity="0.8"/>
    <circle cx="100" cy="148" r="1.5" fill="#34d399" opacity="0.5"/>

    <!-- 计时器旋钮 -->
    <circle cx="100" cy="27" r="6" fill="#475569" stroke="#34d399" stroke-width="1"/>
    <circle cx="100" cy="27" r="2" fill="#34d399"/>
  </g>

  <!-- 配文 -->
  <g transform="translate(475, 290)" filter="url(#shadow)">
    <rect x="0" y="0" width="290" height="80" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
    <text x="145" y="28" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">只做2分钟</text>
    <text x="145" y="52" text-anchor="middle" fill="#34d399" font-size="14" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">允许自己随时停 ✋</text>
    <text x="145" y="72" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">但往往一做就停不下来...</text>
  </g>

  <!-- ===== 底部：两者结合 ===== -->
  <g transform="translate(60, 310)" filter="url(#shadow)">
    <rect x="0" y="0" width="700" height="170" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="350" y="30" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🔗 执行意图 + 两分钟法则 = 启动双保险</text>

    <!-- 步骤1 -->
    <g transform="translate(30, 55)">
      <circle cx="15" cy="18" r="15" fill="#f59e0b"/>
      <text x="15" y="23" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">1</text>
      <text x="45" y="16" fill="#fcd34d" font-size="12" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">设触发</text>
      <text x="45" y="33" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">当 [具体情境] 时 → 自动化启动</text>
    </g>

    <!-- 步骤2 -->
    <g transform="translate(270, 55)">
      <circle cx="15" cy="18" r="15" fill="#3b82f6"/>
      <text x="15" y="23" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">2</text>
      <text x="45" y="16" fill="#93c5fd" font-size="12" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">降门槛</text>
      <text x="45" y="33" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">只做2分钟 → 零压力开始</text>
    </g>

    <!-- 步骤3 -->
    <g transform="translate(520, 55)">
      <circle cx="15" cy="18" r="15" fill="#34d399"/>
      <text x="15" y="23" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">3</text>
      <text x="45" y="16" fill="#6ee7b7" font-size="12" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">入心流</text>
      <text x="45" y="33" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">启动惯性 → 越学越深</text>
    </g>

    <line x1="30" y1="105" x2="670" y2="105" stroke="#475569" stroke-width="0.5"/>

    <text x="350" y="128" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">💡 核心原理</text>
    <text x="350" y="150" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">大脑抗拒的是"开始"这个决定，不是学习本身</text>
    <text x="350" y="166" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">把"开始"变成自动化反应，把"坚持"变成自然结果</text>
  </g>
</svg>