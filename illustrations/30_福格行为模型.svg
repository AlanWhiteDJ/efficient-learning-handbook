<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0f172a"/>
  <defs>
    <linearGradient id="gearM" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <linearGradient id="gearA" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="gearP" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <filter id="gs"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ec4899"/>
    </marker>
    <g id="gear34">
      <circle cx="0" cy="0" r="34" fill="none"/>
      <path d="M0,-45 L5,-38 L9,-41 L13,-33 L19,-34 L22,-24 L28,-23 L28,-12 L35,-11 L33,0 L35,11 L28,12 L28,23 L22,24 L19,34 L13,33 L9,41 L5,38 L0,45 L-5,38 L-9,41 L-13,33 L-19,34 L-22,24 L-28,23 L-28,12 L-35,11 L-33,0 L-35,-11 L-28,-12 L-28,-23 L-22,-24 L-19,-34 L-13,-33 L-9,-41 L-5,-38 Z" fill="currentColor"/>
    </g>
    <g id="gear28">
      <path d="M0,-38 L4,-32 L8,-35 L11,-28 L16,-29 L19,-20 L24,-19 L24,-10 L30,-9 L28,0 L30,9 L24,10 L24,19 L19,20 L16,29 L11,28 L8,35 L4,32 L0,38 L-4,32 L-8,35 L-11,28 L-16,29 L-19,20 L-24,19 L-24,10 L-30,9 L-28,0 L-30,-9 L-24,-10 L-24,-19 L-19,-20 L-16,-29 L-11,-28 L-8,-35 L-4,-32 Z" fill="currentColor"/>
    </g>
  </defs>

  <text x="400" y="28" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="sans-serif" letter-spacing="2">福格行为模型 B=MAP · 三要素啮合</text>

  <!-- 动机齿轮（大）金色 -->
  <g transform="translate(230, 150)" filter="url(#gs)">
    <circle cx="0" cy="0" r="55" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
    <use href="#gear34" transform="scale(1.3)" fill="url(#gearM)"/>
    <circle cx="0" cy="0" r="22" fill="#0f172a"/>
    <circle cx="0" cy="0" r="18" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
    <circle cx="0" cy="0" r="5" fill="#f59e0b"/>
    <text x="0" y="-72" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="bold" font-family="sans-serif">动机 Motivation</text>
    <text x="0" y="-59" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="sans-serif">我想学好</text>
  </g>

  <!-- 能力齿轮（中）蓝色 -->
  <g transform="translate(370, 290)" filter="url(#gs)">
    <circle cx="0" cy="0" r="48" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <use href="#gear28" transform="scale(1.4)" fill="url(#gearA)"/>
    <circle cx="0" cy="0" r="18" fill="#0f172a"/>
    <circle cx="0" cy="0" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#3b82f6"/>
    <text x="0" y="-62" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold" font-family="sans-serif">能力 Ability</text>
    <text x="0" y="-49" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="sans-serif">我能做到</text>
    <text x="0" y="-37" text-anchor="middle" fill="#60a5fa" font-size="8" font-family="sans-serif">（足够简单）</text>
  </g>

  <!-- 提示齿轮（小）绿色 -->
  <g transform="translate(540, 170)" filter="url(#gs)">
    <circle cx="0" cy="0" r="42" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
    <use href="#gear28" transform="scale(1.2)" fill="url(#gearP)"/>
    <circle cx="0" cy="0" r="15" fill="#0f172a"/>
    <circle cx="0" cy="0" r="11" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
    <circle cx="0" cy="0" r="3.5" fill="#34d399"/>
    <text x="0" y="-55" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold" font-family="sans-serif">提示 Prompt</text>
    <text x="0" y="-42" text-anchor="middle" fill="#34d399" font-size="9" font-family="sans-serif">如果-那么</text>
  </g>

  <!-- 齿轮啮合箭头指示 -->
  <path d="M285,200 Q310,230 350,270" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M400,310 Q460,280 520,200" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 输出箭头 -->
  <path d="M560,210 Q610,190 640,195" fill="none" stroke="#ec4899" stroke-width="2.5" marker-end="url(#arrowPink)"/>
  <!-- 输出：行为发生 -->
  <g transform="translate(650, 180)" filter="url(#glow)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#831843" stroke="#ec4899" stroke-width="2"/>
    <text x="60" y="17" text-anchor="middle" fill="#f9a8d4" font-size="10" font-weight="bold" font-family="sans-serif">⚡ 行为发生</text>
    <text x="60" y="32" text-anchor="middle" fill="#fbcfe8" font-size="9" font-family="sans-serif">Behavior</text>
  </g>

  <!-- 同步转动指示 -->
  <text x="300" y="380" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">▲ 三个齿轮同时啮合转动 → 行为自然发生</text>

  <!-- ===== 下半：便利贴示例 ===== -->
  <g transform="translate(50, 390)" filter="url(#gs)">
    <!-- 便利贴 -->
    <rect x="0" y="0" width="340" height="95" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" transform="rotate(-3, 170, 47)"/>
    <!-- 图钉 -->
    <circle cx="170" cy="10" r="6" fill="#ef4444"/>
    <circle cx="170" cy="10" r="3" fill="#dc2626"/>
    <!-- 便利贴内容 -->
    <text x="30" y="35" fill="#78350f" font-size="13" font-weight="bold" font-family="sans-serif" transform="rotate(-3, 170, 47)">📝 执行意图示例</text>
    <line x1="25" y1="45" x2="315" y2="45" stroke="#f59e0b" stroke-width="0.5" transform="rotate(-3, 170, 47)"/>
    <text x="30" y="62" fill="#78350f" font-size="12" font-family="sans-serif" transform="rotate(-3, 170, 47)"><tspan font-weight="bold" fill="#dc2626">如果</tspan> 放下碗筷，</text>
    <text x="30" y="82" fill="#78350f" font-size="12" font-family="sans-serif" transform="rotate(-3, 170, 47)"><tspan font-weight="bold" fill="#dc2626">那么</tspan> 我就坐到书桌前翻开数学书</text>
  </g>

  <!-- 右侧：B=MAP公式 -->
  <g transform="translate(440, 410)">
    <rect x="0" y="0" width="310" height="70" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="155" y="30" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="bold" font-family="sans-serif">B = MAP</text>
    <text x="155" y="55" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">行为 = 动机 × 能力 × 提示  （缺一不可）</text>
  </g>
</svg>