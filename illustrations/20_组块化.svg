<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  
  <text x="400" y="28" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">组块化：给大脑"扩容"</text>
  <text x="400" y="48" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">工作记忆只有4个位置——把信息打包成组块</text>
  
  <!-- 左：散装 -->
  <rect x="20" y="70" width="370" height="320" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="205" y="100" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">❌ 散装信息：占满工作台</text>
  
  <rect x="60" y="120" width="290" height="80" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="0.8"/>
  <text x="205" y="145" text-anchor="middle" fill="#fca5a5" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">工作台面（4格）→ 11个数字挤不下</text>
  
  <!-- 数字散落 -->
  <rect x="75" y="155" width="38" height="22" rx="3" fill="#7f1d1d" stroke="#f87171" stroke-width="0.5"/>
  <text x="94" y="171" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">1</text>
  <rect x="118" y="155" width="38" height="22" rx="3" fill="#7f1d1d" stroke="#f87171" stroke-width="0.5"/>
  <text x="137" y="171" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">3</text>
  <rect x="161" y="155" width="38" height="22" rx="3" fill="#7f1d1d" stroke="#f87171" stroke-width="0.5"/>
  <text x="180" y="171" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">9</text>
  <rect x="204" y="155" width="38" height="22" rx="3" fill="#7f1d1d" stroke="#f87171" stroke-width="0.5"/>
  <text x="223" y="171" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">1</text>
  <rect x="247" y="155" width="38" height="22" rx="3" fill="#7f1d1d" stroke="#f87171" stroke-width="0.5"/>
  <text x="266" y="171" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">2</text>
  
  <!-- 溢出 -->
  <text x="330" y="170" text-anchor="middle" fill="#f87171" font-size="14" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→溢出!</text>
  
  <text x="205" y="230" text-anchor="middle" fill="#f1f5f9" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">大脑状态：颠三倒四、丢三落四</text>
  <text x="205" y="255" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">11个独立单元 = 11个注意力负担</text>
  
  <rect x="80" y="280" width="250" height="40" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="205" y="300" text-anchor="middle" fill="#fca5a5" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">脑子转不动 · 跟不上了 · 发呆</text>
  <text x="205" y="314" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 被误判为"不够聪明"</text>
  
  <!-- 中间箭头 -->
  <rect x="360" y="200" width="80" height="35" rx="8" fill="#166534" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="222" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">组块化 →</text>
  
  <!-- 右：组块化 -->
  <rect x="410" y="70" width="370" height="320" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="595" y="100" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">✅ 组块化：释放大脑空间</text>
  
  <rect x="450" y="120" width="290" height="80" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="0.8"/>
  <text x="595" y="145" text-anchor="middle" fill="#86efac" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">工作台面（4格）→ 只占3格，空1格</text>
  
  <!-- 组块 -->
  <rect x="470" y="157" width="70" height="22" rx="4" fill="#166534" stroke="#4ade80" stroke-width="1"/>
  <text x="505" y="173" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">📦 139</text>
  
  <rect x="548" y="157" width="70" height="22" rx="4" fill="#166534" stroke="#4ade80" stroke-width="1"/>
  <text x="583" y="173" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">📦 1234</text>
  
  <rect x="626" y="157" width="70" height="22" rx="4" fill="#166534" stroke="#4ade80" stroke-width="1"/>
  <text x="661" y="173" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">📦 5678</text>
  
  <text x="595" y="230" text-anchor="middle" fill="#f1f5f9" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">大脑状态：从容、有余力思考本质</text>
  <text x="595" y="255" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">3个组块 = 3个注意力单元</text>
  
  <rect x="480" y="280" width="230" height="40" rx="6" fill="#166534" stroke="#22c55e" stroke-width="1"/>
  <text x="595" y="300" text-anchor="middle" fill="#4ade80" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">空出的脑力 → 思考"这道题的本质"</text>
  <text x="595" y="314" text-anchor="middle" fill="#4ade80" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">而不是费力记住每一个数字</text>
</svg>