<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="sans-serif">艾宾浩斯遗忘曲线 + 12121 复习法</text>
  <text x="400" y="50" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">在遗忘发生前复习，而不是遗忘后补救</text>
  
  <!-- 坐标轴 -->
  <line x1="60" y1="280" x2="720" y2="280" stroke="#475569" stroke-width="1.5"/>
  <line x1="60" y1="80" x2="60" y2="280" stroke="#475569" stroke-width="1.5"/>
  <text x="390" y="300" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">时间 →</text>
  <text x="45" y="185" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif" transform="rotate(-90,45,185)">记忆保留率</text>
  
  <!-- 遗忘曲线 -->
  <path d="M60,100 Q140,130 200,195 Q260,230 340,250 Q460,265 600,272 Q680,275 720,278" fill="none" stroke="url(#curveGrad)" stroke-width="3"/>
  
  <!-- 数据点 -->
  <circle cx="60" cy="100" r="5" fill="#34d399"/>
  <text x="60" y="92" text-anchor="middle" fill="#34d399" font-size="9" font-family="sans-serif">100%</text>
  
  <circle cx="160" cy="160" r="5" fill="#f59e0b"/>
  <text x="160" y="152" text-anchor="middle" fill="#f87171" font-size="9" font-family="sans-serif">~40%</text>
  <text x="160" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">1天后</text>
  
  <circle cx="280" cy="225" r="5" fill="#f59e0b"/>
  <text x="280" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">7天后</text>
  
  <circle cx="440" cy="265" r="5" fill="#f59e0b"/>
  <text x="440" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">14天后</text>
  
  <circle cx="620" cy="275" r="5" fill="#f59e0b"/>
  <text x="620" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">30天后</text>
  
  <!-- 复习点注解 -->
  <text x="160" y="170" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold" font-family="sans-serif">⚠ 24h遗忘60%+</text>
  
  <!-- 下半部分：12121 时间轴 -->
  <line x1="60" y1="350" x2="720" y2="350" stroke="#334155" stroke-width="2"/>
  
  <!-- 时间轴上的复习节点 -->
  <circle cx="120" cy="350" r="12" fill="#064e3b" stroke="#34d399" stroke-width="2.5"/>
  <text x="120" y="354" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold" font-family="sans-serif">1</text>
  <text x="120" y="380" text-anchor="middle" fill="#f1f5f9" font-size="10" font-family="sans-serif">第1天</text>
  <text x="120" y="395" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">当日快速回顾</text>
  
  <circle cx="220" cy="350" r="12" fill="#064e3b" stroke="#34d399" stroke-width="2.5"/>
  <text x="220" y="354" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold" font-family="sans-serif">2</text>
  <text x="220" y="380" text-anchor="middle" fill="#f1f5f9" font-size="10" font-family="sans-serif">第2天</text>
  <text x="220" y="395" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">首次复习·查漏</text>
  
  <circle cx="370" cy="350" r="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="354" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold" font-family="sans-serif">1</text>
  <text x="370" y="380" text-anchor="middle" fill="#f1f5f9" font-size="10" font-family="sans-serif">第1周</text>
  <text x="370" y="395" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">二次复习</text>
  
  <circle cx="520" cy="350" r="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="520" y="354" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold" font-family="sans-serif">2</text>
  <text x="520" y="380" text-anchor="middle" fill="#f1f5f9" font-size="10" font-family="sans-serif">第2周</text>
  <text x="520" y="395" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">三次复习</text>
  
  <circle cx="670" cy="350" r="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="354" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold" font-family="sans-serif">1</text>
  <text x="670" y="380" text-anchor="middle" fill="#f1f5f9" font-size="10" font-family="sans-serif">第1个月</text>
  <text x="670" y="395" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">四次复习·固化</text>
  
  <!-- 连线 -->
  <line x1="132" y1="350" x2="208" y2="350" stroke="#34d399" stroke-width="1.5"/>
  <line x1="232" y1="350" x2="358" y2="350" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="382" y1="350" x2="508" y2="350" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="532" y1="350" x2="658" y2="350" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- 底部关键原则 -->
  <rect x="180" y="430" width="440" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="452" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold" font-family="sans-serif">关键原则：每次不超过5分钟 · 必须合上书 · 漏掉一天补上就好</text>
  <text x="400" y="470" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">这不是打卡，是提醒你"什么时候该看一眼"</text>
</svg>