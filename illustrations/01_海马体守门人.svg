<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" fill="#1e3a5f" font-size="22" font-weight="bold" font-family="sans-serif">海马体：大脑的"守门人"</text>
  <text x="400" y="60" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="sans-serif">生存优先律——只放行"生存刚需"信息，其余全部过滤</text>

  <!-- 左区域: 短期记忆 -->
  <rect x="20" y="80" width="170" height="350" rx="14" fill="#eff6ff" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="25" y="85" width="160" height="28" rx="6" fill="#1e3a5f"/>
  <text x="105" y="103" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold" font-family="sans-serif">📥 短期记忆区</text>
  <text x="105" y="125" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">海量信息涌入</text>

  <!-- 信息条目 -->
  <rect x="40" y="140" width="130" height="26" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="105" y="158" text-anchor="middle" fill="#334155" font-size="11" font-family="sans-serif">📖 课文内容</text>
  <rect x="40" y="174" width="130" height="26" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="105" y="192" text-anchor="middle" fill="#334155" font-size="11" font-family="sans-serif">📐 数学公式</text>
  <rect x="40" y="208" width="130" height="26" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="105" y="226" text-anchor="middle" fill="#334155" font-size="11" font-family="sans-serif">🔤 英语单词</text>
  <rect x="40" y="242" width="130" height="26" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="105" y="260" text-anchor="middle" fill="#334155" font-size="11" font-family="sans-serif">🧪 化学方程式</text>
  <rect x="40" y="276" width="130" height="26" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="105" y="294" text-anchor="middle" fill="#334155" font-size="11" font-family="sans-serif">📅 历史年代</text>
  <rect x="40" y="310" width="130" height="26" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="105" y="328" text-anchor="middle" fill="#334155" font-size="11" font-family="sans-serif">🎵 歌词旋律</text>
  <rect x="40" y="344" width="130" height="26" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="105" y="362" text-anchor="middle" fill="#334155" font-size="11" font-family="sans-serif">💬 闲聊内容</text>

  <!-- 箭头: 短期 → 海马体 -->
  <line x1="195" y1="250" x2="255" y2="250" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <text x="225" y="240" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">全部</text>
  <text x="225" y="268" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">流入</text>

  <!-- 中间: 海马体安检 -->
  <rect x="260" y="100" width="150" height="300" rx="14" fill="#fffbeb" stroke="url(#gold)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="270" y="108" width="130" height="28" rx="6" fill="#fef3c7"/>
  <text x="335" y="126" text-anchor="middle" fill="#b45309" font-size="15" font-weight="bold" font-family="sans-serif">🛡️ 海马体</text>
  <text x="335" y="150" text-anchor="middle" fill="#b45309" font-size="11" font-family="sans-serif">← 信息安检门 →</text>

  <line x1="280" y1="162" x2="390" y2="162" stroke="#b45309" stroke-width="0.8" stroke-dasharray="5,3"/>

  <!-- 放行条件 -->
  <rect x="275" y="172" width="120" height="22" rx="4" fill="#d1fae5" stroke="#34d399" stroke-width="0.8"/>
  <text x="335" y="187" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">✅ 生存相关</text>
  <rect x="275" y="200" width="120" height="22" rx="4" fill="#d1fae5" stroke="#34d399" stroke-width="0.8"/>
  <text x="335" y="215" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">✅ 情绪标记</text>
  <rect x="275" y="228" width="120" height="22" rx="4" fill="#d1fae5" stroke="#34d399" stroke-width="0.8"/>
  <text x="335" y="243" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">✅ 高频重复</text>

  <line x1="280" y1="258" x2="390" y2="258" stroke="#b45309" stroke-width="0.8" stroke-dasharray="5,3"/>

  <!-- 拒绝条件 -->
  <rect x="275" y="268" width="120" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="0.8"/>
  <text x="335" y="283" text-anchor="middle" fill="#dc2626" font-size="10" font-family="sans-serif">❌ 平淡信息</text>
  <rect x="275" y="296" width="120" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="0.8"/>
  <text x="335" y="311" text-anchor="middle" fill="#dc2626" font-size="10" font-family="sans-serif">❌ 无情绪波动</text>
  <rect x="275" y="324" width="120" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="0.8"/>
  <text x="335" y="339" text-anchor="middle" fill="#dc2626" font-size="10" font-family="sans-serif">❌ 一次出现</text>

  <!-- 通过箭头 -->
  <line x1="415" y1="225" x2="475" y2="225" stroke="#34d399" stroke-width="3" marker-end="url(#arrowG)"/>
  <text x="445" y="215" text-anchor="middle" fill="#34d399" font-size="9" font-family="sans-serif">通过</text>

  <!-- 拒绝箭头(向下) -->
  <line x1="335" y1="405" x2="335" y2="450" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- 右侧: 长期记忆 -->
  <rect x="480" y="80" width="170" height="350" rx="14" fill="#eff6ff" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="485" y="85" width="160" height="28" rx="6" fill="#1e3a5f"/>
  <text x="565" y="103" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold" font-family="sans-serif">🧠 大脑皮质</text>
  <text x="565" y="125" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">长期记忆（极少通过）</text>

  <!-- 通过留存的知识 -->
  <rect x="495" y="145" width="140" height="26" rx="5" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="565" y="163" text-anchor="middle" fill="#059669" font-size="10" font-family="sans-serif">⚠️ 危险经历：烫伤</text>
  <rect x="495" y="179" width="140" height="26" rx="5" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="565" y="197" text-anchor="middle" fill="#059669" font-size="10" font-family="sans-serif">😨 情绪瞬间：获奖</text>
  <rect x="495" y="213" width="140" height="26" rx="5" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="565" y="231" text-anchor="middle" fill="#059669" font-size="10" font-family="sans-serif">🔄 反复接触：乘法表</text>

  <text x="565" y="280" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">普通学习内容</text>
  <text x="565" y="298" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">难以穿透此层</text>

  <!-- 底部说明 -->
  <line x1="100" y1="455" x2="700" y2="455" stroke="#cbd5e1" stroke-width="0.5"/>

  <text x="400" y="478" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">💡 启示：想记住学习内容？给它绑上情绪、关联生存场景、高频重复</text>
</svg>