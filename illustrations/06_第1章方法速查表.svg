      <text x="0" y="0" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="0" fill="#94a3b8" font-family="sans-serif" font-size="11">记忆深刻不易忘</text>
      <text x="0" y="22" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="22" fill="#94a3b8" font-family="sans-serif" font-size="11">需要一定想象力</text>
      <text x="0" y="44" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="44" fill="#94a3b8" font-family="sans-serif" font-size="11">特别适合文科/外语</text>
    </g>

    <!-- Target audience -->
    <rect x="20" y="305" width="195" height="55" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <text x="117" y="323" text-anchor="middle" fill="#fde68a" font-family="sans-serif" font-size="10" font-weight="bold">🎯 适合人群</text>
    <text x="117" y="343" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">文科生 · 语言学习者 · 创意型</text>
  </g>

  <!-- === CARD 3: 狮子记忆法 (绿) === -->
  <g transform="translate(535,75)">
    <rect x="0" y="0" width="235" height="390" rx="14" fill="url(#greenGrad)" stroke="#34d399" stroke-width="2"/>

    <!-- Card header -->
    <rect x="0" y="0" width="235" height="75" rx="14" fill="#064e3b" opacity="0.8"/>
