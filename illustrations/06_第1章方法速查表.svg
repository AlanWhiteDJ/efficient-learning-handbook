<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#422006"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="52" fill="#1e293b" opacity="0.85"/>
  <text x="400" y="20" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="12" letter-spacing="4">第1章  ·  记忆方法速查表</text>

  <!-- === CARD 1: 12121 简便法 (蓝) === -->
  <g transform="translate(25,75)">
    <rect x="0" y="0" width="235" height="390" rx="14" fill="url(#blueGrad)" stroke="#3b82f6" stroke-width="2"/>

    <!-- Card header -->
    <rect x="0" y="0" width="235" height="75" rx="14" fill="#1e3a5f" opacity="0.8"/>
    <rect x="0" y="50" width="235" height="25" fill="#1e3a5f" opacity="0.8"/>

    <!-- Level badge -->
    <rect x="65" y="10" width="105" height="24" rx="12" fill="#3b82f6" opacity="0.3"/>
    <text x="117" y="27" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="11" font-weight="bold">🌱 简单入门</text>

