    <!-- Separator -->
    <line x1="30" y1="115" x2="205" y2="115" stroke="#34d399" stroke-width="1" opacity="0.4"/>

    <!-- Description -->
    <text x="15" y="145" fill="#94a3b8" font-family="sans-serif" font-size="12">
      <tspan x="15" dy="0">模拟生存压力的记忆：</tspan>
      <tspan x="15" dy="24" fill="#6ee7b7">• 饥饿时学习</tspan>
      <tspan x="15" dy="20" fill="#6ee7b7">• 走动背诵</tspan>
      <tspan x="15" dy="20" fill="#6ee7b7">• 低温环境</tspan>
      <tspan x="15" dy="20" fill="#6ee7b7">• 限时挑战</tspan>
      <tspan x="15" dy="20" fill="#6ee7b7">• 竞争心态</tspan>
    </text>

    <!-- Feature bullets -->
    <g transform="translate(15,250)">
      <text x="0" y="0" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="0" fill="#94a3b8" font-family="sans-serif" font-size="11">效果最强</text>
      <text x="0" y="22" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="22" fill="#94a3b8" font-family="sans-serif" font-size="11">激活生存本能</text>
      <text x="0" y="44" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="44" fill="#94a3b8" font-family="sans-serif" font-size="11">需要自律与坚持</text>
    </g>

    <!-- Target audience -->
    <rect x="20" y="305" width="195" height="55" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="1" opacity="0.7"/>
    <text x="117" y="323" text-anchor="middle" fill="#6ee7b7" font-family="sans-serif" font-size="10" font-weight="bold">🎯 适合人群</text>
    <text x="117" y="343" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">备考冲刺 · 高效学习者</text>
  </g>
