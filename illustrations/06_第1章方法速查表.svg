      <tspan x="15" dy="0">用情绪与故事绑定知识：</tspan>
      <tspan x="15" dy="24" fill="#fbbf24">• 谐音锚定</tspan>
      <tspan x="15" dy="20" fill="#fbbf24">• 夸张联想</tspan>
      <tspan x="15" dy="20" fill="#fbbf24">• 情绪标签</tspan>
      <tspan x="15" dy="20" fill="#fbbf24">• 场景代入</tspan>
      <tspan x="15" dy="20" fill="#fbbf24">• 制造反差</tspan>
    </text>

    <!-- Feature bullets -->
