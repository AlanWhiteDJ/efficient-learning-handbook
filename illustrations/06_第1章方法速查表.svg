    <text x="15" y="145" fill="#94a3b8" font-family="sans-serif" font-size="12">
      <tspan x="15" dy="0">学习后在以下间隔复习：</tspan>
      <tspan x="15" dy="24" font-weight="bold" fill="#60a5fa">1</tspan>
      <tspan y="169" fill="#cbd5e1"> 天后 → </tspan>
      <tspan font-weight="bold" fill="#60a5fa">2</tspan>
      <tspan fill="#cbd5e1"> 天后 → </tspan>
      <tspan font-weight="bold" fill="#60a5fa">1</tspan>
      <tspan fill="#cbd5e1"> 周后 → </tspan>
      <tspan font-weight="bold" fill="#60a5fa">2</tspan>
      <tspan fill="#cbd5e1"> 周后 → </tspan>
      <tspan font-weight="bold" fill="#60a5fa">1</tspan>
      <tspan fill="#cbd5e1"> 月后</tspan>
    </text>

    <!-- Feature bullets -->
    <g transform="translate(15,210)">
      <text x="0" y="0" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="0" fill="#94a3b8" font-family="sans-serif" font-size="11">零门槛，立即可用</text>
      <text x="0" y="22" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="22" fill="#94a3b8" font-family="sans-serif" font-size="11">科学间隔抗遗忘</text>
      <text x="0" y="44" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="44" fill="#94a3b8" font-family="sans-serif" font-size="11">无需额外工具</text>
      <text x="0" y="66" fill="#34d399" font-size="12">✓</text>
      <text x="20" y="66" fill="#94a3b8" font-family="sans-serif" font-size="11">适合所有科目</text>
    </g>

