<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#0f172a"/>
  <defs>
    <linearGradient id="blockG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
    <filter id="softSh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif" letter-spacing="2">90 分 钟 超 周 期 · 精 力 波 动 日 记</text>

  <!-- ===== 左：90分钟保护区块 ===== -->
  <g transform="translate(25, 45)" filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="490" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="170" y="30" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold" font-family="sans-serif">⏰ 90分钟保护区块</text>

    <!-- 大矩形标注 -->
    <rect x="20" y="50" width="300" height="180" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2.5"/>
    <!-- 内部分区 -->
    <rect x="20" y="50" width="300" height="40" rx="10" fill="#1e3a5f"/>
    <rect x="20" y="70" width="300" height="20" fill="#1e3a5f"/>
    <text x="170" y="75" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="bold" font-family="sans-serif">🔒 深度潜入一个主题</text>

    <!-- 不允许中断的图标 -->
    <g transform="translate(50, 110)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#ef4444" stroke-width="2.5"/>
      <text x="30" y="5" fill="#fca5a5" font-size="11" font-family="sans-serif">不查手机</text>
    </g>
    <g transform="translate(50, 145)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#ef4444" stroke-width="2.5"/>
      <text x="30" y="5" fill="#fca5a5" font-size="11" font-family="sans-serif">不切任务</text>
    </g>
    <g transform="translate(50, 180)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#ef4444" stroke-width="2.5"/>
      <text x="30" y="5" fill="#fca5a5" font-size="11" font-family="sans-serif">不被打断</text>
    </g>

    <!-- 时间轴 -->
    <rect x="15" y="245" width="310" height="4" rx="2" fill="#1e293b"/>
    <rect x="15" y="245" width="260" height="4" rx="2" fill="#3b82f6"/>
    <circle cx="275" cy="247" r="6" fill="#3b82f6"/>
    <text x="15" y="268" fill="#64748b" font-size="9" font-family="monospace">0min</text>
    <text x="160" y="268" text-anchor="middle" fill="#64748b" font-size="9" font-family="monospace">45min</text>
    <text x="315" y="268" text-anchor="end" fill="#64748b" font-size="9" font-family="monospace">90min</text>

    <!-- 深度状态 -->
    <g transform="translate(170, 310)">
      <text x="0" y="0" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="sans-serif">🧠 心流深度</text>
      <path d="M-80,35 Q-40,15 0,30 Q40,45 80,5 L80,10 Q40,50 0,35 Q-40,20 -80,40 Z" fill="#3b82f6" opacity="0.3"/>
      <path d="M-80,35 Q-40,15 0,30 Q40,45 80,5" fill="none" stroke="#3b82f6" stroke-width="2"/>
      <text x="-80" y="55" fill="#64748b" font-size="8" font-family="sans-serif">开始</text>
      <text x="80" y="18" fill="#64748b" font-size="8" font-family="sans-serif">峰值</text>
    </g>

    <!-- 90分钟结论 -->
    <rect x="30" y="390" width="280" height="45" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="170" y="412" text-anchor="middle" fill="#fcd34d" font-size="10" font-family="sans-serif">💡 人的专注周期 ≈ 90分钟</text>
    <text x="170" y="428" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">保护这个区块 = 保护最高产出</text>
  </g>

  <!-- ===== 右上：一周精力记录表 ===== -->
  <g transform="translate(385, 45)" filter="url(#shadow)">
    <rect x="0" y="0" width="390" height="210" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="195" y="22" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold" font-family="sans-serif">📊 一周精力记录（1-5分）</text>

    <!-- 表头 -->
    <text x="60" y="50" fill="#64748b" font-size="9" font-family="sans-serif">时段</text>
    <text x="110" y="38" fill="#64748b" font-size="8" font-family="sans-serif">一</text>
    <text x="150" y="38" fill="#64748b" font-size="8" font-family="sans-serif">二</text>
    <text x="190" y="38" fill="#64748b" font-size="8" font-family="sans-serif">三</text>
    <text x="230" y="38" fill="#64748b" font-size="8" font-family="sans-serif">四</text>
    <text x="270" y="38" fill="#64748b" font-size="8" font-family="sans-serif">五</text>
    <text x="310" y="38" fill="#64748b" font-size="8" font-family="sans-serif">六</text>
    <text x="350" y="38" fill="#64748b" font-size="8" font-family="sans-serif">日</text>

    <!-- 数据行 -->
    <!-- 8:00 -->
    <text x="45" y="68" fill="#94a3b8" font-size="10" font-family="sans-serif">8:00</text>
    <circle cx="110" cy="65" r="8" fill="#22c55e" opacity="0.8"/><text x="110" y="69" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">4</text>
    <circle cx="150" cy="65" r="8" fill="#f59e0b" opacity="0.8"/><text x="150" y="69" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">3</text>
    <circle cx="190" cy="65" r="8" fill="#22c55e" opacity="0.8"/><text x="190" y="69" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">4</text>
    <circle cx="230" cy="65" r="8" fill="#f97316" opacity="0.8"/><text x="230" y="69" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">2</text>
    <circle cx="270" cy="65" r="8" fill="#22c55e" opacity="0.8"/><text x="270" y="69" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">5</text>
    <circle cx="310" cy="65" r="8" fill="#f59e0b" opacity="0.8"/><text x="310" y="69" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">3</text>
    <circle cx="350" cy="65" r="8" fill="#ef4444" opacity="0.8"/><text x="350" y="69" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">1</text>

    <!-- 12:00 -->
    <text x="45" y="93" fill="#94a3b8" font-size="10" font-family="sans-serif">12:00</text>
    <circle cx="110" cy="90" r="8" fill="#ef4444" opacity="0.8"/><text x="110" y="94" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">2</text>
    <circle cx="150" cy="90" r="8" fill="#ef4444" opacity="0.8"/><text x="150" y="94" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">1</text>
    <circle cx="190" cy="90" r="8" fill="#ef4444" opacity="0.8"/><text x="190" y="94" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">2</text>
    <circle cx="230" cy="90" r="8" fill="#ef4444" opacity="0.8"/><text x="230" y="94" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">1</text>
    <circle cx="270" cy="90" r="8" fill="#ef4444" opacity="0.8"/><text x="270" y="94" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">2</text>
    <circle cx="310" cy="90" r="8" fill="#ef4444" opacity="0.8"/><text x="310" y="94" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">1</text>
    <circle cx="350" cy="90" r="8" fill="#ef4444" opacity="0.8"/><text x="350" y="94" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">1</text>

    <!-- 16:00 -->
    <text x="45" y="118" fill="#94a3b8" font-size="10" font-family="sans-serif">16:00</text>
    <circle cx="110" cy="115" r="8" fill="#22c55e" opacity="0.8"/><text x="110" y="119" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">5</text>
    <circle cx="150" cy="115" r="8" fill="#22c55e" opacity="0.8"/><text x="150" y="119" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">4</text>
    <circle cx="190" cy="115" r="8" fill="#22c55e" opacity="0.8"/><text x="190" y="119" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">5</text>
    <circle cx="230" cy="115" r="8" fill="#f59e0b" opacity="0.8"/><text x="230" y="119" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">3</text>
    <circle cx="270" cy="115" r="8" fill="#22c55e" opacity="0.8"/><text x="270" y="119" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">5</text>
    <circle cx="310" cy="115" r="8" fill="#22c55e" opacity="0.8"/><text x="310" y="119" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">4</text>
    <circle cx="350" cy="115" r="8" fill="#f59e0b" opacity="0.8"/><text x="350" y="119" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">3</text>

    <!-- 20:00 -->
    <text x="45" y="143" fill="#94a3b8" font-size="10" font-family="sans-serif">20:00</text>
    <circle cx="110" cy="140" r="8" fill="#f59e0b" opacity="0.8"/><text x="110" y="144" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">3</text>
    <circle cx="150" cy="140" r="8" fill="#f59e0b" opacity="0.8"/><text x="150" y="144" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">3</text>
    <circle cx="190" cy="140" r="8" fill="#f59e0b" opacity="0.8"/><text x="190" y="144" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">4</text>
    <circle cx="230" cy="140" r="8" fill="#f97316" opacity="0.8"/><text x="230" y="144" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">2</text>
    <circle cx="270" cy="140" r="8" fill="#f59e0b" opacity="0.8"/><text x="270" y="144" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">3</text>
    <circle cx="310" cy="140" r="8" fill="#f97316" opacity="0.8"/><text x="310" y="144" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">2</text>
    <circle cx="350" cy="140" r="8" fill="#f97316" opacity="0.8"/><text x="350" y="144" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">2</text>

    <!-- 图例 -->
    <circle cx="45" cy="170" r="6" fill="#22c55e" opacity="0.8"/>
    <text x="57" y="174" fill="#64748b" font-size="8" font-family="sans-serif">5=最佳</text>
    <circle cx="125" cy="170" r="6" fill="#f59e0b" opacity="0.8"/>
    <text x="137" y="174" fill="#64748b" font-size="8" font-family="sans-serif">3-4</text>
    <circle cx="185" cy="170" r="6" fill="#ef4444" opacity="0.8"/>
    <text x="197" y="174" fill="#64748b" font-size="8" font-family="sans-serif">1-2</text>

    <!-- 发现标注 -->
    <text x="250" y="195" fill="#f59e0b" font-size="9" font-family="sans-serif">🔍 发现：16:00-17:30 精力峰值！</text>
    <text x="250" y="208" fill="#94a3b8" font-size="8" font-family="sans-serif">周一三五五 ≈ 精力最旺日</text>
  </g>

  <!-- ===== 右下：精力地图 → 任务匹配 ===== -->
  <g transform="translate(385, 270)" filter="url(#shadow)">
    <rect x="0" y="0" width="390" height="265" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
    <text x="195" y="22" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold" font-family="sans-serif">🎯 精力→任务智能匹配</text>

    <!-- 5分 → 压轴题 -->
    <g transform="translate(15, 40)">
      <rect x="0" y="0" width="360" height="48" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
      <rect x="0" y="0" width="8" height="48" rx="4" fill="#22c55e"/>
      <circle cx="30" cy="24" r="12" fill="#22c55e" opacity="0.2"/>
      <text x="30" y="29" text-anchor="middle" fill="#22c55e" font-size="13" font-family="sans-serif">⚡5</text>
      <text x="55" y="26" fill="#e2e8f0" font-size="13" font-weight="bold" font-family="sans-serif">高精力时段 → 压轴题 / 新知识</text>
      <text x="55" y="42" fill="#94a3b8" font-size="9" font-family="sans-serif">攻克最难科目，做需要深度思考的任务</text>
    </g>

    <!-- 3-4分 → 日常作业 -->
    <g transform="translate(15, 98)">
      <rect x="0" y="0" width="360" height="48" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
      <rect x="0" y="0" width="8" height="48" rx="4" fill="#f59e0b"/>
      <circle cx="30" cy="24" r="12" fill="#f59e0b" opacity="0.2"/>
      <text x="30" y="29" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="sans-serif">🔋3-4</text>
      <text x="55" y="26" fill="#e2e8f0" font-size="13" font-weight="bold" font-family="sans-serif">中等精力 → 日常作业 / 复习</text>
      <text x="55" y="42" fill="#94a3b8" font-size="9" font-family="sans-serif">做熟练的题目，巩固已学内容</text>
    </g>

    <!-- 1-2分 → 抄写/休息 -->
    <g transform="translate(15, 156)">
      <rect x="0" y="0" width="360" height="48" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
      <rect x="0" y="0" width="8" height="48" rx="4" fill="#ef4444"/>
      <circle cx="30" cy="24" r="12" fill="#ef4444" opacity="0.2"/>
      <text x="30" y="29" text-anchor="middle" fill="#ef4444" font-size="13" font-family="sans-serif">🪫1-2</text>
      <text x="55" y="26" fill="#e2e8f0" font-size="13" font-weight="bold" font-family="sans-serif">低精力 → 抄写 / 整理 / 休息</text>
      <text x="55" y="42" fill="#94a3b8" font-size="9" font-family="sans-serif">做机械性任务或直接充电休息</text>
    </g>

    <!-- 底部结论 -->
    <rect x="30" y="220" width="330" height="32" rx="16" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
    <text x="195" y="241" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="sans-serif">💡 不是管理时间，而是管理精力</text>
  </g>
</svg>