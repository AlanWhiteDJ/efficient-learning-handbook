<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#0f172a"/>
  <!-- 标题 -->
  <text x="400" y="34" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="20" font-weight="bold" fill="#f59e0b">盲点狩猎 🔦</text>
  <line x1="320" y1="42" x2="480" y2="42" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>

  <!-- 学生人物 -->
  <circle cx="180" cy="140" r="25" fill="#a78bfa"/>
  <text x="180" y="146" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="20" fill="#fff">🧑</text>
  <rect x="155" y="165" width="50" height="65" rx="7" fill="#a78bfa"/>

  <!-- 学生手拿手电筒 -->
  <line x1="200" y1="185" x2="330" y2="160" stroke="#d1d5db" stroke-width="3"/>
  <!-- 手电筒 -->
  <rect x="325" y="148" width="50" height="24" rx="5" fill="#64748b" transform="rotate(-8, 325, 148)"/>
  <rect x="370" y="148" width="20" height="24" rx="3" fill="#94a3b8" transform="rotate(-8, 325, 148)"/>

  <!-- 手电光束（扇形） -->
  <polygon points="390,150 500,80 540,220" fill="#f59e0b" opacity="0.15"/>
  <polygon points="390,150 480,120 520,180" fill="#f59e0b" opacity="0.25"/>

  <!-- 大脑阴影区域 -->
  <ellipse cx="520" cy="160" rx="90" ry="70" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <path d="M450,140 Q480,100 520,120 Q550,110 580,130" fill="none" stroke="#475569" stroke-width="1.5"/>
  <path d="M460,170 Q500,160 530,175" fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- 阴影标签 -->
  <rect x="475" y="95" width="90" height="22" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="520" y="110" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#94a3b8">不知道自己</text>
  <text x="520" y="125" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="8" fill="#94a3b8">不知道的部分</text>

  <!-- 被照亮的隐藏错误认知 -->
  <rect x="530" y="180" width="200" height="60" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
  <text x="630" y="200" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="11" font-weight="bold" fill="#fca5a5">⚠️ 隐藏的错误认知</text>
  <text x="630" y="218" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#fca5a5">"我以为物体越重</text>
  <text x="630" y="233" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#fca5a5">下落越快……"</text>

  <!-- 光束照亮连线 -->
  <line x1="490" y1="155" x2="540" y2="182" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- 底部说明 -->
  <rect x="120" y="300" width="560" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="328" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">盲点狩猎四步法</text>

  <rect x="150" y="345" width="115" height="35" rx="6" fill="#3b82f6" opacity="0.2"/>
  <text x="207" y="360" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#93c5fd">① 做题时标记</text>
  <text x="207" y="374" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#93c5fd">不确定的步骤</text>

  <rect x="280" y="345" width="115" height="35" rx="6" fill="#34d399" opacity="0.2"/>
  <text x="337" y="360" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#6ee7b7">② 错题后反问</text>
  <text x="337" y="374" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#6ee7b7">"我哪里错了？"</text>

  <rect x="410" y="345" width="115" height="35" rx="6" fill="#a78bfa" opacity="0.2"/>
  <text x="467" y="360" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#c4b5fd">③ 找反面例子</text>
  <text x="467" y="374" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#c4b5fd">验证边界</text>

  <rect x="540" y="345" width="115" height="35" rx="6" fill="#f59e0b" opacity="0.2"/>
  <text x="597" y="360" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#fcd34d">④ 更新认知</text>
  <text x="597" y="374" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#fcd34d">记录"原来是"</text>

  <text x="400" y="412" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#64748b">不知道自己不知道 → 知道不知道 → 知道！</text>

  <!-- 编号 -->
  <circle cx="60" cy="28" r="16" fill="#f59e0b" opacity="0.3"/>
  <text x="60" y="34" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">19</text>
</svg>