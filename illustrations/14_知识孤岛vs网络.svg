<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>
  
  <text x="400" y="28" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="sans-serif">知识孤岛 vs 知识网络</text>
  <text x="400" y="48" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">高手和新手的核心差异，不是知识量，是网络的密度</text>
  
  <!-- 左：孤岛 -->
  <rect x="20" y="70" width="370" height="330" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="205" y="100" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold" font-family="sans-serif">新手的大脑：知识孤岛</text>
  
  <!-- 孤立的节点 -->
  <circle cx="120" cy="145" r="30" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="149" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="sans-serif">三角</text>
  <text x="120" y="161" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="sans-serif">函数</text>
  
  <circle cx="290" cy="145" r="30" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="290" y="149" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="sans-serif">向量</text>
  <text x="290" y="161" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="sans-serif">运算</text>
  
  <circle cx="120" cy="275" r="30" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="279" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="sans-serif">圆方程</text>
  
  <circle cx="290" cy="275" r="30" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="290" y="279" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="sans-serif">直角</text>
  <text x="290" y="291" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="sans-serif">三角形</text>
  
  <!-- 一道综合题掉下来 -->
  <rect x="140" y="210" width="130" height="35" rx="6" fill="#f59e0b" opacity="0.9"/>
  <text x="205" y="232" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="bold" font-family="sans-serif">🔻 综合题</text>
  <text x="205" y="310" text-anchor="middle" fill="#f87171" font-size="11" font-family="sans-serif">碰到哪个？都碰不到 → 懵了</text>
  
  <!-- 中间 VS -->
  <circle cx="400" cy="235" r="18" fill="#334155"/>
  <text x="400" y="240" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold" font-family="sans-serif">VS</text>
  
  <!-- 右：网络 -->
  <rect x="410" y="70" width="370" height="330" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="595" y="100" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold" font-family="sans-serif">高手的大脑：知识网络</text>
  
  <!-- 网络节点 -->
  <circle cx="500" cy="150" r="28" fill="#166534" stroke="#4ade80" stroke-width="1.5"/>
  <text x="500" y="147" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">三角</text>
  <text x="500" y="160" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">函数</text>
  
  <circle cx="600" cy="140" r="28" fill="#166534" stroke="#4ade80" stroke-width="1.5"/>
  <text x="600" y="137" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">向量</text>
  <text x="600" y="150" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">运算</text>
  
  <circle cx="550" cy="240" r="28" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="237" text-anchor="middle" fill="#4ade80" font-size="8" font-family="sans-serif">圆方程</text>
  <text x="550" y="250" text-anchor="middle" fill="#4ade80" font-size="8" font-family="sans-serif">⭐枢纽</text>
  
  <circle cx="670" cy="210" r="28" fill="#166534" stroke="#4ade80" stroke-width="1.5"/>
  <text x="670" y="207" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">直角</text>
  <text x="670" y="220" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">三角形</text>
  
  <circle cx="630" cy="290" r="28" fill="#166534" stroke="#4ade80" stroke-width="1.5"/>
  <text x="630" y="287" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">函数</text>
  <text x="630" y="300" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">图像</text>
  
  <circle cx="470" cy="280" r="28" fill="#166534" stroke="#4ade80" stroke-width="1.5"/>
  <text x="470" y="277" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">弧度</text>
  <text x="470" y="290" text-anchor="middle" fill="#86efac" font-size="8" font-family="sans-serif">角度</text>
  
  <!-- 连线 -->
  <line x1="525" y1="160" x2="576" y2="148" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  <line x1="515" y1="176" x2="538" y2="215" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  <line x1="610" y1="166" x2="655" y2="188" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  <line x1="570" y1="262" x2="615" y2="272" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
  <line x1="540" y1="265" x2="485" y2="270" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  <line x1="565" y1="215" x2="615" y2="160" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  <line x1="660" y1="235" x2="640" y2="265" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  
  <!-- 综合题打中网络 -->
  <rect x="490" y="325" width="130" height="30" rx="6" fill="#f59e0b" opacity="0.9"/>
  <text x="555" y="344" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="bold" font-family="sans-serif">🔻 综合题 → 精准命中</text>
  <text x="555" y="375" text-anchor="middle" fill="#4ade80" font-size="11" font-family="sans-serif">顺着网络找到答案 ✓</text>
  
  <text x="400" y="420" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">大脑不是图书馆，是一张网。学完用不出 = 知识是孤岛。</text>
</svg>