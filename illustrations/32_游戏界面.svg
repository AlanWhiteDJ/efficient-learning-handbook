<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#ffffff"/>
  <defs>
    <linearGradient id="hudG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="hudB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    <filter id="glowGreen"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowGold"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <!-- 桌面背景 -->
  <rect x="20" y="10" width="760" height="480" rx="12" fill="url(#hudB)" stroke="#cbd5e1" stroke-width="1"/>

  <!-- 顶部标题栏 -->
  <rect x="20" y="10" width="760" height="40" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="20" y="30" width="760" height="20" fill="#f8fafc"/>
  <text x="60" y="36" fill="#64748b" font-size="10" font-family="monospace">● ● ●</text>
  <text x="400" y="36" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif" font-weight="bold">📐 学习任务界面 v3.2</text>

  <!-- HUD 任务目标区域 -->
  <g transform="translate(45, 65)" filter="url(#shadow)">
    <rect x="0" y="0" width="710" height="55" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- 任务目标图标 -->
    <circle cx="30" cy="27" r="15" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="30" y="32" text-anchor="middle" fill="#3b82f6" font-size="13" font-family="sans-serif">🎯</text>
    <!-- 标题 -->
    <text x="55" y="22" fill="url(#hudG)" font-size="14" font-weight="bold" font-family="sans-serif">任务目标</text>
    <text x="55" y="42" fill="#475569" font-size="16" font-family="sans-serif">找出 3 个不理解的知识点</text>
    <!-- 进度 -->
    <text x="620" y="32" fill="#f59e0b" font-size="20" font-weight="bold" font-family="monospace">0 / 3</text>
    <text x="690" y="35" fill="#64748b" font-size="10" font-family="monospace">进行中</text>
  </g>

  <!-- 题目内容区域 -->
  <g transform="translate(45, 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="540" height="200" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
    <!-- 题目编号 -->
    <text x="20" y="25" fill="#64748b" font-size="10" font-family="monospace">[ Q-07 ]</text>

    <!-- 题目文字 -->
    <text x="20" y="55" fill="#475569" font-size="14" font-family="sans-serif">已知函数 f(x) = x³ - 3x² + 2x - 1</text>
    <text x="20" y="75" fill="#475569" font-size="14" font-family="sans-serif">求：f(x) 在区间 [0, 2] 上的最大值</text>

    <!-- 解题步骤区域 -->
    <rect x="20" y="95" width="500" height="90" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.5"/>
    <text x="35" y="115" fill="#3b82f6" font-size="11" font-family="monospace">▶ 求导：f'(x) = 3x² - 6x + 2</text>
    <text x="35" y="135" fill="#3b82f6" font-size="11" font-family="monospace">▶ 令 f'(x) = 0 → x = 1 ± √3/3</text>
    <text x="35" y="155" fill="#92400e" font-size="11" font-family="monospace">▶ 在 [0,2] 内：x₁ = 1-√3/3 ≈ 0.42  ← 🔍 不理解：为什么这里要检查端点？</text>
    <text x="35" y="175" fill="#3b82f6" font-size="11" font-family="monospace">▶ 比较 f(0), f(0.42), f(2) → max = f(2) = 1</text>
  </g>

  <!-- 已完成弹窗 -->
  <g transform="translate(45, 340)" filter="url(#glowGreen)">
    <rect x="0" y="0" width="240" height="65" rx="10" fill="#d1fae5" stroke="#34d399" stroke-width="2"/>
    <text x="120" y="25" text-anchor="middle" fill="#059669" font-size="22" font-family="sans-serif">✅ +1</text>
    <text x="120" y="48" text-anchor="middle" fill="#34d399" font-size="11" font-family="sans-serif">已发现第1个不理解点！</text>
    <!-- 发光粒子 -->
    <circle cx="40" cy="15" r="2" fill="#34d399" opacity="0.6"/>
    <circle cx="200" cy="10" r="1.5" fill="#059669" opacity="0.8"/>
    <circle cx="220" cy="40" r="2" fill="#34d399" opacity="0.5"/>
  </g>

  <!-- 侧边栏：正字计数 -->
  <g transform="translate(600, 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="155" height="200" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>

    <!-- 标题 -->
    <rect x="0" y="0" width="155" height="32" rx="8" fill="#fef3c7"/>
    <rect x="0" y="16" width="155" height="16" fill="#fef3c7"/>
    <text x="77" y="22" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold" font-family="sans-serif">🏆 成就计数</text>

    <!-- 正字(1) -->
    <text x="15" y="60" fill="#b45309" font-size="20" font-family="sans-serif">正</text>
    <text x="15" y="62" fill="#92400e" font-size="10" font-family="sans-serif">└ 第1个不理解点</text>

    <!-- 正字(2) 进行中 -->
    <text x="15" y="90" fill="#b45309" font-size="20" font-family="sans-serif">一</text>
    <text x="15" y="92" fill="#94a3b8" font-size="10" font-family="sans-serif">└ 进行中...</text>
    <text x="35" y="90" fill="#b45309" font-size="20" font-family="sans-serif" opacity="0.3">丅</text>

    <!-- 计数总结 -->
    <line x1="15" y1="115" x2="140" y2="115" stroke="#94a3b8" stroke-width="0.5"/>
    <text x="77" y="135" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">已完成</text>
    <text x="77" y="155" text-anchor="middle" fill="#f59e0b" font-size="24" font-weight="bold" font-family="monospace">1</text>
    <text x="77" y="172" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">剩余</text>
    <text x="77" y="190" text-anchor="middle" fill="#3b82f6" font-size="24" font-weight="bold" font-family="monospace">2</text>
  </g>

  <!-- 底部配文 -->
  <g transform="translate(0, 430)">
    <rect x="120" y="0" width="560" height="45" rx="22" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" filter="url(#glowGold)"/>
    <text x="400" y="28" text-anchor="middle" fill="#92400e" font-size="14" font-weight="bold" font-family="sans-serif">目标清晰 + 即时反馈 = 心流的开关</text>
  </g>

  <!-- 心流波浪装饰 -->
  <path d="M120,475 Q200,465 280,475 Q360,485 440,475 Q520,465 600,475 Q640,478 680,475" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
  <path d="M130,482 Q210,472 290,482 Q370,492 450,482 Q530,472 610,482 Q650,485 690,482" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3"/>
</svg>