<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f1f5f9"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#db2777"/></linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="900" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" fill="#1e3a5f" font-size="24" font-weight="bold" font-family="sans-serif">你现在属于哪种"痛"？</text>
  <text x="400" y="72" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="sans-serif">不需要从头读。找到你最痛的那个入口，直接翻过去。</text>
  <line x1="150" y1="88" x2="650" y2="88" stroke="#cbd5e1" stroke-width="0.5"/>

  <!-- ====== 入口1: 记忆篇 ====== -->
  <rect x="30" y="105" width="740" height="110" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="105" width="6" height="110" rx="3" fill="url(#g1)"/>
  <text x="55" y="132" fill="#2563eb" font-size="16" font-weight="bold" font-family="sans-serif">🔵 记不住型</text>
  <text x="55" y="152" fill="#64748b" font-size="11" font-family="sans-serif">背了就忘，感觉脑子像筛子</text>
  <text x="55" y="172" fill="#334155" font-size="12" font-family="sans-serif">□ 昨天背的单词/公式，今天只剩一半印象</text>
  <text x="55" y="192" fill="#334155" font-size="12" font-family="sans-serif">□ 考前突击背的东西，考完一周全忘光</text>
  <text x="55" y="210" fill="#334155" font-size="12" font-family="sans-serif">□ 基础题经常"不过大脑"就错——明明会，手比脑快</text>
  <text x="660" y="195" fill="#2563eb" font-size="11" font-weight="bold" font-family="sans-serif">→ 第1-3章</text>

  <!-- ====== 入口2: 理解篇 ====== -->
  <rect x="30" y="230" width="740" height="110" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="230" width="6" height="110" rx="3" fill="url(#g2)"/>
  <text x="55" y="257" fill="#8b5cf6" font-size="16" font-weight="bold" font-family="sans-serif">🟣 学不懂型</text>
  <text x="55" y="277" fill="#64748b" font-size="11" font-family="sans-serif">听懂了，但合上书讲不出来</text>
  <text x="55" y="297" fill="#334155" font-size="12" font-family="sans-serif">□ 上课听得很顺，自己一做题就卡住</text>
  <text x="55" y="317" fill="#334155" font-size="12" font-family="sans-serif">□ 新知识和旧知识串不起来，感觉都在孤岛上</text>
  <text x="55" y="335" fill="#334155" font-size="12" font-family="sans-serif">□ 东西一多脑子就转不动，感觉内存爆了</text>
  <text x="660" y="320" fill="#8b5cf6" font-size="11" font-weight="bold" font-family="sans-serif">→ 第4-6章</text>

  <!-- ====== 入口3: 应用篇 ====== -->
  <rect x="30" y="355" width="740" height="110" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="355" width="6" height="110" rx="3" fill="url(#g3)"/>
  <text x="55" y="382" fill="#34d399" font-size="16" font-weight="bold" font-family="sans-serif">🟢 做不对型</text>
  <text x="55" y="402" fill="#64748b" font-size="11" font-family="sans-serif">平时会，一考就废——题型一变就懵</text>
  <text x="55" y="422" fill="#334155" font-size="12" font-family="sans-serif">□ 平时作业做得好，考试同一知识点换个问法就不会</text>
  <text x="55" y="442" fill="#334155" font-size="12" font-family="sans-serif">□ 选择题能做对，填空题/解答题就写不出来</text>
  <text x="55" y="460" fill="#334155" font-size="12" font-family="sans-serif">□ 学的东西在生活里完全用不出来，感觉白学了</text>
  <text x="660" y="445" fill="#34d399" font-size="11" font-weight="bold" font-family="sans-serif">→ 第7-9章</text>

  <!-- ====== 入口4: 专注篇 ====== -->
  <rect x="30" y="480" width="740" height="110" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="480" width="6" height="110" rx="3" fill="url(#g4)"/>
  <text x="55" y="507" fill="#b45309" font-size="16" font-weight="bold" font-family="sans-serif">🟡 进不去型</text>
  <text x="55" y="527" fill="#64748b" font-size="11" font-family="sans-serif">明知道该学，身体就是不动</text>
  <text x="55" y="547" fill="#334155" font-size="12" font-family="sans-serif">□ 坐到书桌前先刷半小时手机——启动困难</text>
  <text x="55" y="567" fill="#334155" font-size="12" font-family="sans-serif">□ 学了一会就走神，想进入"忘我"状态但进不去</text>
  <text x="55" y="585" fill="#334155" font-size="12" font-family="sans-serif">□ 要么一口气学到崩，要么一天碰都不碰——节奏全乱</text>
  <text x="660" y="570" fill="#b45309" font-size="11" font-weight="bold" font-family="sans-serif">→ 第10-12章</text>

  <!-- ====== 入口5: 动力篇 ====== -->
  <rect x="30" y="605" width="740" height="110" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="605" width="6" height="110" rx="3" fill="url(#g5)"/>
  <text x="55" y="632" fill="#dc2626" font-size="16" font-weight="bold" font-family="sans-serif">🔴 不想学型</text>
  <text x="55" y="652" fill="#64748b" font-size="11" font-family="sans-serif">没劲，不知道为什么而学</text>
  <text x="55" y="672" fill="#334155" font-size="12" font-family="sans-serif">□ 学了没感觉，不知道自己到底进步了没有</text>
  <text x="55" y="692" fill="#334155" font-size="12" font-family="sans-serif">□ 总觉得是"被逼着学的"——爸妈/老师/考试逼的</text>
  <text x="55" y="710" fill="#334155" font-size="12" font-family="sans-serif">□ 发自灵魂的疑问：学这些到底有什么用？</text>
  <text x="660" y="695" fill="#dc2626" font-size="11" font-weight="bold" font-family="sans-serif">→ 第13-15章</text>

  <!-- ====== 入口6: 调节篇 ====== -->
  <rect x="30" y="730" width="740" height="110" rx="10" fill="#faf5ff" stroke="#ec4899" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="730" width="6" height="110" rx="3" fill="url(#g6)"/>
  <text x="55" y="757" fill="#db2777" font-size="16" font-weight="bold" font-family="sans-serif">🩷 没方向型</text>
  <text x="55" y="777" fill="#64748b" font-size="11" font-family="sans-serif">不知道从哪里开始，也不知道自己的方法对不对</text>
  <text x="55" y="797" fill="#334155" font-size="12" font-family="sans-serif">□ 不知道自己哪里不会——好像都会，又好像都不会</text>
  <text x="55" y="817" fill="#334155" font-size="12" font-family="sans-serif">□ 计划做了一堆，从来没完成过——越做越挫败</text>
  <text x="55" y="835" fill="#334155" font-size="12" font-family="sans-serif">□ 试过很多方法，但不知道哪个适合自己——千人千面，我是哪一面？</text>
  <text x="660" y="820" fill="#db2777" font-size="11" font-weight="bold" font-family="sans-serif">→ 第16-18章</text>

  <!-- 底部提示 -->
  <text x="400" y="878" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">勾中了多个？从最痛的那个开始。解决了一个，其他的往往会跟着松动。</text>
</svg>