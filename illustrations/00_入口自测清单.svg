<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 1280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1a2332"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f87171"/></linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#f472b6"/></linearGradient>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="g8" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#2dd4bf"/></linearGradient>
    <linearGradient id="g9" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#fb923c"/></linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="1280" fill="url(#bg)"/>

  <text x="400" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">你现在属于哪种"痛"？</text>
  <text x="400" y="66" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">不需要从头读。找到你最痛的那个入口，直接翻过去。</text>
  <line x1="150" y1="80" x2="650" y2="80" stroke="#334155" stroke-width="0.5"/>

  <!-- ====== 入口1: 记忆篇 ====== -->
  <rect x="30" y="95" width="740" height="100" rx="10" fill="#0f2744" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="95" width="6" height="100" rx="3" fill="url(#g1)"/>
  <text x="55" y="120" fill="#60a5fa" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🔵 记不住型</text>
  <text x="55" y="140" fill="#64748b" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">背了就忘，感觉脑子像筛子</text>
  <text x="55" y="158" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 昨天背的单词/公式，今天只剩一半印象</text>
  <text x="55" y="176" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 考前突击背的东西，考完一周全忘光</text>
  <text x="55" y="193" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 基础题经常"不过大脑"就错——明明会，手比脑快</text>
  <text x="660" y="170" fill="#60a5fa" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 第1-3章</text>

  <!-- ====== 入口2: 理解篇 ====== -->
  <rect x="30" y="210" width="740" height="100" rx="10" fill="#1a1530" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="210" width="6" height="100" rx="3" fill="url(#g2)"/>
  <text x="55" y="235" fill="#a78bfa" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🟣 学不懂型</text>
  <text x="55" y="255" fill="#64748b" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">听懂了，但合上书讲不出来</text>
  <text x="55" y="273" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 上课听得很顺，自己一做题就卡住</text>
  <text x="55" y="291" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 新知识和旧知识串不起来，感觉都在孤岛上</text>
  <text x="55" y="308" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 东西一多脑子就转不动，感觉内存爆了</text>
  <text x="660" y="285" fill="#a78bfa" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 第4-6章</text>

  <!-- ====== 入口3: 应用篇 ====== -->
  <rect x="30" y="325" width="740" height="100" rx="10" fill="#022c22" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="325" width="6" height="100" rx="3" fill="url(#g3)"/>
  <text x="55" y="350" fill="#34d399" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🟢 做不对型</text>
  <text x="55" y="370" fill="#64748b" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">平时会，一考就废——题型一变就懵</text>
  <text x="55" y="388" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 平时作业做得好，考试换个问法就不会</text>
  <text x="55" y="406" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 选择题能做对，填空/解答题就写不出来</text>
  <text x="55" y="423" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 学的东西在生活里完全用不出来</text>
  <text x="660" y="400" fill="#34d399" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 第7-9章</text>

  <!-- ====== 入口4: 专注篇 ====== -->
  <rect x="30" y="440" width="740" height="100" rx="10" fill="#2a1a00" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="440" width="6" height="100" rx="3" fill="url(#g4)"/>
  <text x="55" y="465" fill="#fbbf24" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🟡 进不去型</text>
  <text x="55" y="485" fill="#64748b" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">明知道该学，身体就是不动</text>
  <text x="55" y="503" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 坐到书桌前先刷半小时手机——启动困难</text>
  <text x="55" y="521" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 学了一会就走神，想进入"忘我"状态但进不去</text>
  <text x="55" y="538" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 要么一口气学到崩，要么一天碰都不碰</text>
  <text x="660" y="515" fill="#fbbf24" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 第10-12章</text>

  <!-- ====== 入口5: 动力篇 ====== -->
  <rect x="30" y="555" width="740" height="100" rx="10" fill="#2b0a0a" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="555" width="6" height="100" rx="3" fill="url(#g5)"/>
  <text x="55" y="580" fill="#f87171" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🔴 不想学型</text>
  <text x="55" y="600" fill="#64748b" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">没劲，不知道为什么而学</text>
  <text x="55" y="618" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 学了没感觉，不知道自己到底进步了没有</text>
  <text x="55" y="636" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 总觉得是"被逼着学的"——爸妈/老师/考试逼的</text>
  <text x="55" y="653" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 发自灵魂的疑问：学这些到底有什么用？</text>
  <text x="660" y="630" fill="#f87171" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 第13-15章</text>

  <!-- ====== 入口6: 调节篇 ====== -->
  <rect x="30" y="670" width="740" height="100" rx="10" fill="#1a0a2e" stroke="#ec4899" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="670" width="6" height="100" rx="3" fill="url(#g6)"/>
  <text x="55" y="695" fill="#f472b6" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🩷 没方向型</text>
  <text x="55" y="715" fill="#64748b" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">不知道从哪里开始，也不知道自己的方法对不对</text>
  <text x="55" y="733" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 不知道自己哪里不会——好像都会，又好像都不会</text>
  <text x="55" y="751" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 计划做了一堆，从来没完成过</text>
  <text x="55" y="768" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 试过很多方法，但不知道哪个适合自己</text>
  <text x="660" y="745" fill="#f472b6" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 第16-18章</text>

  <!-- ====== 入口7: 屏幕管理 ====== -->
  <rect x="30" y="785" width="740" height="100" rx="10" fill="#111827" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="785" width="6" height="100" rx="3" fill="url(#g7)"/>
  <text x="55" y="810" fill="#818cf8" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🖤 管不住手型</text>
  <text x="55" y="830" fill="#64748b" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">说好5分钟，一抬头一小时过去了</text>
  <text x="55" y="848" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 学习前先刷手机，说好看一眼结果停不下来</text>
  <text x="55" y="866" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 本来只想查一道题，被短视频/消息拐跑了</text>
  <text x="55" y="883" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 手机放桌上，余光扫到就想拿</text>
  <text x="660" y="860" fill="#818cf8" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 第19章</text>

  <!-- ====== 入口8: 考试策略 ====== -->
  <rect x="30" y="900" width="740" height="100" rx="10" fill="#042f2e" stroke="#14b8a6" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="900" width="6" height="100" rx="3" fill="url(#g8)"/>
  <text x="55" y="925" fill="#2dd4bf" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">⬛ 考砸型</text>
  <text x="55" y="945" fill="#64748b" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">平时都会，一上考场就发挥失常</text>
  <text x="55" y="963" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 卷子发下来先懵5分钟</text>
  <text x="55" y="981" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 经常因为审题/时间/粗心丢分</text>
  <text x="55" y="998" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 明明会做的题，考场上就是想不起来</text>
  <text x="660" y="975" fill="#2dd4bf" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 第20章</text>

  <!-- ====== 入口9: AI学习 ====== -->
  <rect x="30" y="1015" width="740" height="100" rx="10" fill="#2a1500" stroke="#f97316" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="1015" width="6" height="100" rx="3" fill="url(#g9)"/>
  <text x="55" y="1040" fill="#fb923c" font-size="15" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">🤖 AI依赖型</text>
  <text x="55" y="1060" fill="#64748b" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">不知道AI是帮你学还是替你学</text>
  <text x="55" y="1078" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 用AI做完作业，合上电脑什么都写不出来</text>
  <text x="55" y="1096" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 不知道什么时候该用AI、什么时候不该用</text>
  <text x="55" y="1113" fill="#cbd5e1" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">□ 老师/家长说AI是作弊，但同学都在用</text>
  <text x="660" y="1090" fill="#fb923c" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">→ 第21章</text>

  <text x="400" y="1250" text-anchor="middle" fill="#475569" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">勾中了多个？从最痛的那个开始。解决了一个，其他的往往会跟着松动。</text>
</svg>