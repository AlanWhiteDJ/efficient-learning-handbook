<svg xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" viewBox="0 0 800 440">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
  </defs>
  <rect width="800" height="440" fill="url(#bg)"/>
  
  <text x="400" y="30" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">识别 vs 提取：两套完全不同的神经机制</text>
  <text x="400" y="50" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">考试考的是提取，不是识别</text>
  
  <!-- 左：识别模式 -->
  <rect x="25" y="80" width="360" height="330" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  
  <!-- 识别图标区 -->
  <rect x="55" y="100" width="300" height="180" rx="10" fill="#450a0a" stroke="#ef4444" stroke-width="0.5"/>
  <!-- 翻开的书 -->
  <rect x="120" y="125" width="40" height="55" rx="3" fill="#f1f5f9" opacity="0.8"/>
  <rect x="160" y="125" width="40" height="55" rx="3" fill="#cbd5e1" opacity="0.6"/>
  <line x1="140" y1="140" x2="180" y2="140" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="140" y1="150" x2="180" y2="150" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="140" y1="160" x2="180" y2="160" stroke="#94a3b8" stroke-width="0.8"/>
  <!-- 眼睛 -->
  <circle cx="260" cy="150" r="12" fill="none" stroke="#f1f5f9" stroke-width="1.5"/>
  <circle cx="260" cy="150" r="4" fill="#f1f5f9"/>
  
  <text x="205" y="195" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">信息在外面 → 看到 → 认得</text>
  
  <text x="205" y="215" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">"哦，这个我知道"</text>
  
  <!-- 识别特征 -->
  <line x1="55" y1="235" x2="355" y2="235" stroke="#475569" stroke-width="0.5"/>
  <text x="205" y="255" text-anchor="middle" fill="#f1f5f9" font-size="11" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-weight="bold">识别模式特征</text>
  
  <rect x="70" y="270" width="300" height="22" rx="4" fill="#1e293b"/>
  <text x="220" y="285" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">被动 · 信息在外部 · 轻松 · 觉得"我会了"</text>
  
  <rect x="70" y="298" width="300" height="22" rx="4" fill="#450a0a"/>
  <text x="220" y="313" text-anchor="middle" fill="#f87171" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">⚠ 强化的是"看到→认出"通路</text>
  
  <text x="205" y="345" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">大脑自欺：流畅性错觉</text>
  
  <rect x="70" y="358" width="300" height="28" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="220" y="377" text-anchor="middle" fill="#fca5a5" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">反复翻书=自我欺骗，合上书一片空白</text>
  
  <!-- 中间分隔 VS -->
  <circle cx="400" cy="245" r="22" fill="#334155"/>
  <text x="400" y="250" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">VS</text>
  
  <!-- 右：提取模式 -->
  <rect x="415" y="80" width="360" height="330" rx="14" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  
  <rect x="445" y="100" width="300" height="180" rx="10" fill="#052e16" stroke="#22c55e" stroke-width="0.5"/>
  <!-- 合上的书 -->
  <rect x="180" y="130" width="70" height="45" rx="3" fill="#166534" stroke="#22c55e" stroke-width="0.8"/>
  <text x="215" y="158" text-anchor="middle" fill="#4ade80" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">合上书</text>
  <!-- 大脑 -->
  <circle cx="215" cy="108" r="20" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <path d="M200,105 Q210,95 230,105" fill="none" stroke="#4ade80" stroke-width="1"/>
  <!-- 箭头从大脑向外拉 -->
  <path d="M230,100 L260,90" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowE)"/>
  <defs><marker id="arrowE" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#22c55e"/></marker></defs>
  
  <text x="595" y="195" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">信息在内部 → 不看 → 拽出来</text>
  
  <text x="595" y="215" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">"使劲想，哪怕只想起来30%"</text>
  
  <line x1="445" y1="235" x2="745" y2="235" stroke="#475569" stroke-width="0.5"/>
  <text x="595" y="255" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">提取模式特征</text>
  
  <rect x="460" y="270" width="300" height="22" rx="4" fill="#1e293b"/>
  <text x="610" y="285" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">主动 · 信息在脑内 · 费力 · 大脑俯卧撑</text>
  
  <rect x="460" y="298" width="300" height="22" rx="4" fill="#052e16"/>
  <text x="610" y="313" text-anchor="middle" fill="#4ade80" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">💪 强化的是"不看→想出"通路</text>
  
  <text x="595" y="345" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">每一次费力的提取 > 十次轻松阅读</text>
  
  <rect x="460" y="358" width="300" height="28" rx="6" fill="#166534" stroke="#22c55e" stroke-width="1"/>
  <text x="610" y="377" text-anchor="middle" fill="#86efac" font-size="10" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">合上书硬想——练的是考试真正需要的能力</text>
</svg>