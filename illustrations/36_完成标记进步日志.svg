<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0f172a"/>
  <defs>
    <linearGradient id="redG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
    <filter id="glowRed"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif" letter-spacing="2">完 成 标 记  ·  进 步 日 志</text>

  <!-- ===== 左：任务清单划掉 ===== -->
  <text x="200" y="55" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold" font-family="sans-serif">✏️ 任务清单 · 狠狠划掉</text>

  <g transform="translate(35, 75)" filter="url(#shadow)">
    <!-- 便签纸 -->
    <rect x="0" y="0" width="330" height="330" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <!-- 顶部渐变条 -->
    <rect x="0" y="0" width="330" height="8" rx="4" fill="url(#redG)"/>
    <rect x="0" y="4" width="330" height="4" fill="url(#redG)"/>

    <!-- 标题 -->
    <text x="165" y="35" text-anchor="middle" fill="#78350f" font-size="14" font-weight="bold" font-family="sans-serif">📋 今日任务</text>
    <line x1="25" y1="45" x2="305" y2="45" stroke="#d97706" stroke-width="0.5"/>

    <!-- 任务1 - 已完成，用红笔划掉 -->
    <text x="30" y="72" fill="#78350f" font-size="12" font-family="sans-serif">☐ 完成数学第三章习题</text>
    <line x1="28" y1="67" x2="210" y2="67" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 划掉的特写：红笔 + 动作线 -->
    <g transform="translate(155, 58)">
      <line x1="-8" y1="-5" x2="12" y2="5" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="-10" y1="-8" x2="-5" y2="-3" stroke="#ef4444" stroke-width="1.5"/>
      <line x1="14" y1="8" x2="19" y2="3" stroke="#ef4444" stroke-width="1.5"/>
    </g>

    <!-- 任务2 - 已完成，划掉 -->
    <text x="30" y="105" fill="#78350f" font-size="12" font-family="sans-serif">☐ 背30个英语单词</text>
    <line x1="28" y1="100" x2="185" y2="100" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 任务3 - 已完成，划掉（特写风格） -->
    <text x="30" y="138" fill="#78350f" font-size="12" font-family="sans-serif">☐ 物理错题整理</text>
    <line x1="28" y1="133" x2="165" y2="133" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 特写：正在划掉的动作 -->
    <g transform="translate(145, 125)" filter="url(#glowRed)">
      <!-- 红笔 -->
      <rect x="-3" y="-30" width="5" height="25" rx="2" fill="#ef4444"/>
      <rect x="-4" y="-30" width="7" height="6" rx="1" fill="#dc2626"/>
      <!-- 动感线条 -->
      <path d="M-10,-8 L-15,-12 M10,-6 L16,-12 M8,-2 L14,3" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- 任务4 - 进行中 -->
    <text x="30" y="171" fill="#78350f" font-size="12" font-family="sans-serif">☐ 复习化学方程式</text>
    <text x="280" y="171" fill="#d97706" font-size="9" font-family="sans-serif">进行中</text>

    <!-- 任务5 -->
    <text x="30" y="204" fill="#78350f" font-size="12" font-family="sans-serif">☐ 阅读语文课文</text>

    <!-- 任务6 -->
    <text x="30" y="237" fill="#78350f" font-size="12" font-family="sans-serif">☐ 整理本周笔记</text>

    <line x1="25" y1="252" x2="305" y2="252" stroke="#d97706" stroke-width="0.5" stroke-dasharray="3,3"/>

    <!-- 成就感文字 -->
    <text x="165" y="278" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold" font-family="sans-serif">✅ 3/6 完成！</text>

    <!-- 红笔横放 -->
    <g transform="translate(250, 300) rotate(-20)">
      <rect x="-40" y="-3" width="80" height="6" rx="2" fill="#ef4444"/>
      <rect x="-42" y="-2" width="4" height="4" rx="1" fill="#dc2626"/>
    </g>
  </g>

  <!-- 箭头连接 -->
  <g transform="translate(375, 240)">
    <path d="M0,0 L25,0" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowGold)"/>
    <text x="12" y="-8" text-anchor="middle" fill="#f59e0b" font-size="9" font-family="sans-serif">积累</text>
  </g>
  <!-- ===== 右："每日小赢"笔记本 ===== -->
  <text x="600" y="55" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold" font-family="sans-serif">📓 每日小赢 · 进步日志</text>

  <g transform="translate(405, 75)" filter="url(#shadow)">
    <!-- 笔记本 -->
    <rect x="0" y="0" width="360" height="330" rx="6" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
    <!-- 笔记本内页 -->
    <rect x="8" y="8" width="344" height="314" rx="3" fill="#0f172a" stroke="#34d399" stroke-width="0.5"/>

    <!-- 标题 -->
    <text x="180" y="38" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold" font-family="sans-serif">✨ 每日小赢笔记本 ✨</text>
    <line x1="30" y1="48" x2="330" y2="48" stroke="#34d399" stroke-width="0.5" opacity="0.5"/>

    <!-- 周一 -->
    <text x="30" y="72" fill="#34d399" font-size="11" font-weight="bold" font-family="sans-serif">周一</text>
    <text x="80" y="72" fill="#94a3b8" font-size="10" font-family="sans-serif">独立解出一道压轴题 ✌️</text>

    <!-- 周二 -->
    <text x="30" y="96" fill="#34d399" font-size="11" font-weight="bold" font-family="sans-serif">周二</text>
    <text x="80" y="96" fill="#94a3b8" font-size="10" font-family="sans-serif">英语听写全对 🎯</text>

    <!-- 周三 -->
    <text x="30" y="120" fill="#34d399" font-size="11" font-weight="bold" font-family="sans-serif">周三</text>
    <text x="80" y="120" fill="#94a3b8" font-size="10" font-family="sans-serif">连续学习90分钟没走神 ⚡</text>

    <!-- 周四 -->
    <text x="30" y="144" fill="#34d399" font-size="11" font-weight="bold" font-family="sans-serif">周四</text>
    <text x="80" y="144" fill="#94a3b8" font-size="10" font-family="sans-serif">主动问老师一道题 👍</text>

    <!-- 周五 -->
    <text x="30" y="168" fill="#34d399" font-size="11" font-weight="bold" font-family="sans-serif">周五</text>
    <text x="80" y="168" fill="#94a3b8" font-size="10" font-family="sans-serif">比昨天早起了30分钟 🌅</text>

    <line x1="30" y1="185" x2="330" y2="185" stroke="#34d399" stroke-width="0.5" opacity="0.3"/>
    <line x1="30" y1="186" x2="330" y2="186" stroke="#34d399" stroke-width="0.5" opacity="0.4"/>

    <!-- 周日汇总区 -->
    <rect x="25" y="200" width="310" height="85" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="180" y="222" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold" font-family="sans-serif">📝 周日汇总</text>
    <line x1="50" y1="232" x2="310" y2="232" stroke="#f59e0b" stroke-width="0.5"/>

    <text x="40" y="252" fill="#fbbf24" font-size="11" font-family="sans-serif">本周我最大的成长是</text>
    <!-- 下划线填空 -->
    <line x1="40" y1="268" x2="320" y2="268" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="45" y="266" fill="#fdba74" font-size="10" font-family="sans-serif">开始享受攻克难题的过程，不再害怕失败</text>

    <!-- 装饰 -->
    <text x="165" y="305" text-anchor="middle" fill="#34d399" font-size="13" font-family="sans-serif">🌱 进步是感受得到的</text>
  </g>
</svg>