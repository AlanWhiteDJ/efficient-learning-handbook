<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f8fafc"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  
  <text x="400" y="28" text-anchor="middle" fill="#1e3a5f" font-size="18" font-weight="bold" font-family="sans-serif">行为四步回路——为什么总控制不住刷手机</text>
  <text x="400" y="48" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">即时满足 vs 延迟满足——大脑的出厂设置</text>
  
  <!-- 左：手机回路 -->
  <rect x="20" y="70" width="370" height="170" rx="12" fill="#f8fafc" stroke="#ef4444" stroke-width="1.5"/>
  <text x="205" y="98" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="bold" font-family="sans-serif">📱 手机的闭环</text>
  
  <!-- 四个节点成环 -->
  <circle cx="80" cy="160" r="28" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="80" y="156" text-anchor="middle" fill="#ef4444" font-size="9" font-family="sans-serif">提示</text>
  <text x="80" y="170" text-anchor="middle" fill="#ef4444" font-size="8" font-family="sans-serif">手机在旁</text>
  
  <circle cx="210" cy="130" r="28" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="210" y="126" text-anchor="middle" fill="#ef4444" font-size="9" font-family="sans-serif">渴求</text>
  <text x="210" y="140" text-anchor="middle" fill="#ef4444" font-size="8" font-family="sans-serif">想刷一下</text>
  
  <circle cx="320" cy="160" r="28" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="320" y="156" text-anchor="middle" fill="#ef4444" font-size="9" font-family="sans-serif">反应</text>
  <text x="320" y="170" text-anchor="middle" fill="#ef4444" font-size="8" font-family="sans-serif">伸手拿</text>
  
  <circle cx="200" cy="205" r="28" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="200" y="201" text-anchor="middle" fill="#ef4444" font-size="9" font-family="sans-serif">奖励</text>
  <text x="200" y="215" text-anchor="middle" fill="#ef4444" font-size="8" font-family="sans-serif">多巴胺💉</text>
  
  <!-- 循环箭头 -->
  <path d="M108,160 Q145,145 182,135" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M235,142 Q275,150 292,155" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M310,185 Q265,210 228,205" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M175,198 Q130,185 95,175" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ef4444"/></marker></defs>
  
  <text x="205" y="250" text-anchor="middle" fill="#dc2626" font-size="10" font-family="sans-serif">闭环时间：5秒 → 无限循环</text>
  
  <!-- 右：学习回路 -->
  <rect x="410" y="70" width="370" height="170" rx="12" fill="#f8fafc" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="595" y="98" text-anchor="middle" fill="#b45309" font-size="13" font-weight="bold" font-family="sans-serif">📚 学习的"断环"</text>
  
  <!-- 断裂的回路 -->
  <circle cx="470" cy="160" r="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="470" y="156" text-anchor="middle" fill="#92400e" font-size="9" font-family="sans-serif">提示</text>
  <text x="470" y="170" text-anchor="middle" fill="#92400e" font-size="8" font-family="sans-serif">书桌在面前</text>
  
  <circle cx="600" cy="130" r="28" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="600" y="126" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">渴求</text>
  <text x="600" y="140" text-anchor="middle" fill="#64748b" font-size="7" font-family="sans-serif">?</text>
  
  <circle cx="710" cy="160" r="28" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="710" y="156" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">反应</text>
  <text x="710" y="170" text-anchor="middle" fill="#64748b" font-size="7" font-family="sans-serif">?</text>
  
  <circle cx="590" cy="205" r="28" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="590" y="201" text-anchor="middle" fill="#64748b" font-size="9" font-family="sans-serif">奖励</text>
  <text x="590" y="215" text-anchor="middle" fill="#64748b" font-size="8" font-family="sans-serif">几个月后?</text>
  
  <!-- 断裂标记 -->
  <text x="640" y="145" text-anchor="middle" fill="#ef4444" font-size="16" font-family="sans-serif">✕</text>
  <text x="595" y="250" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="sans-serif">闭环时间：几个月 → 断了</text>
  
  <!-- 底部结论 -->
  <rect x="80" y="300" width="640" height="100" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="328" text-anchor="middle" fill="#1e3a5f" font-size="12" font-weight="bold" font-family="sans-serif">💡 这不是你的品格问题，是进化刻在基因里的账本</text>
  
  <text x="400" y="352" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">眼前确定的小甜头 > 未来不确定的大奖励</text>
  <text x="400" y="372" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">→ 手机赢了，学习输了，每一次</text>
  <text x="400" y="392" text-anchor="middle" fill="#b45309" font-size="10" font-family="sans-serif">解法：不是靠意志力，是靠环境设计——手机放另一个房间</text>
</svg>