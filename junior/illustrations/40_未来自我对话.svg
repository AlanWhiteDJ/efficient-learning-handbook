<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#ffffff"/>
  <defs>
    <linearGradient id="mirrorG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="40%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>
    <linearGradient id="futureBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#ffffff"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowGold"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif" letter-spacing="2">未 来 自 我 对 话</text>

  <!-- 桌子 -->
  <rect x="280" y="420" width="240" height="10" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <rect x="290" y="430" width="6" height="55" fill="#fef3c7"/>
  <rect x="504" y="430" width="6" height="55" fill="#fef3c7"/>

  <!-- 左侧：现在的学生 -->
  <g transform="translate(200, 170)" filter="url(#shadow)">
    <!-- 身体 -->
    <rect x="-25" y="-45" width="50" height="65" rx="10" fill="#3b82f6"/>
    <!-- 头 -->
    <circle cx="0" cy="-65" r="22" fill="#92400e" opacity="0.9"/>
    <!-- 眼睛 -->
    <circle cx="-8" cy="-69" r="2.5" fill="#ffffff"/>
    <circle cx="8" cy="-69" r="2.5" fill="#ffffff"/>
    <!-- 眉毛（困惑） -->
    <line x1="-12" y1="-76" x2="-4" y2="-74" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="4" y1="-74" x2="12" y2="-76" stroke="#ffffff" stroke-width="1.5"/>
    <!-- 嘴 -->
    <path d="M-5,-56 Q0,-53 5,-56" fill="none" stroke="#ffffff" stroke-width="1"/>
    <!-- 书本 -->
    <rect x="30" y="-20" width="30" height="22" rx="2" fill="#1e40af" stroke="#2563eb" stroke-width="0.8"/>
    <text x="45" y="-6" text-anchor="middle" fill="#3b82f6" font-size="7" font-family="sans-serif">📚</text>
  </g>

  <!-- 镜子框架 -->
  <g transform="translate(400, 100)" filter="url(#shadow)">
    <!-- 框架 -->
    <rect x="0" y="0" width="110" height="160" rx="8" fill="#f8fafc" stroke="url(#mirrorG)" stroke-width="3"/>
    <!-- 镜面 -->
    <rect x="10" y="10" width="90" height="140" rx="4" fill="#ede9fe"/>
    <!-- 镜面反光 -->
    <line x1="20" y1="20" x2="50" y2="50" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <line x1="90" y1="30" x2="70" y2="50" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3"/>

    <!-- 镜中的未来自己 -->
    <g transform="translate(55, 120)">
      <!-- 未来自己：更成熟 -->
      <rect x="-20" y="-58" width="40" height="50" rx="8" fill="#8b5cf6"/>
      <!-- 西装领子 -->
      <path d="M-12,-45 L0,-35 L12,-45" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <!-- 头（更成熟） -->
      <circle cx="0" cy="-72" r="20" fill="#92400e" opacity="0.9"/>
      <!-- 眼镜 -->
      <rect x="-12" y="-78" width="24" height="10" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="-4" y1="-72" x2="4" y2="-72" stroke="#ffffff" stroke-width="1"/>
      <!-- 自信微笑 -->
      <path d="M-5,-64 Q0,-60 5,-64" fill="none" stroke="#ffffff" stroke-width="1"/>
      <!-- 头发 -->
      <path d="M-16,-86 Q0,-98 16,-86" fill="#fef3c7" stroke="none"/>
    </g>
  </g>

  <!-- 右侧：10年后的自己（实体） -->
  <g transform="translate(650, 150)" filter="url(#shadow)">
    <!-- 身体 -->
    <rect x="-30" y="-50" width="60" height="70" rx="12" fill="#8b5cf6"/>
    <!-- 西装 -->
    <rect x="-20" y="-45" width="40" height="40" rx="5" fill="#6d28d9"/>
    <path d="M-15,-40 L0,-28 L15,-40" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- 领带 -->
    <path d="M-3,-40 L0,-20 L3,-40" fill="#ec4899"/>
    <!-- 头 -->
    <circle cx="0" cy="-72" r="24" fill="#92400e" opacity="0.9"/>
    <!-- 眼镜 -->
    <rect x="-14" y="-80" width="28" height="12" rx="5" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="-5" y1="-73" x2="5" y2="-73" stroke="#ffffff" stroke-width="1"/>
    <!-- 自信微笑 -->
    <path d="M-6,-65 Q0,-60 6,-65" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <!-- 头发 -->
    <path d="M-20,-88 Q0,-104 20,-88" fill="#fef3c7" stroke="none"/>
  </g>

  <!-- 气泡：现在→未来 -->
  <g transform="translate(470, 70)" filter="url(#shadow)">
    <path d="M0,20 Q-10,-15 25,-40 L145,-40 Q185,-40 185,-10 Q185,20 145,20 L60,20 L48,45 Z" fill="#f8fafc" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="12" y="-10" fill="#3b82f6" font-size="12" font-family="sans-serif">你现在回头看我当初</text>
    <text x="12" y="8" fill="#3b82f6" font-size="12" font-family="sans-serif">学的那些东西，</text>
    <text x="12" y="26" fill="#3b82f6" font-size="12" font-family="sans-serif">是浪费了吗？</text>
  </g>

  <!-- 气泡：未来→现在 -->
  <g transform="translate(470, 260)" filter="url(#glowGold)">
    <path d="M0,0 Q-10,-30 25,-55 L195,-55 Q235,-55 235,-25 Q235,5 195,5 L60,5 L48,30 Z" fill="#f8fafc" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="12" y="-28" fill="#92400e" font-size="13" font-weight="bold" font-family="sans-serif">不！你是在帮我攒装备</text>
    <text x="12" y="-10" fill="#92400e" font-size="11" font-family="sans-serif">每一道题、每一次坚持</text>
    <text x="12" y="8" fill="#92400e" font-size="11" font-family="sans-serif">都在为未来的我升级</text>
  </g>

  <!-- 连接光束 -->
  <line x1="580" y1="260" x2="650" y2="195" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="580" y1="100" x2="620" y2="130" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 桌面上的物品 -->
  <rect x="310" y="395" width="40" height="25" rx="2" fill="#1e40af" stroke="#3b82f6" stroke-width="0.8"/>
  <line x1="470" y1="410" x2="510" y2="390" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>

  <!-- 时间轴 -->
  <g transform="translate(120, 460)">
    <line x1="0" y1="0" x2="560" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="100" cy="0" r="6" fill="#3b82f6"/>
    <text x="100" y="18" text-anchor="middle" fill="#2563eb" font-size="9" font-family="sans-serif">现在</text>
    <circle cx="450" cy="0" r="6" fill="#ec4899"/>
    <text x="450" y="18" text-anchor="middle" fill="#db2777" font-size="9" font-family="sans-serif">10年后</text>
    <path d="M100,0 L450,0" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4"/>
    <!-- 里程碑 -->
    <circle cx="230" cy="0" r="3" fill="#34d399"/>
    <text x="230" y="18" text-anchor="middle" fill="#34d399" font-size="8" font-family="sans-serif">装备+1</text>
    <circle cx="350" cy="0" r="3" fill="#34d399"/>
    <text x="350" y="18" text-anchor="middle" fill="#34d399" font-size="8" font-family="sans-serif">装备+1</text>
  </g>
</svg>