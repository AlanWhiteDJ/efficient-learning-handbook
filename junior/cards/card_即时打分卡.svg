    <text x="385" y="170" text-anchor="middle">周三</text>
    <text x="480" y="170" text-anchor="middle">周四</text>
    <text x="575" y="170" text-anchor="middle">周五</text>
    <text x="670" y="170" text-anchor="middle">周六</text>
    <text x="760" y="170" text-anchor="middle">周日</text>
