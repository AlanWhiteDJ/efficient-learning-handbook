      <text x="385" y="332" text-anchor="middle">_/5</text><text x="480" y="332" text-anchor="middle">_/5</text>
      <text x="575" y="332" text-anchor="middle">_/5</text><text x="670" y="332" text-anchor="middle">_/5</text>
      <text x="760" y="332" text-anchor="middle">_/5</text>
    </g>
    <g>
      <text x="195" y="384" text-anchor="middle">_/5</text><text x="290" y="384" text-anchor="middle">_/5</text>
      <text x="385" y="384" text-anchor="middle">_/5</text><text x="480" y="384" text-anchor="middle">_/5</text>
      <text x="575" y="384" text-anchor="middle">_/5</text><text x="670" y="384" text-anchor="middle">_/5</text>
      <text x="760" y="384" text-anchor="middle">_/5</text>
    </g>
