  <text x="400" y="47" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">card14 ｜ 即时分数记录卡</text>
  <text x="400" y="84" text-anchor="middle" fill="#64748b" font-size="13">方法：即时反馈 · Instant Feedback Scoring</text>
  <!-- Week header -->
