  <text x="100" y="452" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">日平均</text>
  <g font-size="10" fill="#94a3b8">
    <text x="195" y="452" text-anchor="middle">_._</text>
    <text x="290" y="452" text-anchor="middle">_._</text>
    <text x="385" y="452" text-anchor="middle">_._</text>
    <text x="480" y="452" text-anchor="middle">_._</text>
    <text x="575" y="452" text-anchor="middle">_._</text>
    <text x="670" y="452" text-anchor="middle">_._</text>
    <text x="760" y="452" text-anchor="middle">_._</text>
