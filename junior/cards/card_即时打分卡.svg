  <text x="56" y="496" fill="#1e40af" font-size="13">📊 本周总结</text>
  <text x="56" y="516" fill="#475569" font-size="12">本周平均分 </text>
  <rect x="160" y="502" width="50" height="18" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" rx="2"/>
  <text x="216" y="516" fill="#475569" font-size="12">/5</text>
  <text x="270" y="516" fill="#475569" font-size="12">｜ 最稳科目：</text>
