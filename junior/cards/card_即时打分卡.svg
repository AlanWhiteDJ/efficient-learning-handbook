      <text x="385" y="280" text-anchor="middle">_/5</text><text x="480" y="280" text-anchor="middle">_/5</text>
      <text x="575" y="280" text-anchor="middle">_/5</text><text x="670" y="280" text-anchor="middle">_/5</text>
      <text x="760" y="280" text-anchor="middle">_/5</text>
    </g>
