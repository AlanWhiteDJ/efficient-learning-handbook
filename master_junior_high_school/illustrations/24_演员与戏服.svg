<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f8fafc"/></linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  
  <text x="400" y="28" text-anchor="middle" fill="#1e3a5f" font-size="18" font-weight="bold" font-family="sans-serif">演员与戏服——题型一变为什么就懵</text>
  <text x="400" y="48" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">知识是演员，题型是戏服。认识演员，别只看戏服。</text>
  
  <!-- 舞台上 -->
  <rect x="60" y="80" width="680" height="200" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- 舞台装饰 -->
  <rect x="60" y="80" width="680" height="25" rx="12" fill="#cbd5e1"/>
  <text x="400" y="96" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">🎭 考 试 舞 台</text>
  
  <!-- 中央演员 -->
  <circle cx="400" cy="170" r="35" fill="#d1fae5" stroke="#059669" stroke-width="2.5"/>
  <text x="400" y="166" text-anchor="middle" fill="#059669" font-size="13" font-weight="bold" font-family="sans-serif">知识</text>
  <text x="400" y="182" text-anchor="middle" fill="#059669" font-size="10" font-family="sans-serif">本体</text>
  
  <!-- 三套戏服 -->
  <!-- 第一套: 选择题 -->
  <rect x="120" y="135" width="65" height="70" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5"/>
  <text x="152" y="158" text-anchor="middle" fill="#2563eb" font-size="9" font-family="sans-serif">A B C D</text>
  <text x="152" y="175" text-anchor="middle" fill="#2563eb" font-size="9" font-family="sans-serif">选择题</text>
  <text x="152" y="192" text-anchor="middle" fill="#3b82f6" font-size="7" font-family="sans-serif">戏服①</text>
  
  <!-- 第二套: 填空题 -->
  <rect x="320" y="120" width="65" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="352" y="143" text-anchor="middle" fill="#b45309" font-size="9" font-family="sans-serif">____</text>
  <text x="352" y="160" text-anchor="middle" fill="#b45309" font-size="9" font-family="sans-serif">填空题</text>
  <text x="352" y="177" text-anchor="middle" fill="#92400e" font-size="7" font-family="sans-serif">戏服②</text>
  
  <!-- 第三套: 解答题 -->
  <rect x="500" y="130" width="65" height="70" rx="6" fill="#4c1d95" stroke="#a855f7" stroke-width="1.5"/>
  <text x="532" y="153" text-anchor="middle" fill="#7c3aed" font-size="9" font-family="sans-serif">解：</text>
  <text x="532" y="170" text-anchor="middle" fill="#7c3aed" font-size="9" font-family="sans-serif">解答题</text>
  <text x="532" y="187" text-anchor="middle" fill="#a855f7" font-size="7" font-family="sans-serif">戏服③</text>
  
  <!-- 观众席 -->
  <text x="400" y="300" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">观众席上的学生：</text>
  
  <!-- 学生反应 -->
  <!-- 学生A：认出戏服1 -->
  <rect x="80" y="320" width="140" height="55" rx="8" fill="#d1fae5" stroke="#16a34a" stroke-width="1"/>
  <text x="150" y="343" text-anchor="middle" fill="#059669" font-size="9" font-family="sans-serif">看到戏服①</text>
  <text x="150" y="360" text-anchor="middle" fill="#059669" font-size="9" font-family="sans-serif">🙂 "这个我会!"</text>
  
  <!-- 学生B：戏服2懵了 -->
  <rect x="250" y="320" width="140" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="320" y="343" text-anchor="middle" fill="#dc2626" font-size="9" font-family="sans-serif">看到戏服②</text>
  <text x="320" y="360" text-anchor="middle" fill="#dc2626" font-size="9" font-family="sans-serif">😰 "这啥?"</text>
  
  <!-- 学生C：认出演员 -->
  <rect x="420" y="320" width="140" height="55" rx="8" fill="#d1fae5" stroke="#16a34a" stroke-width="2"/>
  <text x="490" y="343" text-anchor="middle" fill="#059669" font-size="9" font-family="sans-serif">看穿戏服！</text>
  <text x="490" y="360" text-anchor="middle" fill="#b45309" font-size="9" font-family="sans-serif">😎 "原来是同一个知识!"</text>
  
  <!-- 学生D：戏服3也懵 -->
  <rect x="590" y="320" width="140" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="343" text-anchor="middle" fill="#dc2626" font-size="9" font-family="sans-serif">看到戏服③</text>
  <text x="660" y="360" text-anchor="middle" fill="#dc2626" font-size="9" font-family="sans-serif">😱 "完全陌生!"</text>
  
  <!-- 底部结论 -->
  <rect x="130" y="395" width="540" height="38" rx="8" fill="#f8fafc" stroke="#b45309" stroke-width="1.5"/>
  <text x="400" y="420" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="sans-serif">同一份知识，变一套戏服就认不出来 → 你记的是戏服，不是演员</text>
</svg>