<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="550" fill="#ffffff"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="#f8fafc" opacity="0.85"/>
  <text x="400" y="18" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="12" letter-spacing="4">第12讲  ·  新手 vs 老司机</text>

  <!-- Center dividing line -->
  <line x1="400" y1="55" x2="400" y2="530" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,6" opacity="0.5"/>

  <!-- VS badge -->
  <g filter="url(#glow)">
    <circle cx="400" cy="100" r="28" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="106" text-anchor="middle" fill="#b45309" font-family="sans-serif" font-size="16" font-weight="bold">VS</text>
  </g>

  <!-- =====================================
       LEFT SIDE: Novice Driver
       ===================================== -->
  <g filter="url(#cardShadow)">
    <rect x="20" y="70" width="355" height="460" rx="14" fill="#f8fafc" stroke="#ef4444" stroke-width="1.5"/>

    <!-- Header -->
    <rect x="20" y="70" width="355" height="45" rx="14" fill="#fee2e2"/>
    <rect x="20" y="100" width="355" height="15" fill="#fee2e2"/>
    <text x="197" y="86" text-anchor="middle" fill="#ef4444" font-family="sans-serif" font-size="15" font-weight="bold">😰 新手司机 — 手忙脚乱</text>
    <text x="197" y="105" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">大脑满载，顾此失彼</text>

    <!-- Car frame (simple top-down view) -->
    <g transform="translate(60,140)">
      <!-- Car body -->
      <rect x="0" y="0" width="200" height="100" rx="15" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>

      <!-- Windshield -->
      <rect x="10" y="10" width="40" height="30" rx="5" fill="#ffffff" stroke="#64748b" stroke-width="0.8"/>
      <rect x="150" y="10" width="40" height="30" rx="5" fill="#ffffff" stroke="#64748b" stroke-width="0.8"/>

      <!-- Steering wheel -->
      <circle cx="70" cy="55" r="18" fill="none" stroke="#94a3b8" stroke-width="2"/>
      <circle cx="70" cy="55" r="4" fill="#94a3b8"/>
      <line x1="70" y1="37" x2="70" y2="45" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="70" y1="65" x2="70" y2="73" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="52" y1="55" x2="60" y2="55" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="80" y1="55" x2="88" y2="55" stroke="#94a3b8" stroke-width="1.5"/>

      <!-- Seat -->
      <rect x="130" y="40" width="50" height="35" rx="5" fill="#cbd5e1"/>

      <!-- Wheels -->
      <circle cx="28" cy="18" r="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
      <circle cx="28" cy="82" r="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
      <circle cx="172" cy="18" r="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
      <circle cx="172" cy="82" r="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    </g>

    <!-- Confusion marks flying around -->
    <text x="90" y="245" font-size="18" fill="#ef4444" opacity="0.8">?</text>
    <text x="300" y="250" font-size="22" fill="#ef4444" opacity="0.7">?</text>
    <text x="170" y="250" font-size="14" fill="#ef4444" opacity="0.6">?</text>

    <!-- Thought cloud with overloaded thoughts -->
    <g transform="translate(40,260)">
      <rect x="0" y="0" width="290" height="180" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="1" opacity="0.8"/>

      <!-- Overloaded thought items -->
      <g transform="translate(15,20)">
        <text x="0" y="0" fill="#ef4444" font-family="sans-serif" font-size="10">🚗 <tspan fill="#334155">转弯→打转向灯→看后视镜</tspan></text>
        <text x="0" y="25" fill="#ef4444" font-family="sans-serif" font-size="10">⚙️ <tspan fill="#334155">离合踩到底→换挡→松离合</tspan></text>
        <text x="0" y="50" fill="#ef4444" font-family="sans-serif" font-size="10">👀 <tspan fill="#334155">同时看前方+后方+侧方</tspan></text>
        <text x="0" y="75" fill="#ef4444" font-family="sans-serif" font-size="10">🦶 <tspan fill="#334155">刹车力度控制→不能急刹</tspan></text>
        <text x="0" y="100" fill="#ef4444" font-family="sans-serif" font-size="10">📏 <tspan fill="#334155">判断车距→不能刮蹭</tspan></text>
        <text x="0" y="125" fill="#ef4444" font-family="sans-serif" font-size="10">🚦 <tspan fill="#334155">看红绿灯+行人+非机动车</tspan></text>
      </g>

      <!-- Brain overload indicator -->
      <rect x="60" y="152" width="170" height="20" rx="10" fill="#ef4444" opacity="0.2"/>
      <text x="145" y="166" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-size="9">⚠ 大脑过载！同时处理所有信息</text>
    </g>

    <!-- Stress lines -->
    <text x="60" y="490" fill="#ef4444" font-family="sans-serif" font-size="10">焦虑</text>
    <text x="160" y="510" fill="#ef4444" font-family="sans-serif" font-size="10">慌乱</text>
    <text x="260" y="490" fill="#ef4444" font-family="sans-serif" font-size="10">分心</text>
    <text x="100" y="520" fill="#ef4444" font-family="sans-serif" font-size="9">容易出错</text>
  </g>

  <!-- =====================================
       RIGHT SIDE: Expert Driver
       ===================================== -->
  <g filter="url(#cardShadow)">
    <rect x="425" y="70" width="355" height="460" rx="14" fill="#f8fafc" stroke="#34d399" stroke-width="1.5"/>

    <!-- Header -->
    <rect x="425" y="70" width="355" height="45" rx="14" fill="#d1fae5"/>
    <rect x="425" y="100" width="355" height="15" fill="#d1fae5"/>
    <text x="602" y="86" text-anchor="middle" fill="#059669" font-family="sans-serif" font-size="15" font-weight="bold">😎 老司机 — 游刃有余</text>
    <text x="602" y="105" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">操作自动化，大脑只关注路况</text>

    <!-- Car frame (simple top-down view) -->
    <g transform="translate(465,140)">
      <!-- Car body -->
      <rect x="0" y="0" width="200" height="100" rx="15" fill="#f8fafc" stroke="#34d399" stroke-width="1.5"/>

      <!-- Windshield -->
      <rect x="10" y="10" width="40" height="30" rx="5" fill="#ffffff" stroke="#059669" stroke-width="0.8"/>
      <rect x="150" y="10" width="40" height="30" rx="5" fill="#ffffff" stroke="#059669" stroke-width="0.8"/>

      <!-- Steering wheel (calm, one hand) -->
      <circle cx="70" cy="55" r="18" fill="none" stroke="#34d399" stroke-width="2"/>
      <line x1="70" y1="37" x2="70" y2="73" stroke="#34d399" stroke-width="1" opacity="0.5"/>
      <line x1="52" y1="55" x2="88" y2="55" stroke="#34d399" stroke-width="1" opacity="0.5"/>

      <!-- Seat -->
      <rect x="130" y="40" width="50" height="35" rx="5" fill="#cbd5e1"/>

      <!-- Calm driver emoji -->
      <text x="155" y="62" text-anchor="middle" font-size="18">😎</text>

      <!-- Wheels -->
      <circle cx="28" cy="18" r="12" fill="#ffffff" stroke="#34d399" stroke-width="1.5"/>
      <circle cx="28" cy="82" r="12" fill="#ffffff" stroke="#34d399" stroke-width="1.5"/>
      <circle cx="172" cy="18" r="12" fill="#ffffff" stroke="#34d399" stroke-width="1.5"/>
      <circle cx="172" cy="82" r="12" fill="#ffffff" stroke="#34d399" stroke-width="1.5"/>
    </g>

    <!-- Automation thought cloud -->
    <g transform="translate(445,260)">
      <rect x="0" y="0" width="290" height="180" rx="10" fill="#ffffff" stroke="#34d399" stroke-width="1" opacity="0.8"/>

      <!-- Automated items with checkmarks -->
      <g transform="translate(15,20)">
        <text x="0" y="0" fill="#34d399" font-family="sans-serif" font-size="11">✅ <tspan fill="#94a3b8">换挡→</tspan><tspan fill="#059669" font-weight="bold">自动化</tspan></text>
        <text x="0" y="25" fill="#34d399" font-family="sans-serif" font-size="11">✅ <tspan fill="#94a3b8">后视镜观察→</tspan><tspan fill="#059669" font-weight="bold">自动化</tspan></text>
        <text x="0" y="50" fill="#34d399" font-family="sans-serif" font-size="11">✅ <tspan fill="#94a3b8">离合控制→</tspan><tspan fill="#059669" font-weight="bold">自动化</tspan></text>
        <text x="0" y="75" fill="#34d399" font-family="sans-serif" font-size="11">✅ <tspan fill="#94a3b8">刹车力度→</tspan><tspan fill="#059669" font-weight="bold">自动化</tspan></text>
        <text x="0" y="100" fill="#34d399" font-family="sans-serif" font-size="11">✅ <tspan fill="#94a3b8">转向灯→</tspan><tspan fill="#059669" font-weight="bold">自动化</tspan></text>
      </g>

      <!-- Brain focus indicator -->
      <rect x="40" y="135" width="210" height="20" rx="10" fill="#34d399" opacity="0.15"/>
      <text x="145" y="150" text-anchor="middle" fill="#059669" font-family="sans-serif" font-size="9">🧠 大脑只关注 <tspan fill="#b45309" font-weight="bold">路况</tspan> → 轻松应对</text>

      <!-- Star -->
      <text x="145" y="170" text-anchor="middle" fill="#b45309" font-size="12">⭐ ⭐ ⭐</text>
    </g>

    <!-- Calm indicators -->
    <text x="470" y="490" fill="#34d399" font-family="sans-serif" font-size="10">从容</text>
    <text x="560" y="510" fill="#34d399" font-family="sans-serif" font-size="10">轻松</text>
    <text x="660" y="490" fill="#34d399" font-family="sans-serif" font-size="10">专注</text>
    <text x="555" y="525" fill="#34d399" font-family="sans-serif" font-size="9">几乎不出错</text>
  </g>

  <!-- === Bottom insight bar === -->
  <rect x="100" y="500" width="600" height="42" rx="10" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="526" text-anchor="middle" fill="#a16207" font-family="sans-serif" font-size="16" font-weight="bold">把基础动作练成"自动化"，大脑才能腾出空间处理真正重要的东西</text>
</svg>
