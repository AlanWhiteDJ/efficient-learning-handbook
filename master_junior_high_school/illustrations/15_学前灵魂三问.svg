<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#ffffff"/>
  <!-- 标题 -->
  <text x="400" y="36" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#f59e0b">学前灵魂三问</text>

  <!-- 书桌 -->
  <rect x="80" y="320" width="640" height="18" rx="4" fill="#64748b"/>
  <rect x="90" y="338" width="16" height="160" rx="3" fill="#94a3b8"/>
  <rect x="694" y="338" width="16" height="160" rx="3" fill="#94a3b8"/>

  <!-- 课本（未翻开状态，封面朝上） -->
  <rect x="280" y="230" width="240" height="90" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <rect x="290" y="240" width="220" height="12" rx="3" fill="#cbd5e1"/>
  <rect x="290" y="260" width="160" height="8" rx="2" fill="#cbd5e1"/>
  <rect x="290" y="278" width="200" height="8" rx="2" fill="#cbd5e1"/>
  <text x="400" y="305" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">即将翻开的新课</text>

  <!-- 笔记本放在右侧 -->
  <rect x="520" y="245" width="160" height="75" rx="3" fill="#92400e" stroke="#f59e0b" stroke-width="1.5" transform="rotate(-8, 520, 245)"/>
  <rect x="525" y="252" width="150" height="2" rx="1" fill="#d97706" transform="rotate(-8, 520, 245)"/>
  <rect x="525" y="260" width="150" height="2" rx="1" fill="#d97706" transform="rotate(-8, 520, 245)"/>
  <rect x="525" y="268" width="150" height="2" rx="1" fill="#d97706" transform="rotate(-8, 520, 245)"/>
  <rect x="525" y="276" width="150" height="2" rx="1" fill="#d97706" transform="rotate(-8, 520, 245)"/>
  <rect x="525" y="284" width="150" height="2" rx="1" fill="#d97706" transform="rotate(-8, 520, 245)"/>
  <rect x="525" y="292" width="100" height="2" rx="1" fill="#d97706" transform="rotate(-8, 520, 245)"/>
  <circle cx="600" cy="300" r="18" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" transform="rotate(-8, 520, 245)"/>
  <text x="598" y="304" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d97706" font-weight="bold" transform="rotate(-8, 520, 245)">锚点</text>

  <!-- 头脑/大脑轮廓 -->
  <ellipse cx="400" cy="170" rx="55" ry="40" fill="none" stroke="#8b5cf6" stroke-width="2"/>

  <!-- 气泡1 -->
  <ellipse cx="560" cy="60" rx="170" ry="38" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="560" y="54" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#3b82f6">这个和之前学的什么有关？</text>
  <line x1="470" y1="95" x2="420" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 气泡2 -->
  <ellipse cx="560" cy="130" rx="170" ry="38" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="124" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#34d399">生活中有类似现象吗？</text>
  <line x1="470" y1="145" x2="430" y2="165" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 气泡3 -->
  <ellipse cx="560" cy="200" rx="170" ry="38" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="560" y="194" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f59e0b">我猜大概是讲什么？</text>
  <line x1="470" y1="200" x2="445" y2="180" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 编号 -->
  <circle cx="60" cy="30" r="16" fill="#f59e0b" opacity="0.3"/>
  <text x="60" y="36" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">15</text>
</svg>