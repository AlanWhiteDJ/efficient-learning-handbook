<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>
  <rect width="800" height="600" fill="#ffffff" rx="8"/>
  <rect x="4" y="4" width="792" height="592" fill="none" stroke="#e2e8f0" stroke-width="2" rx="6"/>
  
  <text x="780" y="28" font-size="10" fill="#94a3b8" text-anchor="end">📖 高效学习手册 · 检索练习（Testing Effect）</text>
  
  <text x="400" y="58" font-size="22" font-weight="bold" fill="#1e3a5f" text-anchor="middle">📝 模拟自测排程表</text>
  <text x="400" y="78" font-size="11" fill="#64748b" text-anchor="middle">自己考自己，大脑才会当真。检索越费力，记忆越牢固。</text>
  
  <!-- 表头 -->
  <g transform="translate(36,98)">
    <rect x="0" y="0" width="84" height="38" fill="#1e3a5f" rx="4"/>
    <text x="42" y="25" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">日期</text>
    
    <rect x="90" y="0" width="198" height="38" fill="#1e3a5f" rx="4"/>
    <text x="189" y="25" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">自测内容</text>
    
    <rect x="294" y="0" width="130" height="38" fill="#2563eb" rx="4"/>
    <text x="359" y="25" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">🏠 环境</text>
    
    <rect x="430" y="0" width="80" height="38" fill="#2563eb" rx="4"/>
    <text x="470" y="25" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">⏱ 限时</text>
    
    <rect x="516" y="0" width="70" height="38" fill="#2563eb" rx="4"/>
    <text x="551" y="25" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">📊 分</text>
    
    <rect x="592" y="0" width="174" height="38" fill="#2563eb" rx="4"/>
    <text x="679" y="25" font-size="12" fill="#ffffff" font-weight="bold" text-anchor="middle">错因总结</text>
  </g>
  
  <!-- 5行数据 -->
  <g transform="translate(36,136)">
    <rect x="0" y="0" width="766" height="56" fill="#ffffff" stroke="#e2e8f0"/>
    <line x1="84" y1="0" x2="84" y2="56" stroke="#e2e8f0"/>
    <line x1="288" y1="0" x2="288" y2="56" stroke="#e2e8f0"/>
    <line x1="424" y1="0" x2="424" y2="56" stroke="#e2e8f0"/>
    <line x1="510" y1="0" x2="510" y2="56" stroke="#e2e8f0"/>
    <line x1="586" y1="0" x2="586" y2="56" stroke="#e2e8f0"/>
    
    <rect x="0" y="62" width="766" height="56" fill="#f8fafc" stroke="#e2e8f0"/>
    <line x1="84" y1="62" x2="84" y2="118" stroke="#e2e8f0"/>
    <line x1="288" y1="62" x2="288" y2="118" stroke="#e2e8f0"/>
    <line x1="424" y1="62" x2="424" y2="118" stroke="#e2e8f0"/>
    <line x1="510" y1="62" x2="510" y2="118" stroke="#e2e8f0"/>
    <line x1="586" y1="62" x2="586" y2="118" stroke="#e2e8f0"/>
    
    <rect x="0" y="124" width="766" height="56" fill="#ffffff" stroke="#e2e8f0"/>
    <line x1="84" y1="124" x2="84" y2="180" stroke="#e2e8f0"/>
    <line x1="288" y1="124" x2="288" y2="180" stroke="#e2e8f0"/>
    <line x1="424" y1="124" x2="424" y2="180" stroke="#e2e8f0"/>
    <line x1="510" y1="124" x2="510" y2="180" stroke="#e2e8f0"/>
    <line x1="586" y1="124" x2="586" y2="180" stroke="#e2e8f0"/>
    
    <rect x="0" y="186" width="766" height="56" fill="#f8fafc" stroke="#e2e8f0"/>
    <line x1="84" y1="186" x2="84" y2="242" stroke="#e2e8f0"/>
    <line x1="288" y1="186" x2="288" y2="242" stroke="#e2e8f0"/>
    <line x1="424" y1="186" x2="424" y2="242" stroke="#e2e8f0"/>
    <line x1="510" y1="186" x2="510" y2="242" stroke="#e2e8f0"/>
    <line x1="586" y1="186" x2="586" y2="242" stroke="#e2e8f0"/>
    
    <rect x="0" y="248" width="766" height="56" fill="#ffffff" stroke="#e2e8f0"/>
    <line x1="84" y1="248" x2="84" y2="304" stroke="#e2e8f0"/>
    <line x1="288" y1="248" x2="288" y2="304" stroke="#e2e8f0"/>
    <line x1="424" y1="248" x2="424" y2="304" stroke="#e2e8f0"/>
    <line x1="510" y1="248" x2="510" y2="304" stroke="#e2e8f0"/>
    <line x1="586" y1="248" x2="586" y2="304" stroke="#e2e8f0"/>
  </g>
  
  <!-- 表格总计 -->
  <rect x="36" y="450" width="766" height="44" fill="#f1f5f9" stroke="#e2e8f0" rx="4"/>
  <line x1="120" y1="450" x2="120" y2="494" stroke="#e2e8f0"/>
  <line x1="324" y1="450" x2="324" y2="494" stroke="#e2e8f0"/>
  <line x1="460" y1="450" x2="460" y2="494" stroke="#e2e8f0"/>
  <line x1="546" y1="450" x2="546" y2="494" stroke="#e2e8f0"/>
  <line x1="622" y1="450" x2="622" y2="494" stroke="#e2e8f0"/>
  <text x="60" y="477" font-size="13" fill="#1e3a5f" font-weight="bold" text-anchor="middle">📊 总结</text>
  
  <!-- 底部提示 -->
  <rect x="36" y="506" width="766" height="76" fill="#f0f9ff" stroke="#bae6fd" rx="6"/>
  <text x="400" y="530" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">💡 每周至少 1 次自测，环境换着来（家里/图书馆/咖啡馆），分数不重要！</text>
  <text x="400" y="552" font-size="12" fill="#64748b" text-anchor="middle">检索练习效果 ≈ 重读3遍。环境多变 → 考试时不受环境干扰。</text>
  <text x="400" y="572" font-size="11" fill="#94a3b8" text-anchor="middle">建议：用旧试卷、课后题、自己出题，比单纯翻笔记有效得多。</text>
</svg>