<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="800" height="600" fill="#ffffff" rx="12"/>
  <rect x="16" y="16" width="768" height="568" fill="none" stroke="#e2e8f0" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="16" y="16" width="768" height="48" fill="#1e3a5f" rx="8"/>
  <rect x="16" y="40" width="768" height="24" fill="#1e3a5f"/>
  <text x="400" y="47" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">card17 ｜ 检查三遍清单</text>
  <text x="400" y="84" text-anchor="middle" fill="#64748b" font-size="13">方法：分层检查法 · Three-Pass Checking Protocol</text>
  <!-- Three columns -->
  <!-- Column 1 -->
  <rect x="24" y="100" width="246" height="350" fill="#fef2f2" rx="6" stroke="#fecaca" stroke-width="1.5"/>
  <rect x="24" y="100" width="246" height="44" fill="#dc2626" rx="6"/>
  <rect x="24" y="126" width="246" height="18" fill="#dc2626"/>
  <text x="147" y="130" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">第一遍 · 补漏</text>
  <text x="147" y="162" text-anchor="middle" fill="#991b1b" font-size="12" font-weight="600">⏱ 限时 3 分钟</text>
  <g font-size="13" fill="#475569">
    <rect x="44" y="186" width="18" height="18" fill="none" stroke="#991b1b" stroke-width="1.5" rx="3"/>
    <text x="70" y="200">有空题没做？</text>
    <rect x="44" y="220" width="18" height="18" fill="none" stroke="#991b1b" stroke-width="1.5" rx="3"/>
    <text x="70" y="234">答题卡串行？</text>
    <rect x="44" y="254" width="18" height="18" fill="none" stroke="#991b1b" stroke-width="1.5" rx="3"/>
    <text x="70" y="268">名字/考号写了？</text>
  </g>
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4">
    <line x1="40" y1="295" x2="254" y2="295"/>
    <line x1="40" y1="315" x2="254" y2="315"/>
  </g>
  <text x="44" y="335" fill="#991b1b" font-size="11" font-weight="600">遗漏笔记：</text>
  <!-- Column 2 -->
  <rect x="278" y="100" width="246" height="350" fill="#eff6ff" rx="6" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="278" y="100" width="246" height="44" fill="#2563eb" rx="6"/>
  <rect x="278" y="126" width="246" height="18" fill="#2563eb"/>
  <text x="401" y="130" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">第二遍 · 验算</text>
  <text x="401" y="162" text-anchor="middle" fill="#1e3a5f" font-size="12" font-weight="600">⏱ 每题 30 秒</text>
  <g font-size="13" fill="#475569">
    <rect x="298" y="186" width="18" height="18" fill="none" stroke="#1e3a5f" stroke-width="1.5" rx="3"/>
    <text x="324" y="200">换条路算（代入/估值）？</text>
    <rect x="298" y="240" width="18" height="18" fill="none" stroke="#1e3a5f" stroke-width="1.5" rx="3"/>
    <text x="324" y="254">单位对吗？</text>
  </g>
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4">
    <line x1="294" y1="295" x2="508" y2="295"/>
    <line x1="294" y1="315" x2="508" y2="315"/>
  </g>
  <text x="298" y="335" fill="#1e3a5f" font-size="11" font-weight="600">验算笔记：</text>
  <!-- Column 3 -->
  <rect x="532" y="100" width="246" height="350" fill="#f0fdf4" rx="6" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="532" y="100" width="246" height="44" fill="#16a34a" rx="6"/>
  <rect x="532" y="126" width="246" height="18" fill="#16a34a"/>
  <text x="655" y="130" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">第三遍 · 格式</text>
  <text x="655" y="162" text-anchor="middle" fill="#166534" font-size="12" font-weight="600">⏱ 限时 3 分钟</text>
  <g font-size="13" fill="#475569">
    <rect x="552" y="186" width="18" height="18" fill="none" stroke="#166534" stroke-width="1.5" rx="3"/>
    <text x="578" y="200">负号写了？</text>
    <rect x="552" y="222" width="18" height="18" fill="none" stroke="#166534" stroke-width="1.5" rx="3"/>
    <text x="578" y="236">小数点位置？</text>
    <rect x="552" y="258" width="18" height="18" fill="none" stroke="#166534" stroke-width="1.5" rx="3"/>
    <text x="578" y="272">单位标注了？</text>
    <rect x="552" y="294" width="18" height="18" fill="none" stroke="#166534" stroke-width="1.5" rx="3"/>
    <text x="578" y="308">作文标点/标题？</text>
  </g>
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4">
    <line x1="548" y1="340" x2="762" y2="340"/>
    <line x1="548" y1="360" x2="762" y2="360"/>
  </g>
  <text x="552" y="380" fill="#166534" font-size="11" font-weight="600">格式笔记：</text>
  <!-- Bottom rule -->
  <rect x="24" y="462" width="754" height="42" fill="#1e3a5f" rx="6"/>
  <text x="401" y="490" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">🚨 每一遍只看一件事！—— 别贪心，分三轮比一轮全查更有效</text>
  <!-- Tips -->
  <text x="60" y="538" fill="#64748b" font-size="12">💡 时间分配策略：第一遍抓大分（空题补上就是10分），第二遍抓中分（关键题验算），第三遍抓小分（格式1-2分也是分）</text>
  <text x="400" y="578" text-anchor="middle" fill="#94a3b8" font-size="10">高效学习手册 · 方法工具卡</text>
</svg>