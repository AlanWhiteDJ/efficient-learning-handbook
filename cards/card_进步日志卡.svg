<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>
  <rect width="800" height="600" fill="#ffffff" rx="8"/>
  <rect x="4" y="4" width="792" height="592" fill="none" stroke="#e2e8f0" stroke-width="2" rx="6"/>
  
  <text x="780" y="28" font-size="10" fill="#94a3b8" text-anchor="end">📖 高效学习手册 · 进步可视化</text>
  
  <text x="400" y="58" font-size="22" font-weight="bold" fill="#1e3a5f" text-anchor="middle">🌱 每日小赢记录卡</text>
  <text x="400" y="78" font-size="11" fill="#64748b" text-anchor="middle">"小赢"不是大成就，而是今天做了一件昨天不会做的小事。</text>
  
  <!-- 周标 -->
  <rect x="50" y="98" width="700" height="36" fill="#1e3a5f" rx="4"/>
  <text x="400" y="122" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">📅 第 ____ 周</text>
  
  <!-- 7行 -->
  <g transform="translate(50,140)">
    <!-- 表头 -->
    <rect x="0" y="0" width="700" height="32" fill="#f1f5f9" rx="3"/>
    <text x="90" y="21" font-size="12" fill="#1e3a5f" font-weight="bold" text-anchor="middle">日期</text>
    <text x="340" y="21" font-size="12" fill="#1e3a5f" font-weight="bold" text-anchor="middle">✨ 今日微突破</text>
    <text x="590" y="21" font-size="12" fill="#1e3a5f" font-weight="bold" text-anchor="middle">💬 一句话感受</text>
    
    <!-- 7 data rows -->
    <g>
      <rect x="0" y="36" width="700" height="48" fill="#ffffff" stroke="#e2e8f0"/>
      <line x1="180" y1="36" x2="180" y2="84" stroke="#e2e8f0"/>
      <line x1="500" y1="36" x2="500" y2="84" stroke="#e2e8f0"/>
    </g>
    <g>
      <rect x="0" y="88" width="700" height="48" fill="#f8fafc" stroke="#e2e8f0"/>
      <line x1="180" y1="88" x2="180" y2="136" stroke="#e2e8f0"/>
      <line x1="500" y1="88" x2="500" y2="136" stroke="#e2e8f0"/>
    </g>
    <g>
      <rect x="0" y="140" width="700" height="48" fill="#ffffff" stroke="#e2e8f0"/>
      <line x1="180" y1="140" x2="180" y2="188" stroke="#e2e8f0"/>
      <line x1="500" y1="140" x2="500" y2="188" stroke="#e2e8f0"/>
    </g>
    <g>
      <rect x="0" y="192" width="700" height="48" fill="#f8fafc" stroke="#e2e8f0"/>
      <line x1="180" y1="192" x2="180" y2="240" stroke="#e2e8f0"/>
      <line x1="500" y1="192" x2="500" y2="240" stroke="#e2e8f0"/>
    </g>
    <g>
      <rect x="0" y="244" width="700" height="48" fill="#ffffff" stroke="#e2e8f0"/>
      <line x1="180" y1="244" x2="180" y2="292" stroke="#e2e8f0"/>
      <line x1="500" y1="244" x2="500" y2="292" stroke="#e2e8f0"/>
    </g>
    <g>
      <rect x="0" y="296" width="700" height="48" fill="#f8fafc" stroke="#e2e8f0"/>
      <line x1="180" y1="296" x2="180" y2="344" stroke="#e2e8f0"/>
      <line x1="500" y1="296" x2="500" y2="344" stroke="#e2e8f0"/>
    </g>
    <g>
      <rect x="0" y="348" width="700" height="48" fill="#ffffff" stroke="#e2e8f0"/>
      <line x1="180" y1="348" x2="180" y2="396" stroke="#e2e8f0"/>
      <line x1="500" y1="348" x2="500" y2="396" stroke="#e2e8f0"/>
    </g>
  </g>
  
  <!-- 总结 -->
  <rect x="50" y="540" width="700" height="44" fill="#fef3c7" rx="6" stroke="#fcd34d"/>
  <text x="70" y="560" font-size="13" fill="#92400e" font-weight="bold">🏆 本周我最大的成长是：</text>
  <text x="300" y="560" font-size="13" fill="#92400e">______________________________________________</text>
</svg>