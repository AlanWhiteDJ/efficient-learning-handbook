<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
  </defs>
  <rect width="800" height="600" fill="#ffffff" rx="8"/>
  <rect x="4" y="4" width="792" height="592" fill="none" stroke="#e2e8f0" stroke-width="2" rx="6"/>
  
  <text x="780" y="28" font-size="10" fill="#94a3b8" text-anchor="end">📖 高效学习手册 · 错题三层追溯法</text>
  
  <text x="400" y="58" font-size="22" font-weight="bold" fill="#1e3a5f" text-anchor="middle">🔍 错题追溯卡</text>
  <text x="400" y="78" font-size="11" fill="#64748b" text-anchor="middle">不是"我错了"，而是"我为什么错"——从表面到根源，三层深挖</text>
  
  <!-- 题目区 -->
  <rect x="50" y="96" width="700" height="44" fill="#f8fafc" stroke="#e2e8f0" rx="4"/>
  <text x="66" y="116" font-size="13" fill="#1e3a5f" font-weight="bold">📝 题目：</text>
  <text x="130" y="116" font-size="13" fill="#94a3b8">__________________________________________</text>
  <text x="520" y="116" font-size="13" fill="#94a3b8">来源：____________</text>
  
  <!-- 答案对比 -->
  <g transform="translate(50,152)">
    <rect x="0" y="0" width="340" height="44" fill="#fef2f2" stroke="#fecaca" rx="4"/>
    <text x="16" y="27" font-size="13" fill="#dc2626" font-weight="bold">❌ 我的答案：</text>
    <text x="160" y="27" font-size="13" fill="#94a3b8">________________________</text>
    
    <rect x="360" y="0" width="340" height="44" fill="#f0fdf4" stroke="#bbf7d0" rx="4"/>
    <text x="376" y="27" font-size="13" fill="#16a34a" font-weight="bold">✅ 正确答案：</text>
    <text x="520" y="27" font-size="13" fill="#94a3b8">________________________</text>
  </g>
  
  <!-- 三层追溯 -->
  <!-- 第一层 -->
  <rect x="50" y="212" width="700" height="72" fill="#fef2f2" stroke="#fca5a5" rx="6"/>
  <rect x="50" y="212" width="30" height="72" fill="#dc2626" rx="6"/>
  <rect x="50" y="240" width="30" height="44" fill="#dc2626"/>
  <text x="65" y="236" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">表</text>
  <text x="65" y="254" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">层</text>
  <text x="94" y="235" font-size="13" fill="#dc2626" font-weight="bold">① 表层错误（我写错了什么）：</text>
  <text x="336" y="235" font-size="13" fill="#94a3b8">________________________________</text>
  <text x="94" y="263" font-size="12" fill="#9ca3af">例如：算错、抄错、记错公式、看错题目</text>
  
  <!-- 箭头 -->
  <text x="400" y="298" font-size="16" fill="#64748b" text-anchor="middle">↓</text>
  
  <!-- 第二层 -->
  <rect x="50" y="306" width="700" height="72" fill="#fff7ed" stroke="#fdba74" rx="6"/>
  <rect x="50" y="306" width="30" height="72" fill="#ea580c" rx="6"/>
  <rect x="50" y="334" width="30" height="44" fill="#ea580c"/>
  <text x="65" y="330" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">中</text>
  <text x="65" y="348" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">层</text>
  <text x="94" y="329" font-size="13" fill="#ea580c" font-weight="bold">② 中间环节（哪一步判断错了）：</text>
  <text x="350" y="329" font-size="13" fill="#94a3b8">______________________________</text>
  <text x="94" y="357" font-size="12" fill="#9ca3af">例如：应该用公式A却用了B、逻辑转折处选错了方向</text>
  
  <text x="400" y="392" font-size="16" fill="#64748b" text-anchor="middle">↓</text>
  
  <!-- 第三层 -->
  <rect x="50" y="400" width="700" height="72" fill="#fefce8" stroke="#fde047" rx="6"/>
  <rect x="50" y="400" width="30" height="72" fill="#eab308" rx="6"/>
  <rect x="50" y="428" width="30" height="44" fill="#eab308"/>
  <text x="65" y="424" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">根</text>
  <text x="65" y="442" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">源</text>
  <text x="94" y="423" font-size="13" fill="#ca8a04" font-weight="bold">③ 根源认知（我误以为______）：</text>
  <text x="336" y="423" font-size="13" fill="#94a3b8">________________________________</text>
  <text x="94" y="451" font-size="12" fill="#9ca3af">例如：误以为"增函数"一定导数＞0、误以为光合作用只在白天</text>
  
  <!-- 预防 -->
  <rect x="50" y="488" width="700" height="48" fill="#f0fdf4" stroke="#86efac" rx="6"/>
  <text x="70" y="510" font-size="13" fill="#166534" font-weight="bold">🛡️ 下次预防：如果看到</text>
  <text x="210" y="510" font-size="13" fill="#166534">______________</text>
  <text x="380" y="510" font-size="13" fill="#166534" font-weight="bold">，我要提醒自己</text>
  <text x="550" y="510" font-size="13" fill="#166534">______________</text>
  
  <text x="400" y="560" font-size="11" fill="#94a3b8" text-anchor="middle">📋 每题一卡，复印使用。根源层找到的认知错误，才是真正的进步！</text>
</svg>