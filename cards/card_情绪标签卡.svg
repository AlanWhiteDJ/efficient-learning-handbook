<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="800" height="600" fill="#ffffff" rx="12"/>
  <rect x="16" y="16" width="768" height="568" fill="none" stroke="#e2e8f0" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="16" y="16" width="768" height="48" fill="#1e3a5f" rx="8"/>
  <rect x="16" y="40" width="768" height="24" fill="#1e3a5f"/>
  <text x="400" y="47" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">card19 ｜ 情绪标签卡</text>
  <text x="400" y="84" text-anchor="middle" fill="#64748b" font-size="13">方法：情绪锚定记忆 · Emotional Anchoring for Memory</text>
  <!-- Knowledge point -->
  <rect x="40" y="100" width="720" height="50" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="124" fill="#1e3a5f" font-size="15" font-weight="700">📖 知识点：</text>
  <rect x="200" y="112" width="540" height="24" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" rx="2"/>
  <!-- Association -->
  <rect x="40" y="162" width="720" height="80" fill="#fefce8" rx="6" stroke="#fde047" stroke-width="1.5"/>
  <text x="60" y="186" fill="#854d0e" font-size="14" font-weight="700">🎨 我的联想（画面 / 故事 / 人 / 场景）：</text>
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4">
    <line x1="60" y1="202" x2="740" y2="202"/>
    <line x1="60" y1="222" x2="740" y2="222"/>
    <line x1="60" y1="238" x2="740" y2="238"/>
  </g>
  <!-- Mental snapshot -->
  <rect x="40" y="254" width="720" height="80" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1.5"/>
  <text x="60" y="278" fill="#166534" font-size="14" font-weight="700">📸 心理快照（1 秒闪过的画面描述）：</text>
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4">
    <line x1="60" y1="294" x2="740" y2="294"/>
    <line x1="60" y1="314" x2="740" y2="314"/>
    <line x1="60" y1="330" x2="740" y2="330"/>
  </g>
  <!-- Emotion spectrum selector -->
  <rect x="40" y="346" width="720" height="70" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="368" text-anchor="middle" fill="#1e3a5f" font-size="12" font-weight="700">😀 情绪标签选择（可多选）</text>
  <g font-size="13">
    <rect x="65" y="382" width="60" height="24" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="95" y="399" text-anchor="middle" fill="#475569">😂 搞笑</text>
    <rect x="140" y="382" width="60" height="24" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="170" y="399" text-anchor="middle" fill="#475569">😱 震惊</text>
    <rect x="215" y="382" width="60" height="24" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="245" y="399" text-anchor="middle" fill="#475569">🤢 恶心</text>
    <rect x="290" y="382" width="60" height="24" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="320" y="399" text-anchor="middle" fill="#475569">🤔 困惑</text>
    <rect x="365" y="382" width="60" height="24" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="395" y="399" text-anchor="middle" fill="#475569">😡 愤怒</text>
    <rect x="440" y="382" width="60" height="24" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="470" y="399" text-anchor="middle" fill="#475569">🥰 温暖</text>
    <rect x="515" y="382" width="60" height="24" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="545" y="399" text-anchor="middle" fill="#475569">🤯 烧脑</text>
    <rect x="590" y="382" width="60" height="24" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="620" y="399" text-anchor="middle" fill="#475569">😴 无聊</text>
  </g>
  <!-- Strategy -->
  <rect x="40" y="428" width="720" height="48" fill="#eff6ff" rx="6" stroke="#bfdbfe" stroke-width="1"/>
  <text x="400" y="454" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">🧠 记忆策略：先闪这个画面 → 再背内容（情绪是记忆的胶水）</text>
  <!-- Bottom insight -->
  <rect x="40" y="488" width="720" height="32" fill="#fef3c7" rx="6" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="510" text-anchor="middle" fill="#92400e" font-size="12" font-weight="600">🔥 越离谱、越荒诞、越情绪化的标签 —— 记得越牢固</text>
  <!-- Writing area -->
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4">
    <line x1="60" y1="540" x2="740" y2="540"/>
    <line x1="60" y1="558" x2="740" y2="558"/>
  </g>
  <text x="400" y="536" text-anchor="middle" fill="#94a3b8" font-size="11">自由记录区</text>
  <text x="400" y="586" text-anchor="middle" fill="#94a3b8" font-size="10">高效学习手册 · 方法工具卡</text>
</svg>