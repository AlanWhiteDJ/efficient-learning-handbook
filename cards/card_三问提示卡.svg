<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="800" height="600" fill="#ffffff" rx="12"/>
  <rect x="16" y="16" width="768" height="568" fill="none" stroke="#e2e8f0" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="16" y="16" width="768" height="48" fill="#1e3a5f" rx="8"/>
  <rect x="16" y="40" width="768" height="24" fill="#1e3a5f"/>
  <text x="400" y="47" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">card20 ｜ 学前灵魂三问卡</text>
  <text x="400" y="84" text-anchor="middle" fill="#64748b" font-size="13">方法：激活先验知识 · Prior Knowledge Activation</text>
  <!-- Question 1 -->
  <rect x="40" y="100" width="720" height="120" fill="#eff6ff" rx="8" stroke="#93c5fd" stroke-width="2"/>
  <circle cx="80" cy="148" r="22" fill="#2563eb"/>
  <text x="80" y="154" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">①</text>
  <text x="120" y="140" fill="#1e3a5f" font-size="17" font-weight="700">这个和之前学的</text>
  <rect x="340" y="128" width="280" height="22" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,4" rx="3"/>
  <text x="630" y="140" fill="#1e3a5f" font-size="17" font-weight="700">有什么关系？</text>
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4">
    <line x1="120" y1="168" x2="720" y2="168"/>
    <line x1="120" y1="190" x2="720" y2="190"/>
    <line x1="120" y1="212" x2="720" y2="212"/>
  </g>
  <!-- Question 2 -->
  <rect x="40" y="236" width="720" height="120" fill="#f0fdf4" rx="8" stroke="#86efac" stroke-width="2"/>
  <circle cx="80" cy="284" r="22" fill="#16a34a"/>
  <text x="80" y="290" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">②</text>
  <text x="120" y="276" fill="#166534" font-size="17" font-weight="700">生活中有没有类似的现象？比如</text>
  <rect x="520" y="264" width="200" height="22" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,4" rx="3"/>
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4">
    <line x1="120" y1="304" x2="720" y2="304"/>
    <line x1="120" y1="326" x2="720" y2="326"/>
    <line x1="120" y1="348" x2="720" y2="348"/>
  </g>
  <!-- Question 3 -->
  <rect x="40" y="372" width="720" height="120" fill="#fefce8" rx="8" stroke="#fde047" stroke-width="2"/>
  <circle cx="80" cy="420" r="22" fill="#ca8a04"/>
  <text x="80" y="426" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">③</text>
  <text x="120" y="412" fill="#854d0e" font-size="17" font-weight="700">我猜它大概是讲</text>
  <rect x="320" y="400" width="320" height="22" fill="none" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4,4" rx="3"/>
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4">
    <line x1="120" y1="440" x2="720" y2="440"/>
    <line x1="120" y1="462" x2="720" y2="462"/>
    <line x1="120" y1="484" x2="720" y2="484"/>
  </g>
  <!-- Bottom tip -->
  <rect x="40" y="508" width="720" height="36" fill="#1e3a5f" rx="6"/>
  <text x="400" y="533" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">📖 翻开课本前，花 1 分钟回答这三问 —— 这是把新知识"挂"到旧知识上的钩子</text>
  <!-- Footer -->
  <text x="400" y="578" text-anchor="middle" fill="#94a3b8" font-size="10">高效学习手册 · 方法工具卡</text>
</svg>