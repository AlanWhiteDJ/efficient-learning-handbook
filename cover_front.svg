<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="bulbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000015"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="#ffffff"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="6" fill="url(#brainGrad)"/>

  <!-- Decorative background circles -->
  <circle cx="680" cy="300" r="180" fill="#ff6b3508"/>
  <circle cx="120" cy="250" r="120" fill="#2563eb08"/>
  <circle cx="400" cy="160" r="80" fill="#10b98108"/>

  <!-- Decorative dots pattern top right -->
  <g opacity="0.12">
    <circle cx="700" cy="80" r="3" fill="#ff6b35"/>
    <circle cx="730" cy="100" r="3" fill="#2563eb"/>
    <circle cx="670" cy="110" r="3" fill="#10b981"/>
    <circle cx="760" cy="70" r="2" fill="#ff6b35"/>
    <circle cx="640" cy="60" r="2" fill="#2563eb"/>
    <circle cx="750" cy="130" r="2" fill="#10b981"/>
    <circle cx="690" cy="140" r="2.5" fill="#ff6b35"/>
  </g>

  <!-- ===== TOP 1/3: Brain + Gear + Lightbulb Graphic ===== -->
  <g transform="translate(400, 200)" filter="url(#softShadow)">

    <!-- Gear (left) - simplified icon -->
    <g transform="translate(-130, 0)">
      <!-- gear body -->
      <circle cx="0" cy="0" r="36" fill="none" stroke="url(#gearGrad)" stroke-width="8"/>
      <circle cx="0" cy="0" r="14" fill="url(#gearGrad)"/>
      <!-- gear teeth -->
      <rect x="-8" y="-52" width="16" height="18" rx="3" fill="url(#gearGrad)"/>
      <rect x="-8" y="34" width="16" height="18" rx="3" fill="url(#gearGrad)"/>
      <rect x="-52" y="-8" width="18" height="16" rx="3" fill="url(#gearGrad)"/>
      <rect x="34" y="-8" width="18" height="16" rx="3" fill="url(#gearGrad)"/>
      <rect x="18" y="-44" width="16" height="18" rx="3" fill="url(#gearGrad)" transform="rotate(45, 26, -35)"/>
      <rect x="-34" y="-44" width="16" height="18" rx="3" fill="url(#gearGrad)" transform="rotate(-45, -26, -35)"/>
      <rect x="18" y="26" width="16" height="18" rx="3" fill="url(#gearGrad)" transform="rotate(-45, 26, 35)"/>
      <rect x="-34" y="26" width="16" height="18" rx="3" fill="url(#gearGrad)" transform="rotate(45, -26, 35)"/>
    </g>

    <!-- Brain (center) - stylized -->
    <g transform="translate(0, 0)">
      <!-- Brain left hemisphere -->
      <path d="M-4,-48 C-20,-56 -52,-52 -60,-30 C-68,-8 -58,6 -52,15 C-58,28 -58,48 -42,56 C-26,64 -10,58 -6,48"
            fill="none" stroke="url(#brainGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Brain right hemisphere -->
      <path d="M4,-48 C20,-56 52,-52 60,-30 C68,-8 58,6 52,15 C58,28 58,48 42,56 C26,64 10,58 6,48"
            fill="none" stroke="url(#brainGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Brain center line -->
      <line x1="0" y1="-30" x2="0" y2="52" stroke="url(#brainGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
      <!-- Gyri squiggles left -->
      <path d="M-36,-16 C-28,-22 -18,-14 -22,-6" fill="none" stroke="url(#brainGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <path d="M-38,8 C-30,2 -20,10 -24,18" fill="none" stroke="url(#brainGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <path d="M-34,32 C-28,26 -18,34 -20,40" fill="none" stroke="url(#brainGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <!-- Gyri squiggles right -->
      <path d="M36,-16 C28,-22 18,-14 22,-6" fill="none" stroke="url(#brainGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <path d="M38,8 C30,2 20,10 24,18" fill="none" stroke="url(#brainGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <path d="M34,32 C28,26 18,34 20,40" fill="none" stroke="url(#brainGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Lightbulb (right) -->
    <g transform="translate(130, -5)">
      <!-- Bulb body -->
      <path d="M-18,-10 C-26,-22 -28,-38 -20,-50 C-12,-62 12,-62 20,-50 C28,-38 26,-22 18,-10 L12,10 L-12,10 Z"
            fill="none" stroke="url(#bulbGrad)" stroke-width="7" stroke-linejoin="round"/>
      <!-- Filament lines -->
      <path d="M-8,-24 L-2,-8 L2,-8 L8,-24" fill="none" stroke="url(#bulbGrad)" stroke-width="3" stroke-linecap="round"/>
      <path d="M0,-24 L0,-36" fill="none" stroke="url(#bulbGrad)" stroke-width="3" stroke-linecap="round"/>
      <!-- Bottom base -->
      <rect x="-8" y="10" width="16" height="8" rx="3" fill="url(#bulbGrad)"/>
      <rect x="-14" y="18" width="28" height="6" rx="3" fill="url(#bulbGrad)"/>
      <!-- Rays -->
      <line x1="0" y1="-68" x2="0" y2="-78" stroke="url(#bulbGrad)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
      <line x1="30" y1="-52" x2="36" y2="-58" stroke="url(#bulbGrad)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
      <line x1="-30" y1="-52" x2="-36" y2="-58" stroke="url(#bulbGrad)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    </g>

    <!-- Connecting dots between icons -->
    <circle cx="-80" cy="0" r="3" fill="#2563eb" opacity="0.3"/>
    <circle cx="80" cy="-5" r="3" fill="url(#bulbGrad)" opacity="0.3"/>
    <circle cx="-50" cy="15" r="2.5" fill="#ff6b35" opacity="0.25"/>
    <circle cx="50" cy="10" r="2.5" fill="#2563eb" opacity="0.25"/>
  </g>

  <!-- Accent decorative line under icons -->
  <rect x="280" y="310" width="240" height="2" rx="1" fill="#ff6b3530"/>
  <circle cx="400" cy="311" r="4" fill="#ff6b35"/>

  <!-- ===== MIDDLE: Title ===== -->
  <!-- Main title -->
  <text x="400" y="480" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="68" font-weight="900" letter-spacing="8" fill="#1a1a2e">
    高效学习手册
  </text>

  <!-- Title underline decoration -->
  <rect x="260" y="505" width="280" height="5" rx="2.5" fill="#ff6b35"/>
  <rect x="300" y="515" width="200" height="3" rx="1.5" fill="#2563eb" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="400" y="575" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="22" font-weight="400" letter-spacing="3" fill="#555566">
    弄懂大脑怎么学，比埋头苦学重要一百倍
  </text>

  <!-- Decorative tag elements -->
  <g transform="translate(400, 620)">
    <rect x="-120" y="-16" width="75" height="28" rx="14" fill="#ff6b3515"/>
    <text x="-82" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="13" fill="#ff6b35" font-weight="600">🧠 脑科学</text>

    <rect x="-30" y="-16" width="60" height="28" rx="14" fill="#2563eb15"/>
    <text x="0" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="13" fill="#2563eb" font-weight="600">📚 工具书</text>

    <rect x="45" y="-16" width="75" height="28" rx="14" fill="#10b98115"/>
    <text x="82" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="13" fill="#10b981" font-weight="600">🔧 实操</text>
  </g>

  <!-- ===== BOTTOM: Author & Info ===== -->
  <!-- Author line -->
  <text x="400" y="760" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="18" font-weight="400" fill="#888899" letter-spacing="4">
    一本AI辅助创作的学习指南
  </text>

  <!-- Bottom decorative bar -->
  <rect x="0" y="1094" width="800" height="6" fill="url(#brainGrad)"/>

  <!-- Publisher placeholder - bottom right -->
  <g transform="translate(680, 1050)">
    <rect x="0" y="-30" width="100" height="50" rx="4" fill="#f0f0f5" stroke="#d0d0dd" stroke-width="1"/>
    <text x="50" y="-8" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="10" fill="#aaaabb">出版社Logo</text>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(70, 1060)">
    <text font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#aaaabb">
      21章 · 67个方法 · 128个教练问题 · 55张插图
    </text>
  </g>

  <!-- Side accent dots (left) -->
  <g opacity="0.08">
    <circle cx="30" cy="500" r="4" fill="#ff6b35"/>
    <circle cx="30" cy="530" r="4" fill="#2563eb"/>
    <circle cx="30" cy="560" r="4" fill="#10b981"/>
    <circle cx="30" cy="590" r="4" fill="#ff6b35"/>
  </g>

</svg>