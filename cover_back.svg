      <rect x="193" y="0" width="2" height="60" fill="#1a1a2e"/>
      <rect x="197" y="0" width="1" height="60" fill="#1a1a2e"/>
    </g>

    <!-- ISBN placeholder -->
    <text x="0" y="110" text-anchor="middle" font-family="'Courier New',monospace"
          font-size="12" fill="#cccccc" letter-spacing="3">ISBN 978-×-××××-×××-×</text>
  </g>

  <!-- Divider line -->
  <rect x="80" y="660" width="640" height="1" fill="#e0e0e8"/>

  <!-- ===== BOTTOM: Book Description ===== -->

  <!-- Bottom text block -->
  <g transform="translate(80, 700)">
    <text font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
          font-size="14" fill="#777788" font-weight="400" letter-spacing="0.5">
      <tspan x="0" dy="0">这不是一本需要信仰才能读完的书。</tspan>
      <tspan x="0" dy="26" fill="#888899">这是一个工具箱。</tspan>
      <tspan x="0" dy="36" fill="#999aaa" font-size="12">打开第一页的自测清单，</tspan>
      <tspan x="0" dy="24" fill="#999aaa" font-size="12">找到你现在最痛的那个入口，</tspan>
      <tspan x="0" dy="24" fill="#999aaa" font-size="12">直接翻过去。</tspan>
    </text>
  </g>

  <!-- ===== Bottom Stats ===== -->
  <!-- Stats badge -->
  <g transform="translate(620, 1020)">
    <rect x="0" y="0" width="160" height="48" rx="8" fill="url(#topBar)" opacity="0.08"/>
    <rect x="0" y="0" width="160" height="48" rx="8" fill="none" stroke="url(#topBar)" stroke-width="1.5" opacity="0.3"/>
    <text x="80" y="22" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="14" font-weight="700" fill="#1a1a2e" letter-spacing="1">
      21章 | 67方法
    </text>
    <text x="80" y="40" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="11" fill="#888899" letter-spacing="1">
      128教练问题 | 55张插图
    </text>
  </g>

  <!-- Bottom gradient bar -->
  <rect x="0" y="1095" width="800" height="5" fill="url(#topBar)"/>

  <!-- Side decorative dots (right) -->
  <g opacity="0.06">
    <circle cx="760" cy="200" r="6" fill="#ff6b35"/>
    <circle cx="760" cy="230" r="6" fill="#2563eb"/>
    <circle cx="760" cy="260" r="6" fill="#10b981"/>
    <circle cx="760" cy="290" r="6" fill="#ff6b35"/>
  </g>

</svg>