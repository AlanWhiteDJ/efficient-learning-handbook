<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="#fafbfc"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="800" height="5" fill="url(#topBar)"/>

  <!-- Subtle background decoration -->
  <circle cx="700" cy="900" r="200" fill="#ff6b3505"/>
  <circle cx="100" cy="300" r="150" fill="#2563eb05"/>

  <!-- ===== TOP: AI Recommendations ===== -->
  <text x="400" y="75" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="18" font-weight="700" fill="#555566" letter-spacing="6">
    AI 推荐语精选
  </text>

  <!-- Decorative line under section title -->
  <rect x="330" y="88" width="140" height="2" rx="1" fill="#ff6b3530"/>

  <!-- === Quote 1: ChatGPT === -->
  <g transform="translate(80, 120)">
    <!-- Quote mark -->
    <text x="0" y="0" font-family="'Georgia','PingFang SC',serif" font-size="36" fill="#ff6b3520" font-weight="900">"</text>
    <!-- Quote text -->
    <text x="0" y="30" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
          font-size="16" fill="#3a3a4a" font-weight="500" letter-spacing="1">
      <tspan x="0" dy="0">真正让人改变的不是被告知正确答案，</tspan>
      <tspan x="0" dy="28">是被问到对的问题。</tspan>
    </text>
    <!-- AI name tag -->
    <rect x="0" y="50" width="68" height="22" rx="11" fill="#2563eb12"/>
    <text x="34" y="65" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="11" fill="#2563eb" font-weight="600">ChatGPT</text>
  </g>

  <!-- === Quote 2: DeepSeek === -->
  <g transform="translate(80, 240)">
    <text x="0" y="0" font-family="'Georgia','PingFang SC',serif" font-size="36" fill="#2563eb20" font-weight="900">"</text>
    <text x="0" y="30" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
          font-size="16" fill="#3a3a4a" font-weight="500" letter-spacing="1">
      <tspan x="0" dy="0">它不是要你相信某个方法，</tspan>
      <tspan x="0" dy="28">它要你开始相信自己的大脑。</tspan>
    </text>
    <rect x="0" y="50" width="68" height="22" rx="11" fill="#ff6b3512"/>
    <text x="34" y="65" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="11" fill="#ff6b35" font-weight="600">DeepSeek</text>
  </g>

  <!-- === Quote 3: Grok === -->
  <g transform="translate(80, 360)">
    <text x="0" y="0" font-family="'Georgia','PingFang SC',serif" font-size="36" fill="#10b98120" font-weight="900">"</text>
    <text x="0" y="30" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
          font-size="16" fill="#3a3a4a" font-weight="500" letter-spacing="1">
      <tspan x="0" dy="0">这不是一本需要信仰才能读完的书，</tspan>
      <tspan x="0" dy="28">这是一个工具箱。</tspan>
    </text>
    <rect x="0" y="50" width="68" height="22" rx="11" fill="#10b98112"/>
    <text x="34" y="65" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="11" fill="#10b981" font-weight="600">Grok（xAI）</text>
  </g>

  <!-- Divider line -->
  <rect x="80" y="460" width="640" height="1" fill="#e0e0e8"/>

  <!-- ===== MIDDLE: Barcode Area ===== -->
  <g transform="translate(400, 540)">
    <text x="0" y="0" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="13" fill="#999aaa" letter-spacing="2">条形码占位区</text>

    <!-- Barcode placeholder -->
    <rect x="-120" y="12" width="240" height="80" rx="3" fill="#ffffff" stroke="#d8d8e0" stroke-width="1"/>

    <!-- Fake barcode lines -->
