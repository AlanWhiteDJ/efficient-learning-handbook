      <rect x="144" y="0" width="2" height="60" fill="#1a1a2e"/>
      <rect x="148" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="151" y="0" width="3" height="60" fill="#1a1a2e"/>
      <rect x="156" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="159" y="0" width="2" height="60" fill="#1a1a2e"/>
      <rect x="163" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="166" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="169" y="0" width="3" height="60" fill="#1a1a2e"/>
      <rect x="174" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="177" y="0" width="2" height="60" fill="#1a1a2e"/>
      <rect x="181" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="184" y="0" width="4" height="60" fill="#1a1a2e"/>
