      <rect x="117" y="0" width="3" height="60" fill="#1a1a2e"/>
      <rect x="122" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="125" y="0" width="2" height="60" fill="#1a1a2e"/>
      <rect x="129" y="0" width="1" height="60" fill="#1a1a2e"/>
