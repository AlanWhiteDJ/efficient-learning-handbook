      <rect x="65" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="68" y="0" width="3" height="60" fill="#1a1a2e"/>
      <rect x="73" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="76" y="0" width="2" height="60" fill="#1a1a2e"/>
      <rect x="80" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="83" y="0" width="1" height="60" fill="#1a1a2e"/>
      <rect x="86" y="0" width="3" height="60" fill="#1a1a2e"/>
